<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Aulas</title>  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Cabeçalho fixo -->
  <header>
    <a href="index.html" class="btn-voltar">Aristidesbp</a>

    <!-- Lista suspensa para escolher arquivo -->
    <select id="seletor-arquivo" onchange="carregarArquivoSelecionado()">
      <option value="termux.txt">termux.txt</option>
      <option value="comandos.txt">comandos.txt</option>
      <option value="atalhos.txt">atalhos.txt</option>
      <option value="redes.txt">redes.txt</option>
    </select>

    <!-- Botões de zoom movidos para o header -->
    <div class="zoom-controls">
      <button onclick="diminuirFonte()">−</button>
      <button onclick="aumentarFonte()">+</button>
    </div>
  </header>

  <!-- Caixa de texto -->
  <textarea id="editor"></textarea>
 

  <!-- Botão de download permanece no rodapé (ou mova se quiser) -->
  <div class="zoom-controls">
    <button onclick="baixarArquivo()">Download</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
