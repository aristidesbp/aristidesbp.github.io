<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAREFAS - ERP ABP</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"> 
   
    <!--carrega biblioteca responsável pelo QR code-->

    <!--carrega o arquivo de CSS-->
    <link rel="stylesheet" href="tarefas.css"> 
    <!-- Carrega a biblioteca do Supabase primeiro -->

    <!-- Carrega creatCliente -->

<body>

    <div id="tela-login" class="flex justify-center items-center h-screen bg-slate-900" style="display: none;">
