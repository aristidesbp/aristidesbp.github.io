<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Master - ERP</title>
    <link rel="stylesheet" href="erp_clinica.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="card max-w-md w-full p-8 bg-white rounded-2xl shadow-2xl border-t-8 border-indigo-600">
            <h1 class="text-3xl font-bold text-center mb-6 text-indigo-900">Acesso Restrito</h1>
            <input type="email" id="email" placeholder="E-mail" class="input-field mb-4">
            <input type="password" id="password" placeholder="Senha" class="input-field mb-6">
            <button onclick="app.login()" class="btn-primary w-full py-4 text-lg">Entrar no Sistema</button>
        </div>
    </div>

    <div id="main-system" class="hidden">
        <header class="fixed top-0 w-full bg-white border-b z-50 px-6 py-4 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-3">
                <i class="fas fa-shield-halved text-indigo-600 text-2xl"></i>
                <span class="font-bold text-xl tracking-tight text-indigo-900">ERP CLÍNICA</span>
            </div>
            <nav class="hidden md:flex gap-8">
                <button onclick="app.showSection('dash')" class="nav-link active">Dashboard</button>
                <button onclick="app.showSection('exercicios')" class="nav-link">Exercícios</button>
                <button onclick="app.showSection('compartilhar')" class="nav-link">Compartilhamento</button>
                <button onclick="app.showSection('config')" class="nav-link">Configurações</button>
            </nav>
            <div class="flex items-center gap-4">
                <span id="user-name" class="text-sm font-medium">...</span>
                <button onclick="app.logout()" class="text-red-500"><i class="fas fa-power-off"></i></button>
            </div>
        </header>

        <main class="container mx-auto pt-24 pb-12 px-4">
            
            <section id="sec-dash" class="tab-content">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="card p-6 border-l-4 border-indigo-500">
                        <h3 class="text-gray-500 text-sm">Tarefas Pendentes</h3>
                        <p class="text-3xl font-bold" id="count-tarefas">0</p>
                    </div>
                    </div>
            </section>

            <section id="sec-exercicios" class="tab-content hidden">
                <div class="card p-6">
                    <div class="flex justify-between mb-6">
                        <h2 class="text-2xl font-bold">Gestão de Exercícios</h2>
                        <button class="btn-primary px-4 py-2" onclick="app.openModal('modal-ex')">+ Novo Exercício</button>
                    </div>
                    <div id="lista-exercicios" class="space-y-4"></div>
                </div>
            </section>

            <section id="sec-compartilhar" class="tab-content hidden">
                <div class="card p-6">
                    <h2 class="text-2xl font-bold mb-4">Compartilhamento Seguro</h2>
                    <div class="flex gap-4 mb-8">
                        <input type="email" id="share-email" placeholder="E-mail do Paciente/Destinatário" class="input-field max-w-xs">
                        <select id="share-type" class="input-field max-w-xs">
                            <option value="json">Dados JSON</option>
                            <option value="pdf">Relatório PDF</option>
                        </select>
                        <button onclick="app.share()" class="btn-primary px-6">Enviar</button>
                    </div>
                    <div id="historico-compartilhamento" class="overflow-x-auto">
                        </div>
                </div>
            </section>

        </main>
    </div>

    <script src="erp_clinica.js"></script>
</body>
</html>
