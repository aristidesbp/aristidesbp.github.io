<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tio Plim - Produções e Eventos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff; /* Fundo branco para combinar com a imagem */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container-imagem {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px; /* Margem de segurança opcional */
        }

        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Garante que a imagem cresça até o limite da tela sem cortar ou distorcer */
        }
    </style>
</head>
<body>

    <div class="container-imagem">
        <img src="israel.jpg" alt="Tio Plim - Animação, Recreação e Atrações">
    </div>

</body>
</html>
