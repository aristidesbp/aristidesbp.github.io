<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Estilo da página */
    body {
      background-color: black;
      color: white;
    }

    .btn {
      margin: 20px;
    }

    .container {
      margin-top: 50px;
      text-align: center;
    }
    
    /* Animação de fade-out */
    .fade-out {
      opacity: 0;
      transition: opacity 1s ease;
    }
  </style>
</head>
<body>
  <!-- Conteúdo principal -->
  <div class="container">
    <h1>Welcome to My Website</h1>
    <p>Explore the site and get to know our services!</p>
    
    <!-- Botão com som e animação -->
    <button id="slideBtn" class="btn btn-primary">
      Ligue em mim
    </button>
  </div>

  <!-- JavaScript para animação e som -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
        const slideBtn = document.getElementById("slideBtn");
        const container = document.querySelector(".container");

        // Som de clique
        const audio = new Audio('https://www.fesliyanstudios.com/play-mp3/6418'); // Som de clique (modifique para outro som se necessário)

        // Evento de clique no botão
        slideBtn.addEventListener("click", () => {
            // Tocar som ao clicar
            audio.play();

            // Fade out do container com atraso de 1 segundo
            container.classList.add('fade-out');

            // Redireciona para "home.html" após 1 segundo
            setTimeout(() => {
                window.location.href = "home.html";
            }, 1000); // 1 segundo de espera
        });
    });
  </script>

  <!-- Bootstrap JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
