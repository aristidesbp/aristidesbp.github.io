<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Estilo da página */
    body {
      background-color: black;
      color: white;
    }

    .btn {
      margin: 20px;
    }

    .container {
      margin-top: 50px;
      text-align: center;
    }
    
    /* Animação dos elementos */
    @keyframes slideInFromLeft {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(0); }
    }

    @keyframes slideInFromRight {
      0% { transform: translateX(100%); }
      100% { transform: translateX(0); }
    }

    @keyframes slideInFromTop {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(0); }
    }

    @keyframes slideInFromBottom {
      0% { transform: translateY(100%); }
      100% { transform: translateY(0); }
    }

    .slide-left {
      animation: slideInFromLeft 1s ease-out;
    }

    .slide-right {
      animation: slideInFromRight 1s ease-out;
    }

    .slide-top {
      animation: slideInFromTop 1s ease-out;
    }

    .slide-bottom {
      animation: slideInFromBottom 1s ease-out;
    }

    /* Fade out animation */
    .fade-out {
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }
  </style>
</head>
<body>
  <!-- Conteúdo principal -->
  <div class="container">
    <h1 class="slide-left">Welcome to My Website</h1>
    <p class="slide-right">Explore the site and get to know our services!</p>
    
    <!-- Botão com animação de confete -->
    <button id="confettiButton" class="btn btn-primary slide-bottom">
      Ligue em mim
    </button>
  </div>

  <!-- Efeito de confete e som -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const confettiButton = document.getElementById('confettiButton');
      const container = document.querySelector('.container');

      // Carregar som de confete ou clique
      const audio = new Audio('https://www.fesliyanstudios.com/play-mp3/6418'); // Som de clique

      // Adiciona o evento de clique ao botão
      confettiButton.addEventListener("click", () => {
        // Tocar o som
        audio.play();

        // Animação de confete
        confetti({
          particleCount: 100,
          spread: 70,
          origin: { y: 0.6 }
        });

        // Adicionar classe de fade-out
        container.classList.add('fade-out');

        // Após 1 segundo, redirecionar para home.html
        setTimeout(() => {
          window.location.href = "home.html";
        }, 1000); // 1 segundo de espera para transição
      });
    });
  </script>

  <!-- Bootstrap JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
