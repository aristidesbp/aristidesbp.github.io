<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Estilo da página */
    body {
      background-color: black;
      color: white;
    }

    .btn {
      margin: 20px;
    }

    .container {
      margin-top: 50px;
      text-align: center;
    }
    
    /* Animação dos elementos */
    @keyframes slideInFromLeft {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(0); }
    }

    @keyframes slideInFromRight {
      0% { transform: translateX(100%); }
      100% { transform: translateX(0); }
    }

    @keyframes slideInFromTop {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(0); }
    }

    @keyframes slideInFromBottom {
      0% { transform: translateY(100%); }
      100% { transform: translateY(0); }
    }

    .slide-left {
      animation: slideInFromLeft 1s ease-out;
    }

    .slide-right {
      animation: slideInFromRight 1s ease-out;
    }

    .slide-top {
      animation: slideInFromTop 1s ease-out;
    }

    .slide-bottom {
      animation: slideInFromBottom 1s ease-out;
    }
  </style>
</head>
<body>
  <!-- Conteúdo principal -->
  <div class="container">
    <h1 class="slide-left">Welcome to My Website</h1>
    <p class="slide-right">Explore the site and get to know our services!</p>
    
    <!-- Botão com animação de confete -->
    <button id="confettiButton" class="btn btn-primary slide-bottom">
      Ligue em mim
    </button>
  </div>

  <!-- Efeito de confete e som -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
  <audio id="confettiSound" src="confetti-pop.mp3" preload="auto"></audio> <!-- Adicione seu arquivo de som aqui -->

  
  <script>
    document.getElementById('confettiButton').addEventListener('click', function() {
      // Animação de confete
      confetti({
        particleCount: 100,
        spread: 70,
        origin: { y: 0.6 }
      });
      
      // Reproduz o som do confete
      var audio = document.getElementById('confettiSound');
      audio.play();
      
      // Redireciona para a página "home.html" após um pequeno atraso
      setTimeout(function() {
        window.location.href = "home.html";
      }, 3000); // Atraso de 3 segundos para visualizar a animação
    });
  </script>
  
  <!-- Bootstrap JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
