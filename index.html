<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aristides B. Pontes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Estilos CSS -->
  <style>
    body.page-transition {
      opacity: 1;
      transition: opacity 0.5s ease-out;
    }

    body.page-transition-exit {
      opacity: 0;
      transition: opacity 0.5s ease-in;
    }

    .card {
      opacity: 0; /* Inicialmente invisível */
      transform: translateY(20px); /* Desloca para baixo */
      transition: opacity 0.5s ease, transform 0.5s ease; /* Animação */
    }
    .card.visible {
      opacity: 1; /* Visível */
      transform: translateY(0); /* Retorna à posição original */
    }

    .slide-left {
      animation: slide-left 0.5s ease-in-out;
    }
    
    .slide-right {
      animation: slide-right 0.5s ease-in-out;
    }

    .slide-bottom {
      animation: slide-bottom 0.5s ease-in-out;
    }

    @keyframes slide-left {
      from { transform: translateX(-100%); }
      to { transform: translateX(0); }
    }

    @keyframes slide-right {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }

    @keyframes slide-bottom {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
  </style>
</head>
<body class="page-transition">
  <!-- Conteúdo principal -->
  <div class="container">
    <h1 class="slide-left">Bem-vindo ao meu site</h1>
    <p class="slide-right">Explore o site e conheça os meus serviços!</p>
    
    <!-- Botão com animação de confete -->
    <button id="confettiButton" class="btn btn-primary slide-bottom">
      Entrar no Site!
    </button>

    <!-- Card para imagem -->
    <div class="card mt-4" id="aboutCard">
      <img src="imagens/eu_index.jpg" class="card-img-top" alt="Minha Imagem">
      <div class="card-body">
        <h5 class="card-title">Aristides B. Pontes</h5>
        <p class="card-text">Sou especialista em marketing digital e desenvolvimento web. Meu objetivo é ajudar empresas a crescerem por meio de estratégias eficazes e criativas. Explore meu portfólio e veja como posso ajudar você!</p>
        <button class="btn btn-secondary">Saiba Mais</button>
      </div>
    </div>

    <!-- Menu suspenso para escolher a transição -->
    <div class="form-group mt-4">
      <label for="transitionsMenu">Escolha uma transição:</label>
      <select id="transitionsMenu" class="form-select">
        <option value="fade">Fade (Esmaecimento)</option>
        <option value="slide-left">Slide (Deslizamento para a esquerda)</option>
        <option value="slide-right">Slide (Deslizamento para a direita)</option>
        <option value="zoom">Zoom</option>
        <option value="flip">Flip (Giro)</option>
        <option value="scroll-up">Scroll (Rolagem para cima)</option>
        <option value="scroll-down">Scroll (Rolagem para baixo)</option>
        <option value="parallax">Parallax</option>
        <option value="swipe-left">Swipe (Esquerda)</option>
        <option value="swipe-right">Swipe (Direita)</option>
        <option value="cover-reveal">Cover/Reveal</option>
        <option value="ripple">Ripple (Ondulação)</option>
        <option value="rotate">Rotate (Rotação)</option>
      </select>
    </div>
  </div>

  <!-- Script JavaScript -->
  <script>
    // Animação do card ao carregar a página
    window.onload = function() {
      const card = document.getElementById('aboutCard');
      card.classList.add('visible'); // Anima o card ao carregar
    };

    // Função de confete ao clicar no botão
    document.getElementById('confettiButton').onclick = function() {
      const button = this;
      const rect = button.getBoundingClientRect(); // Posição do botão
      const body = document.body;

      // Dispara confete a partir da posição do botão
      const count = 200;
      const spread = 70;
      const startX = rect.left + rect.width / 2; // Centro do botão
      const startY = rect.top + rect.height; // Abaixo do botão

      for (let i = 0; i < count; i++) {
        const x = Math.random() * spread - spread / 2 + startX;
        const y = Math.random() * spread - spread / 2 + startY;
        confetti({
          particleCount: 1,
          startVelocity: 30,
          spread: 360,
          origin: {
            x: x / window.innerWidth,
            y: y / window.innerHeight
          }
        });
      }

      // Aplica transição de página ao clicar no botão
      body.classList.add('page-transition-exit');
      setTimeout(() => {
        window.location.href = 'home.html'; // Redireciona para a página home.html
      }, 500); // Tempo da transição (0.5s)
    };

    // Vincula o efeito de confete
    (function () {
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js';
      document.body.appendChild(script);
    })();
  </script>

  <!-- Vinculação do Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
