<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Aristidesbp | Digital Solutions</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2563eb",
                        "background-light": "#f8fafc",
                        "background-dark": "#020617",
                        "slate-border-light": "#e2e8f0",
                        "slate-border-dark": "#1e293b",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .dark .glass { background: rgba(15, 23, 42, 0.8); }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 transition-colors duration-300">

    <nav class="fixed top-0 w-full z-50 glass border-b border-slate-border-light dark:border-slate-border-dark">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
                        <span class="material-symbols-outlined text-white text-xl">bolt</span>
                    </div>
                    <span class="text-xl font-bold tracking-tight">Aristidesbp <span class="text-primary">| Digital</span></span>
                </div>

                <div class="hidden md:flex items-center gap-8">
                    <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                        <span id="theme-icon" class="material-symbols-outlined text-[20px]">light_mode</span>
                    </button>
                    <button onclick="botaoLogin()" class="flex items-center gap-2 px-4 py-2 rounded-full bg-primary text-white hover:bg-blue-700 transition-all">
                        <span class="material-symbols-outlined text-[20px]">account_circle</span>
                        <span class="font-medium text-sm">Minha Conta</span>
                    </button>
                </div>

                <button onclick="toggleMobileMenu()" class="md:hidden p-2">
                    <span class="material-symbols-outlined">menu</span>
                </button>
            </div>
        </div>
    </nav>

    <div id="mobile-menu" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="toggleMobileMenu()"></div>
        <div class="absolute right-0 top-0 h-full w-64 bg-white dark:bg-slate-900 shadow-xl p-6">
            <div class="flex justify-end mb-8">
                <button onclick="toggleMobileMenu()"><span class="material-symbols-outlined">close</span></button>
            </div>
            <div class="flex flex-col gap-6">
                <button onclick="botaoLogin()" class="flex items-center gap-3 text-slate-600 dark:text-slate-300">
                    <span class="material-symbols-outlined">account_circle</span> Minha Conta
                </button>
                <button onclick="toggleDarkMode()" class="flex items-center gap-3 text-slate-600 dark:text-slate-300">
                    <span class="material-symbols-outlined">contrast</span> Alternar Tema
                </button>
            </div>
        </div>
    </div>

    <main id="app-content" class="pt-24 min-h-screen px-4 max-w-7xl mx-auto">
        </main>

    <div id="modalLogin" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-xl shadow-2xl border border-slate-200 dark:border-slate-800 p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Minha Conta</h2>
                <button onclick="botaoLogin()" class="text-slate-500 hover:text-primary"><span class="material-symbols-outlined">close</span></button>
            </div>
            <form id="formLogin" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">E-mail</label>
                    <input type="email" id="loginEmail" required class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-transparent focus:ring-2 focus:ring-primary outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Senha</label>
                    <input type="password" id="loginSenha" required class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-transparent focus:ring-2 focus:ring-primary outline-none">
                </div>
                <button type="submit" class="w-full bg-primary hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition-all">Entrar</button>
            </form>
        </div>
    </div>

    <script>
        // Tema Dark/Light
        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.innerText = 'dark_mode';
            } else {
                html.classList.add('dark');
                icon.innerText = 'light_mode';
            }
        }

        // Menu Mobile
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }

        // Função botaoLogin conforme solicitado
        function botaoLogin() {
            const modal = document.getElementById('modalLogin');
            modal.classList.toggle('hidden');
        }

        /* Lógica de Autenticação Supabase */
        async function solicitarRecuperacao() {
            const email = document.getElementById('loginEmail').value;
            if (!email) return alert("Digite seu e-mail.");
            const { error } = await window.supabaseClient.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.href,
            });
            if (error) alert(error.message);
            else alert("Link enviado!");
        }

        async function salvarNovaSenha() {
            const novaSenha = document.getElementById('novaSenha')?.value;
            if (!novaSenha || novaSenha.length < 6) return alert("Senha curta demais.");
            const { error } = await window.supabaseClient.auth.updateUser({ password: novaSenha });
            if (error) alert("Erro: " + error.message);
            else alert("Senha atualizada!");
        }
    </script>
</body>
</html>
