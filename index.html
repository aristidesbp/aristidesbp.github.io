<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Debug Vizinho Indica</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .log { background: #333; color: #0f0; padding: 10px; border-radius: 5px; font-family: monospace; overflow-x: auto; }
        .card { border: 1px solid #ddd; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Painel de Debug</h1>
    <div id="status">Testando conexão...</div>
    <div class="log" id="console-log"></div>

    <h3>Tabelas disponíveis:</h3>
    <div id="botoes-tabelas"></div>

    <div id="resultado"></div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase_config.js"></script>

    <script>
        const log = (msg) => document.getElementById('console-log').innerHTML += `> ${msg}<br>`;
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Teste de conexão
        async function testarConexao() {
            try {
                const { data, error } = await supabase.from('categorias').select('count(*)', { count: 'exact', head: true });
                if (error) throw error;
                document.getElementById('status').innerHTML = "✅ Conectado ao Supabase!";
                log("Conexão bem sucedida!");
                mostrarBotoes();
            } catch (err) {
                document.getElementById('status').innerHTML = "❌ Erro na Conexão";
                log("ERRO: " + err.message);
            }
        }

        function mostrarBotoes() {
            const tabelas = ['categorias', 'servicos', 'avaliacoes', 'favoritos', 'usuario_espelho'];
            tabelas.forEach(t => {
                const b = document.createElement('button');
                b.innerText = t;
                b.onclick = () => listar(t);
                document.getElementById('botoes-tabelas').appendChild(b);
            });
        }

        async function listar(tabela) {
            log(`Buscando ${tabela}...`);
            const { data, error } = await supabase.from(tabela).select('*');
            if (error) {
                log(`ERRO em ${tabela}: ${error.message}`);
            } else {
                document.getElementById('resultado').innerHTML = `<h3>${tabela}</h3><pre>${JSON.stringify(data, null, 2)}</pre>`;
            }
        }

        testarConexao();
    </script>
</body>
</html>
