<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Vizinho Indica - Gerenciador</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .card { border: 1px solid #ccc; padding: 10px; margin: 5px; border-radius: 5px; }
        .btn-tabela { margin: 5px; padding: 10px; cursor: pointer; background: #007bff; color: white; border: none; }
    </style>
</head>
<body>

    <h1>Tabelas do Banco</h1>
    <div id="lista-tabelas">Carregando tabelas...</div>
    <hr>
    <div id="resultado"></div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase_config.js"></script>

    <script>
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 1. Buscar tabelas automaticamente
        async function carregarTabelas() {
            const { data, error } = await supabase
                .from('information_schema.tables')
                .select('table_name')
                .eq('table_schema', 'public');

            if (error) return console.error(error);

            const divLista = document.getElementById('lista-tabelas');
            divLista.innerHTML = "";
            
            data.forEach(t => {
                const btn = document.createElement('button');
                btn.className = 'btn-tabela';
                btn.innerText = t.table_name;
                btn.onclick = () => listarConteudo(t.table_name);
                divLista.appendChild(btn);
            });
        }

        // 2. Listar conteúdo ao clicar
        async function listarConteudo(tabela) {
            const { data, error } = await supabase.from(tabela).select('*');
            const resDiv = document.getElementById('resultado');
            
            if (error) {
                resDiv.innerHTML = `<p style="color:red">Erro: ${error.message}</p>`;
                return;
            }

            resDiv.innerHTML = `<h3>Conteúdo de: ${tabela}</h3>`;
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerText = JSON.stringify(item);
                resDiv.appendChild(card);
            });
        }

        carregarTabelas();
    </script>
</body>
</html>
