<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 transition-colors duration-300">

<!-- 
navbar:  A Barra de Navegação (<nav>)
Esta é a parte superior fixa que contém sua marca e botões de ação.
--> 
    <nav class="fixed top-0 w-full z-50 glass border-b border-slate-border-light dark:border-slate-border-dark">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
                        <span class="material-symbols-outlined text-white text-xl">bolt</span>
                    </div>
                    <span class="text-xl font-bold tracking-tight">Aristidesbp <span class="text-primary">| Digital</span></span>
                </div>

                <div class="hidden md:flex items-center gap-8">
                    <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                        <span id="theme-icon" class="material-symbols-outlined text-[20px]">light_mode</span>
                    </button>
                    <button id="btn-login-desktop" onclick="botaoLogin()" class="flex items-center gap-2 px-4 py-2 rounded-full bg-primary text-white hover:bg-blue-700 transition-all">
                        <span class="material-symbols-outlined text-[20px]">account_circle</span>
                        <span class="font-medium text-sm">Minha Conta</span>
                    </button>
                </div>

                <button onclick="toggleMobileMenu()" class="md:hidden p-2">

                </button>
            </div>
        </div>

<!--
Menu Lateral Mobile (id="mobile-menu")
Este bloco é o que "desliza" da direita quando você clica no menu pelo celular.    
    -->
    <div id="mobile-menu" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="toggleMobileMenu()"></div>
        <div class="absolute right-0 top-0 h-full w-64 bg-white dark:bg-slate-900 shadow-xl p-6">
            <div class="flex justify-end mb-8">
                <button onclick="toggleMobileMenu()"><span class="material-symbols-outlined">close</span></button>
            </div>
            <div class="flex flex-col gap-6">
                <button id="btn-login-mobile" onclick="botaoLogin()" class="flex items-center gap-3 text-slate-600 dark:text-slate-300">
                    <span class="material-symbols-outlined">account_circle</span> Minha Conta
                </button>
                <button onclick="toggleDarkMode()" class="flex items-center gap-3 text-slate-600 dark:text-slate-300">
                    <span class="material-symbols-outlined">contrast</span> Alternar Tema
                </button>
            </div>
        </div>
    </div>

    
<!--
3. Área de Conteúdo Principal (<main>)
Este é o "palco" do seu sistema.    
    -->
    <main id="app-content" class="pt-24 min-h-screen px-4 max-w-7xl mx-auto">
        </main>
    
<!--
   4. Modal de Login (id="modalLogin")
A "caixa flutuante" para o usuário entrar no sistema. 
    -->
    <div id="modalLogin" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-xl shadow-2xl border border-slate-200 dark:border-slate-800 p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Minha Conta</h2>
                <button onclick="botaoLogin()" class="text-slate-500 hover:text-primary"><span class="material-symbols-outlined">close</span></button>
            </div>
            <form id="formLogin" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">E-mail</label>
                    <input type="email" id="loginEmail" required class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-transparent focus:ring-2 focus:ring-primary outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Senha</label>
                    <input type="password" id="loginSenha" required class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-transparent focus:ring-2 focus:ring-primary outline-none">
                </div>
                <button type="submit" class="w-full bg-primary hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition-all">Entrar</button>
            </form>
        </div>
    </div>

    
<script>       
/* ##################################################################### */
/* CONFIGURAÇÃO SUPABASE */
/* ##################################################################### */
const supabaseUrl = 'https://vrsiiwuifapobeiguldf.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZyc2lpd3VpZmFwb2JlaWd1bGRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NjM0MTgsImV4cCI6MjA4ODAzOTQxOH0.F5eLwudxDdlRrQJF2IEJ_P5YoaKL98_qSkgr8faots0';

// Inicializa o cliente e expõe globalmente
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
window.supabaseClient = _supabase;

/* ##################################################################### */
/* CONTROLE DE INTERFACE (UI) */
/* ##################################################################### */

// Alternar entre Tema Dark e Light
function toggleDarkMode() {
    const html = document.documentElement;
    const icon = document.getElementById('theme-icon');
    if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        icon.innerText = 'dark_mode';
    } else {
        html.classList.add('dark');
        icon.innerText = 'light_mode';
    }
}

// Abrir/Fechar Menu Mobile
function toggleMobileMenu() {
    const menu = document.getElementById('mobile-menu');
    menu.classList.toggle('hidden');
}

// Abrir/Fechar Modal de Login
function botaoLogin() {
    const modal = document.getElementById('modalLogin');
    modal.classList.toggle('hidden');
}

/**
 * Altera o texto, ícone e cor dos botões de login para "Sair" e vice-versa
 * @param {Object|null} user - Objeto do usuário do Supabase ou null
 */
function atualizarInterfaceUsuario(user) {
    // Busca os botões pelos IDs que devem estar no seu HTML
    const botoes = [
        document.getElementById('btn-login-desktop'),
        document.getElementById('btn-login-mobile')
    ];

    botoes.forEach(btn => {
        if (!btn) return;

        // Procura os elementos internos (texto e ícone)
        const textSpan = btn.querySelector('.btn-text') || btn.querySelector('span:not(.material-symbols-outlined)');
        const iconSpan = btn.querySelector('.material-symbols-outlined');

        if (user) {
            // ESTADO: LOGADO
            if (textSpan) textSpan.innerText = "Sair da Conta";
            if (iconSpan) iconSpan.innerText = "logout";
            
            btn.onclick = logout; // Muda função para sair
            
            // Troca as cores (de azul para vermelho)
            btn.classList.remove('bg-primary');
            btn.classList.add('bg-red-600', 'hover:bg-red-700');
        } else {
            // ESTADO: DESLOGADO
            if (textSpan) textSpan.innerText = "Minha Conta";
            if (iconSpan) iconSpan.innerText = "account_circle";
            
            btn.onclick = botaoLogin; // Muda função para abrir modal
            
            // Volta as cores originais
            btn.classList.remove('bg-red-600', 'hover:bg-red-700');
            btn.classList.add('bg-primary');
        }
    });
}

/* ##################################################################### */
/* LÓGICA DE AUTENTICAÇÃO (SUPABASE) */
/* ##################################################################### */

/**
 * Realiza o login com e-mail e senha
 */
async function realizarLogin() {
    // Certifique-se que os IDs dos inputs no HTML são 'email' e 'password'
    const email = document.getElementById('email').value;
    const senha = document.getElementById('password').value;

    if (!email || !senha) {
        alert("Ops! Você esqueceu de preencher o e-mail ou a senha. ✍️");
        return;
    }

    try {
        const { data, error } = await window.supabaseClient.auth.signInWithPassword({
            email: email,
            password: senha,
        });

        if (error) {
            console.error("Erro na autenticação:", error.message);
            alert("Erro ao entrar: " + error.message);
        } else {
            console.log("Bem-vindo de volta!", data.user.email);
            
            botaoLogin(); // Fecha o modal
            atualizarInterfaceUsuario(data.user); // Transforma o botão em "Sair"
            
            // Caso queira limpar os campos após o login
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        }
    } catch (err) {
        console.error("Erro inesperado:", err);
    }
}

/**
 * Finaliza a sessão do usuário
 */
async function logout() {
    const { error } = await window.supabaseClient.auth.signOut();
    if (error) {
        alert("Erro ao sair: " + error.message);
    } else {
        alert("Você saiu do sistema.");
        // Atualiza a interface para o estado deslogado
        atualizarInterfaceUsuario(null);
        // Opcional: recarrega a página para resetar todos os estados da SPA
        window.location.reload();
    }
}

/**
 * Solicita link de recuperação de senha
 */
async function solicitarRecuperacao() {
    const email = document.getElementById('email').value; // Usa o e-mail digitado no campo de login
    if (!email) return alert("Digite seu e-mail no campo de login primeiro.");

    const { error } = await window.supabaseClient.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.href,
    });

    if (error) alert(error.message);
    else alert("Link de recuperação enviado para seu e-mail!");
}

/* ##################################################################### */
/* INICIALIZAÇÃO */
/* ##################################################################### */

// Esta função roda assim que a página termina de carregar
window.addEventListener('load', async () => {
    // Verifica se já existe uma sessão ativa no Supabase
    const { data: { user } } = await window.supabaseClient.auth.getUser();
    
    if (user) {
        // Se o usuário já estiver logado (ex: deu F5), ajusta o botão para "Sair"
        atualizarInterfaceUsuario(user);
    }
});
</script>
    
</body>
</html>
