<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="index_style.css"> <!-- Vinculando o arquivo CSS -->
  <style>
    .card {
      opacity: 0; /* Inicialmente invisível */
      transform: translateY(20px); /* Desloca para baixo */
      transition: opacity 0.5s ease, transform 0.5s ease; /* Animação */
    }
    .card.visible {
      opacity: 1; /* Visível */
      transform: translateY(0); /* Retorna à posição original */
    }
  </style>
</head>
<body>
  <!-- Conteúdo principal -->
  <div class="container">
    <h1 class="slide-left">Welcome to My Website</h1>
    <p class="slide-right">Explore o site e conheça nossos serviços!</p>
    
    <!-- Botão com animação de confete -->
    <button id="confettiButton" class="btn btn-primary slide-bottom">
      Entrar no Site!
    </button>

    <!-- Card para imagem -->
    <div class="card mt-4" id="aboutCard">
      <img src="imag/aqui.jpg" class="card-img-top" alt="Minha Imagem">
      <div class="card-body">
        <h5 class="card-title">Aristides B. Pontes</h5>
        <p class="card-text">Sou especialista em marketing digital e desenvolvimento web. Meu objetivo é ajudar negócios a crescerem por meio de estratégias eficazes e criativas. Explore meu portfólio e descubra como posso ajudar você!</p>
        <button class="btn btn-secondary">Saiba Mais</button>
      </div>
    </div>
  </div>

  <!-- Efeito de confete e som -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
  <audio id="confettiSound" src="https://www.fesliyanstudios.com/play-mp3/6418" preload="auto"></audio> <!-- Som de confete -->
  
  <script src="index_script.js"></script> <!-- Vinculando o arquivo JS -->
  
  <!-- Script para animação do card e confete -->
  <script>
    window.onload = function() {
      const card = document.getElementById('aboutCard');
      card.classList.add('visible'); // Adiciona a classe para animar o card
    };

    document.getElementById('confettiButton').onclick = function() {
      const button = this;
      const rect = button.getBoundingClientRect(); // Posição do botão

      // Dispara confete a partir da posição do botão
      const count = 200;
      const spread = 70;
      const startX = rect.left + rect.width / 2; // Centro do botão
      const startY = rect.top + rect.height; // Abaixo do botão

      for (let i = 0; i < count; i++) {
        const x = Math.random() * spread - spread / 2 + startX;
        const y = Math.random() * spread - spread / 2 + startY;
        confetti({
          particleCount: 1,
          startVelocity: 30,
          spread: 360,
          origin: {
            x: x / window.innerWidth,
            y: y / window.innerHeight
          }
        });
      }

      // Reproduz o som do confete
      document.getElementById('confettiSound').play();
    };
  </script>
  
  <!-- Bootstrap JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
