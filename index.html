<!DOCTYPE html>

<head>

<body>

    <h1>Consulta de Dados</h1>
    <input type="text" id="tabelaInput" placeholder="Ex: categorias">
    <button onclick="realizarBusca()">Consultar</button>
    
    <div id="resultado" style="margin-top: 20px;"></div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase_config.js"></script>

    async function realizarBusca() {
    alert("Botão clicado!"); // Adicione isso para testar!
    const nomeTabela = document.getElementById('tabelaInput').value;
    const container = document.getElementById('resultado');
            

            
            if (!nomeTabela) return alert("Digite o nome da tabela!");

            container.innerHTML = "Carregando...";
            const dados = await buscarDados(nomeTabela);
            
            container.innerHTML = ""; // Limpa a tela

            if (!dados || dados.length === 0) {
                container.innerHTML = "<p>Nenhum dado encontrado ou tabela vazia.</p>";
                return;
            }

            // Cria um card visual para cada item encontrado
            dados.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                // Transforma o objeto em texto legível
                card.innerHTML = `<pre>${JSON.stringify(item, null, 2)}</pre>`;
                container.appendChild(card);
            });
        }
    </script>
</body>
