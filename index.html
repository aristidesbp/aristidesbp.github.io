<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bem-Vindo</title>

    <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Corpo da página */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #1d3557, #457b9d); /* Fundo azul */
            font-family: 'Arial', sans-serif;
            color: white;
            text-align: center;
        }

        /* Fundo das partículas */
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }

        /* Container principal */
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            max-width: 800px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.7); /* Fundo semi-transparente */
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-in-out;
        }

        /* Título */
        h1 {
            font-size: 3em;
            color: #ffcc00; /* Amarelo destacante */
            margin-bottom: 20px;
            animation: fadeInTitle 1.5s ease;
        }

        /* Parágrafo */
        p {
            font-size: 1.2em;
            color: #cccccc; /* Cinza claro */
            margin-bottom: 20px;
            line-height: 1.5;
        }

        /* Botão de ação */
        .button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1.2em;
            color: #1d3557;
            background-color: #ffcc00;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: #e0ac00; /* Tom mais escuro no hover */
        }

        /* Efeitos de fade-in */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeInTitle {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Ajustes responsivos */
        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }
            p {
                font-size: 1em;
            }
            .button {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <!-- Partículas de fundo -->
    <div id="particles-js"></div>

    <!-- Conteúdo principal -->
    <div class="container">
        <h1>Bem-vindo</h1>
        <p>Transforme suas ideias em realidade com soluções inovadoras em sites e campanhas digitais. Descubra como alcançar seus objetivos de forma estratégica e eficiente.</p>
        <p>"A propaganda é a alma do negócio" &bull; "Transforme sua ideia em resultados"</p>
        <button class="button" onclick="navigateToHome()">Saiba Mais</button>
    </div>

    <script>
        // Configuração das partículas
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80 },
                "size": { "value": 3 },
                "color": { "value": "#ffffff" },
                "line_linked": { "enable": true, "color": "#ffffff" },
                "move": { "speed": 2 }
            },
            "interactivity": {
                "events": { "onhover": { "enable": true, "mode": "repulse" } }
            }
        });

        // Função para redirecionamento
        function navigateToHome() {
            window.location.href = "assets/portifolio_aristides.html";
        }
    </script>
</body>
</html>
