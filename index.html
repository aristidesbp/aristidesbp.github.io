<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore My Website</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000; /* Fundo preto */
            margin: 0;
            overflow: hidden;
            color: white;
        }

        .container {
            text-align: center;
            padding: 20px;
            border: 2px solid #333;
            background-color: rgba(255, 255, 255, 0.9); /* Fundo com transparência */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            border-radius: 15px;
        }

        h1, p, button {
            opacity: 0;
            position: relative;
            color: #000;
        }

        h1 {
            animation: slideInLeft 2s forwards;
        }

        p {
            animation: slideInRight 2s forwards 0.5s;
        }

        button {
            animation: slideInUp 2s forwards 1s;
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1.2rem;
            border-radius: 5px;
            transition: all 0.3s ease-in-out;
        }

        #extraBox {
            width: 200px;
            height: 50px;
            margin: 20px auto;
            background-color: #ff6347;
            color: white;
            line-height: 50px;
            text-align: center;
            font-weight: bold;
            opacity: 0;
            animation: slideInDown 2s forwards 1.5s;
        }

        button:hover {
            background-color: #2ecc71;
            transform: scale(1.1);
        }

        /* Slide-in animations */
        @keyframes slideInLeft {
            from {
                left: -100%;
                opacity: 0;
            }
            to {
                left: 0;
                opacity: 1;
            }
        }

        @keyframes slideInRight {
            from {
                right: -100%;
                opacity: 0;
            }
            to {
                right: 0;
                opacity: 1;
            }
        }

        @keyframes slideInUp {
            from {
                top: 100%;
                opacity: 0;
            }
            to {
                top: 0;
                opacity: 1;
            }
        }

        @keyframes slideInDown {
            from {
                bottom: 100%;
                opacity: 0;
            }
            to {
                bottom: 0;
                opacity: 1;
            }
        }

        /* Fade-out animation */
        .fade-out {
            opacity: 1;
            animation: fadeOut 1s forwards;
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My Website!</h1>
        <p>Explore and get to know more about our amazing content.</p>
        <div id="extraBox">Discover More!</div>
        <button id="slideBtn">Click Me!</button>
    </div>

    <!-- Bootstrap 5 JS and Popper.js -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>

    <!-- JavaScript for animation and sound -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const slideBtn = document.getElementById("slideBtn");
            const container = document.querySelector(".container");

            // Load sound effect
            const audio = new Audio('https://www.fesliyanstudios.com/play-mp3/6418'); // Som de clique

            // Adiciona o evento de clique ao botão
            slideBtn.addEventListener("click", () => {
                // Play sound on click
                audio.play();

                // Fade out the container with a 1 second delay
                container.classList.add('fade-out');

                // Após 1 segundo, redireciona para home.html
                setTimeout(() => {
                    window.location.href = "home.html";
                }, 1000); // 1 segundo de espera para transição
            });
        });
    </script>
</body>
</html>
