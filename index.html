<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <!-- Link para o CSS -->
    <link href="css/style.css" rel="stylesheet">
    <!-- Link para Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- Conteúdo principal -->
    <div class="container">
        <h1 class="slide-left">Welcome to My Website</h1>
        <p class="slide-right">Explore the site and get to know our services!</p>
        
        <!-- Botão com animação de confete -->
        <button id="confettiButton" class="btn btn-primary slide-bottom">
            Clique em mim
        </button>
    </div>

    <!-- Carregar o script JS para o confetti e som -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <!-- Arquivo JS externo -->
    <script src="js/script.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
