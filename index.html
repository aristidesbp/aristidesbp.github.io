<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Serviços - IEB Nova Belém</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <header class="bg-blue-950 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-6 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="text-center sm:text-left">
                <h1 class="text-2xl font-bold tracking-wide">IGREJA BATISTA NOVA BELÉM</h1>
                <p class="text-xs text-amber-400 font-medium tracking-widest uppercase">Comunhão & Apoio Mútuo</p>
            </div>
            <div id="area-usuario" class="bg-blue-900/50 px-4 py-2 rounded-lg border border-blue-800 text-sm">
                <span class="text-gray-300">Carregando acesso...</span>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        
        <div class="mb-8 text-center sm:text-left">
            <h2 class="text-xl font-bold text-blue-950">Guia de Profissionais e Serviços</h2>
            <p class="text-sm text-gray-600">Contrate e apoie os irmãos da nossa comunidade pastoral.</p>
        </div>

        <div id="grid-servicos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <p class="text-gray-500 animate-pulse col-span-full text-center py-12">Buscando anúncios no painel da igreja...</p>
        </div>
    </main>

    <div id="modal-login" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-xl max-w-sm w-full p-6">
            <h3 class="text-lg font-bold text-blue-950 mb-2">Acesso ao Painel</h3>
            <p class="text-xs text-gray-500 mb-4">Entre com seu e-mail e senha cadastrados para gerenciar ou moderar.</p>
            <form id="form-login" class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold mb-1">E-mail</label>
                    <input type="email" id="login-email" required class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:border-blue-700">
                </div>
                <div>
                    <label class="block text-xs font-semibold mb-1">Senha</label>
                    <input type="password" id="login-senha" required class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:border-blue-700">
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="button" onclick="fecharLogin()" class="w-1/2 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-semibold py-2 rounded-lg transition-colors">Cancelar</button>
                    <button type="submit" class="w-1/2 bg-blue-950 hover:bg-blue-900 text-white text-sm font-semibold py-2 rounded-lg transition-colors">Entrar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ====================================================================
        // CONFIGURAÇÃO: COLE AS CREDENCIAIS DO SEU SUPABASE AQUI EMBAIXO
        // ====================================================================
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlpZGFldGNqZWVzcWRzY3B2cG9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMDYzMTAsImV4cCI6MjA5Nzc4MjMxMH0.Zc7kWdCBZzvVQFyY_Qoiw2h70PWFQ57T55vmDs13Tek"; 
        const SUPABASE_URL = "https://iidaetcjeesqdscpvpoa.supabase.co/rest/v1/";
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let usuarioLogado = null;
        let isAdmin = false;

        // Inicializar aplicação
        async function iniciarApp() {
            await checarUsuario();
            await carregarServicos();
        }

        // Verificar se há alguém logado e se é Admin
        async function checarUsuario() {
            const { data: { session } } = await supabase.auth.getSession();
            const areaUsuario = document.getElementById('area-usuario');
            
            if (session) {
                usuarioLogado = session.user;
                
                // Busca no espelho se este irmão possui privilégios de Admin
                const { data: perfil } = await supabase
                    .from('usuario_espelho')
                    .select('is_admin, nome_completo')
                    .eq('auth_users_id', usuarioLogado.id)
                    .single();

                if (perfil) {
                    isAdmin = perfil.is_admin;
                    areaUsuario.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div>
                                <p class="font-semibold text-xs text-white leading-none">${perfil.nome_completo}</p>
                                <p class="text-[10px] text-amber-400 font-bold">${isAdmin ? '👑 MODERADOR MASTER' : 'Irmão Logado'}</p>
                            </div>
                            <button onclick="deslogar()" class="text-xs bg-red-800/60 hover:bg-red-700 px-2 py-1 rounded text-white font-medium transition-colors">Sair</button>
                        </div>
                    `;
                }
            } else {
                usuarioLogado = null;
                isAdmin = false;
                areaUsuario.innerHTML = `
                    <button onclick="abrirLogin()" class="bg-amber-500 hover:bg-amber-600 text-blue-950 px-4 py-1 rounded font-bold text-xs uppercase tracking-wider transition-colors">Entrar no Sistema</button>
                `;
            }
        }

        // Buscar serviços direto da nossa VIEW de destaques do banco de dados
        async function carregarServicos() {
            const grid = document.getElementById('grid-servicos');
            
            const { data: servicos, error } = await supabase
                .from('v_servicos_destaque')
                .select('*');

            if (error || !servicos || servicos.length === 0) {
                grid.innerHTML = `<p class="text-gray-500 text-center col-span-full py-12">Nenhum anúncio ativo ou aprovado no momento.</p>`;
                return;
            }

            grid.innerHTML = ''; // Limpa o carregando

            servicos.forEach(servico => {
                const precoFormatado = servico.preco_estimado 
                    ? `A partir de: <strong class="text-blue-900">R$ ${parseFloat(servico.preco_estimado).toFixed(2)}</strong>`
                    : `<span class="text-gray-500 text-xs italic">${servico.preco_detalhe || 'Preço a combinar'}</span>`;

                // Constrói o cartão visual para cada serviço de irmão
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col justify-between hover:shadow-md transition-shadow";
                card.innerHTML = `
                    <div>
                        <div class="p-4 flex items-center gap-3 bg-gray-50/50 border-b border-gray-100">
                            <div class="w-8 h-8 rounded-full bg-blue-900 text-white flex items-center justify-center font-bold text-xs uppercase">
                                ${servico.prestador_nome.substring(0,2)}
                            </div>
                            <div>
                                <p class="text-[10px] text-gray-400 font-medium leading-none">Irmão indicado:</p>
                                <h4 class="text-xs font-bold text-gray-800">${servico.prestador_nome}</h4>
                            </div>
                        </div>
                        
                        ${servico.servico_foto_url ? `
                            <div class="h-40 w-full overflow-hidden">
                                <img src="${servico.servico_foto_url}" class="w-full h-full object-cover" alt="Foto do serviço">
                            </div>
                        ` : ''}

                        <div class="p-4 space-y-2">
                            <div class="flex justify-between items-start gap-2">
                                <h3 class="font-bold text-base text-gray-900 line-clamp-1">${servico.titulo}</h3>
                                <div class="flex items-center gap-0.5 bg-amber-50 border border-amber-200 text-amber-700 text-[10px] font-bold px-1.5 py-0.5 rounded">
                                    ⭐ ${servico.media_estrelas} (${servico.total_avaliacoes})
                                </div>
                            </div>
                            <p class="text-xs text-gray-600 line-clamp-3 leading-relaxed">${servico.descricao}</p>
                            <div class="text-xs pt-1">${precoFormatado}</div>
                        </div>
                    </div>

                    <div class="p-4 bg-gray-50 border-t border-gray-100 space-y-2">
                        <a href="https://wa.me/${servico.whatsapp ? servico.whatsapp.replace(/\D/g,'') : ''}" target="_blank" class="w-full bg-blue-900 hover:bg-blue-950 text-white text-xs font-bold py-2 px-4 rounded-lg flex items-center justify-center gap-2 transition-colors">
                            💬 Contatar via WhatsApp
                        </a>

                        ${isAdmin ? `
                            <button onclick="removerAnuncio(${servico.servico_id})" class="w-full bg-red-50 hover:bg-red-100 border border-red-200 text-red-700 text-[11px] font-bold py-1.5 rounded-lg flex items-center justify-center gap-1 transition-colors">
                                🗑️ Moderação: Remover por Infração
                            </button>
                        ` : ''}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Função de Moderação (Deletar Anúncio Inadequado)
        async function removerAnuncio(id) {
            if (confirm("Irmão Aristides, confirma a exclusão deste serviço por estar em desacordo com a conduta cristã da Nova Belém?")) {
                const { error } = await supabase
                    .from('servicos')
                    .delete()
                    .eq('id', id);

                if (error) {
                    alert("Erro ao remover: " + error.message);
                } else {
                    alert("Anúncio removido com sucesso do painel da igreja!");
                    await carregarServicos(); // Atualiza a tela na hora
                }
            }
        }

        // Funções Auxiliares de Login/Interface
        function abrirLogin() { document.getElementById('modal-login').classList.remove('hidden'); }
        function fecharLogin() { document.getElementById('modal-login').classList.add('hidden'); }
        
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const senha = document.getElementById('login-senha').value;

            const { error } = await supabase.auth.signInWithPassword({ email, password: senha });
            if (error) {
                alert("Falha no login: " + error.message);
            } else {
                fecharLogin();
                await iniciarApp();
            }
        });

        async function deslogar() {
            await supabase.auth.signOut();
            await iniciarApp();
        }

        // Inicialização automática ao carregar a página
        window.onload = iniciarApp;
    </script>
</body>
</html>
