<!DOCTYPE html>
<html lang="pt-BR"> <!-- Define o tipo de documento e a linguagem como português do Brasil -->
<head>
  <meta charset="UTF-8"> <!-- Define a codificação de caracteres como UTF-8 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Torna o site responsivo em dispositivos móveis -->
  <title>Aristides B. Pontes</title> <!-- Define o título da página que aparece na aba do navegador -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet"> <!-- Link para o CSS do Bootstrap -->
  <link rel="stylesheet" href="index_style.css"> <!-- Vincula o arquivo CSS personalizado -->
  
</head>

<body>
  <!-- Conteúdo principal -->
  <div class="container"> <!-- Cria um container centralizado e com espaçamento do Bootstrap -->
    <h1 class="slide-left">Bem-vindo ao meu site</h1> <!-- Título principal com animação -->
    <p class="slide-right">Explore o site e conheça os meus serviços!</p> <!-- Parágrafo introdutório com animação -->
    
    <!-- Botão com animação de confete -->
    <button id="confettiButton" class="btn btn-primary slide-bottom"> <!-- Botão principal com a classe de estilo do Bootstrap -->
      Entrar no Site! <!-- Texto do botão -->
    </button>

    <!-- Card para imagem e texto sobre Aristides -->
    <div class="card mt-4" id="aboutCard"> <!-- Div para o card com margem superior -->
      <img src="imag/aqui.jpg" class="card-img-top" alt="Minha Imagem"> <!-- Imagem dentro do card -->
      <div class="card-body"> <!-- Corpo do card com conteúdo -->
        <h5 class="card-title">Aristides B. Pontes</h5> <!-- Título dentro do card -->
        <p class="card-text">Sou especialista em marketing digital e desenvolvimento web. Meu objetivo é ajudar empresas a crescerem por meio de estratégias eficazes e criativas. Explore meu portfólio e veja como posso ajudar você!</p> <!-- Texto descritivo -->
        <button class="btn btn-secondary">Saiba Mais</button> <!-- Botão dentro do card -->
      </div>
    </div>
  </div>

  <!-- Efeito de confete e som -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script> <!-- Script da biblioteca de confetes -->
  <audio id="confettiSound" src="https://www.fesliyanstudios.com/play-mp3/6418" preload="auto"></audio> <!-- Áudio do efeito de confete -->

  <!-- Vincula o arquivo JS personalizado -->
  <script src="index_script.js"></script> 
  
    
  <!-- Bootstrap JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script> <!-- Link para os scripts do Bootstrap -->
</body>
</html>
