<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material de Estudo</title>
    
    <!-- Estilos CSS -->
    <style>
        /* Define o fundo animado */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        /* Canvas para a animação */
        #background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            z-index: -1;
        }

        /* Estilo do conteúdo */
        .container {
            position: relative;
            padding: 50px;
            z-index: 2;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            background: #2321;
        }

        ul {
            list-style: none;
            padding: 0;
       background: #174;
 }

        li {
            font-size: 1.5em;
            margin: 15px 0;
            opacity: 0;
            transform: translateX(-100%);
            transition: opacity 1s, transform 1s;
       background: #2321;
 }

        /* Botão para controlar o som */
        #audioControl {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 18px;
padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.3s;
        }

        #audioControl:hover {
            background: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <!-- Canvas para o fundo animado -->
    <canvas id="background"></canvas>

    <!-- Conteúdo principal -->
    <div class="container">
        <h1>Bem-vindo ao meu Material de Estudo</h1>
        <p>Aqui você encontra links para projetos e tutoriais</p>

        <ul id="menu">
            <li>🔹 <a href="#">Meu Portifólio</a></li>
            <li>🔹 <a href="poker/index.html">Jogar poker</a></li>
            <li>🔹 <a href="#">Projeto 3</a></li>
            <li>🔹 <a href="#">Tutorial 1</a></li>
            <li>🔹 <a href="#">Tutorial 2</a></li>
        </ul>
    </div>

    <!-- Botão para controlar o áudio -->
    <button id="audioControl">🎵 Som </button>

    <!-- Áudio de fundo -->
    <audio id="backgroundMusic" loop autoplay>
        <source src="https://www.bensound.com/bensound-music/bensound-creativeminds.mp3" type="audio/mp3">
    </audio>

    <!-- Script para animação do fundo -->
    <script>
        const canvas = document.getElementById("background");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];

        class Particle {
            constructor(x, y, size, speedX, speedY) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.speedX = speedX;
                this.speedY = speedY;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.size > 0.2) this.size -= 0.05;
            }

            draw() {
                ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }
        }

        function initParticles() {
            particlesArray = [];
            for (let i = 0; i < 100; i++) {
                let size = Math.random() * 5 + 2;
                let x = Math.random() * canvas.width;
                let y = Math.random() * canvas.height;
                let speedX = Math.random() * 1 - 0.5;
                let speedY = Math.random() * 1 - 0.5;
                particlesArray.push(new Particle(x, y, size, speedX, speedY));
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particlesArray.forEach((particle, index) => {
                particle.update();
                particle.draw();
                if (particle.size <= 0.2) {
                    particlesArray.splice(index, 1);
                    let size = Math.random() * 5 + 2;
                    let x = Math.random() * canvas.width;
                    let y = Math.random() * canvas.height;
                    let speedX = Math.random() * 1 - 0.5;
                    let speedY = Math.random() * 1 - 0.5;
                    particlesArray.push(new Particle(x, y, size, speedX, speedY));
                }
            });
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();

        // Ajustar canvas ao redimensionar a tela
        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        });

        // Animação de entrada dos itens ao rolar a página
        const items = document.querySelectorAll("li");

        function animateOnScroll() {
            items.forEach((item, index) => {
                const itemTop = item.getBoundingClientRect().top;
                const windowHeight = window.innerHeight;

                if (itemTop < windowHeight - 50) {
                    item.style.opacity = 1;
                    item.style.transform = index % 2 === 0 ? "translateX(0)" : "translateX(0)";
                }
            });
        }

        window.addEventListener("scroll", animateOnScroll);
        animateOnScroll();

        // Controle de áudio
        const audio = document.getElementById("backgroundMusic");
        const audioControl = document.getElementById("audioControl");

        audioControl.addEventListener("click", () => {
            if (audio.paused) {
                audio.play();
                audioControl.textContent = "🎵 Pausar Som";
            } else {
                audio.pause();
                audioControl.textContent = "🎵 Tocar Som";
            }
        });
    </script>
</body>
</html>
