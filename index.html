<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizinho Indica - AristidesBP</title>
    <link rel="stylesheet" href="assets/css/financeiro.css">
</head>
<body>

    <header>
        <h1>Bem-vindo ao Vizinho Indica</h1>
    </header>

    <main>
        <div id="status-conexao">Carregando configuração...</div>
        <button onclick="testarConsulta()">Testar Busca de Dados</button>
        <div id="resultado"></div>
    </main>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <script src="assets/js/supabase_config.js"></script>
    
    <script src="assets/js/supabase_crud.js"></script>

    <script>
        // Inicializa o cliente com as constantes que vêm do supabase_config.js
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        document.getElementById('status-conexao').innerText = "Supabase Conectado!";

        async function testarConsulta() {
            // Substitua 'nome_da_sua_tabela' pela tabela real no banco
            const dados = await buscarDados('nome_da_sua_tabela');
            document.getElementById('resultado').innerText = JSON.stringify(dados, null, 2);
        }
    </script>
</body>
</html>
