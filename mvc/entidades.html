<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ERP ABP - Gestão de Entidades</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: { "display": ["Inter"], "body": ["Inter"] },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        
        /* Scrollbar customizada para a lista */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Efeito de transição suave para Dark Mode */
        * { transition: background-color 0.2s, border-color 0.2s; }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
        
        <header class="flex items-center bg-white dark:bg-slate-900 p-4 border-b border-slate-200 dark:border-slate-800 justify-between sticky top-0 z-10">
            <a class="text-primary flex size-10 items-center justify-center hover:bg-primary/10 rounded-full transition-colors" href="menu.html">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <h2 class="text-lg font-bold flex-1 text-center">Gestão de Entidades</h2>
            <div class="w-10"></div> </header>

        <main class="max-w-2xl mx-auto w-full pb-12">
            
            <div class="flex p-6 justify-center">
                <div class="flex flex-col items-center gap-4 cursor-pointer group" id="avatar_container">
                    <div class="flex items-center justify-center bg-primary/10 dark:bg-primary/20 aspect-square rounded-full w-32 border-2 border-dashed border-primary/40 group-hover:border-primary overflow-hidden">
                        <span class="material-symbols-outlined text-primary text-5xl" id="avatar_placeholder_icon">person</span>
                        <img alt="Preview" class="hidden w-full h-full object-cover" id="avatar_img_preview" src=""/>
                    </div>
                    <p class="text-primary text-sm font-bold">Adicionar Foto</p>
                    <input accept="image/*" class="hidden" id="input_foto" type="file"/>
                </div>
            </div>

            <div class="px-4 py-3">
                <div class="flex h-12 items-center rounded-xl bg-slate-200 dark:bg-slate-800 p-1">
                    <label class="flex cursor-pointer h-full grow items-center justify-center rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:text-primary text-slate-600 dark:text-slate-400 text-sm font-bold transition-all">
                        <span>Paciente</span>
                        <input checked class="hidden" name="tipo_entidade" type="radio" value="Paciente"/>
                    </label>
                    <label class="flex cursor-pointer h-full grow items-center justify-center rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:text-primary text-slate-600 dark:text-slate-400 text-sm font-bold transition-all">
                        <span>Responsável</span>
                        <input class="hidden" name="tipo_entidade" type="radio" value="Responsável"/>
                    </label>
                    <label class="flex cursor-pointer h-full grow items-center justify-center rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:text-primary text-slate-600 dark:text-slate-400 text-sm font-bold transition-all">
                        <span>Colaborador</span>
                        <input class="hidden" name="tipo_entidade" type="radio" value="Colaborador"/>
                    </label>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 px-4 py-3">
                <div class="md:col-span-2">
                    <label class="text-sm font-semibold mb-2 block">Nome Completo</label>
                    <input class="w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 h-12 px-4" id="input_nome" placeholder="Digite o nome completo"/>
                </div>

                <div>
                    <label class="text-sm font-semibold mb-2 block">CPF</label>
                    <input class="w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 h-12 px-4" id="input_cpf" placeholder="000.000.000-00"/>
                </div>

                <div>
                    <label class="text-sm font-semibold mb-2 block">Nascimento</label>
                    <input class="w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 h-12 px-4" id="input_nascimento" type="date"/>
                </div>

                <div>
                    <label class="text-sm font-semibold mb-2 block">E-mail</label>
                    <input class="w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 h-12 px-4" id="input_email" type="email" placeholder="email@exemplo.com"/>
                </div>

                <div>
                    <label class="text-sm font-semibold mb-2 block">Telefone</label>
                    <input class="w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 h-12 px-4" id="input_telefone" placeholder="(00) 00000-0000"/>
                </div>

                <div class="md:col-span-2 mt-4 border-t border-slate-200 dark:border-slate-800 pt-4">
                    <h3 class="text-primary text-xs font-bold uppercase mb-4">Endereço</h3>
                </div>

                <div>
                    <label class="text-sm font-semibold mb-2 block">CEP</label>
                    <input class="w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 h-12 px-4" id="input_cep" placeholder="00000-000"/>
                </div>

                <div class="md:col-span-1">
                    <label class="text-sm font-semibold mb-2 block">UF</label>
                    <select class="w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 h-12 px-4" id="input_uf">
                        <option value="">Selecione</option>
                        <option value="PA">PA</option>
                        <option value="SP">SP</option>
                        </select>
                </div>

                <div class="md:col-span-2">
                    <label class="text-sm font-semibold mb-2 block">Logradouro</label>
                    <input class="w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 h-12 px-4" id="input_logradouro" placeholder="Rua, Av, etc."/>
                </div>
            </div>

            <div class="px-4 py-6">
                <h3 class="text-sm font-bold uppercase mb-4">Permissões de Acesso</h3>
                <div class="flex flex-wrap gap-6">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="check_permissao_ler" class="rounded text-primary focus:ring-primary w-5 h-5"/>
                        <span class="text-sm">Ler</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="check_permissao_editar" class="rounded text-primary focus:ring-primary w-5 h-5"/>
                        <span class="text-sm">Editar</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="check_permissao_cadastrar" class="rounded text-primary focus:ring-primary w-5 h-5"/>
                        <span class="text-sm">Cadastrar</span>
                    </label>
                </div>
            </div>

            <div class="flex flex-col gap-3 px-4 py-6">
                <button class="h-12 w-full rounded-xl bg-primary text-white font-bold shadow-lg shadow-primary/20 hover:opacity-90 transition-all" id="btn_salvar">
                    Salvar Registro
                </button>
                <button class="h-12 w-full rounded-xl bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-400 font-bold" id="btn_cancelar">
                    Cancelar
                </button>
            </div>

            <section class="mt-8 px-4 border-t border-slate-200 dark:border-slate-800 pt-8">
                <h2 class="text-lg font-bold mb-6 flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary">history</span> Cadastros Recentes
                </h2>
                <div class="space-y-3" id="entity_list_container">
                    </div>
            </section>
        </main>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="entidades_model.js"></script>
</body>
</html>
