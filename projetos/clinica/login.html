<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        // Helper to remove loading state
        function revealApp() {
            const loader = document.getElementById('app-loader');
            const content = document.getElementById('app-content');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 300);
            }
            if (content) {
                content.classList.remove('opacity-0');
            }
        }

        // Initialize App and Session Check
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                // Ensure Supabase is available
                if (!window.supabaseClient) {
                    console.error('Supabase client not initialized. Check supabase_config.js.');
                    revealApp();
                    return;
                }

                // Check for existing session
                const { data: { session }, error } = await window.supabaseClient.auth.getSession();
                
                if (session) {
                    // Redirect to dashboard if already logged in
                    window.location.href = 'pedagogo_dashboard.html';
                } else {
                    // Stay on login and show content
                    revealApp();
                }
            } catch (err) {
                console.error('Error during initialization:', err);
                revealApp();
            }
        });

        async function realizar_login() {
            const email = document.getElementById('input-email').value;
            const password = document.getElementById('input-senha').value;
            const recaptcha = document.getElementById('recaptcha');
            const recaptchaBox = document.getElementById('recaptcha-box');
            const submitBtn = document.getElementById('submitBtn');
            const errorMessage = document.getElementById('errorMessage');

            // Reset states
            errorMessage.classList.add('hidden');
            recaptchaBox.classList.remove('border-red-500', 'bg-red-50');

            // Validation
            if (!recaptcha.checked) {
                errorMessage.textContent = 'Por favor, confirme que você não é um robô.';
                errorMessage.classList.remove('hidden');
                recaptchaBox.classList.add('border-red-500', 'bg-red-50');
                return;
            }

            if (!email || !password) {
                errorMessage.textContent = 'Por favor, preencha todos os campos.';
                errorMessage.classList.remove('hidden');
                return;
            }

            // UI feedback
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70', 'cursor-not-allowed');

            try {
                const { data, error } = await window.supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) {
                    errorMessage.textContent = 'Erro ao entrar: ' + (error.message === 'Invalid login credentials' ? 'E-mail ou senha incorretos.' : error.message);
                    errorMessage.classList.remove('hidden');
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
                } else {
                    window.location.href = 'pedagogo_dashboard.html';
                }
            } catch (err) {
                errorMessage.textContent = 'Erro de conexão. Tente novamente.';
                errorMessage.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        }

        // Bind form
        const loginForm = document.getElementById('loginForm');
        if (loginForm) {
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                realizar_login();
            });
        }

        // UI Extras
        const toggleBtn = document.getElementById('togglePassword');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                const input = document.getElementById('input-senha');
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                document.getElementById('eyeIcon').textContent = type === 'password' ? 'visibility' : 'visibility_off';
            });
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            min-height: max(884px, 100dvh);
        }
        #recaptcha-box.invalid {
            border-color: #ef4444;
            background-color: #fef2f2;
        }
        /* Cloak Strategy */
        [v-cloak] {
            display: none !important;
        }
        #app-loader {
            display: flex;
            position: fixed;
            inset: 0;
            z-index: 50;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fc;
            transition: opacity 0.3s ease-out;
        }
        .dark #app-loader {
            background-color: #0f172a;
        }
    </style>

<span>reCAPTCHA</span>
<div class="flex gap-1">
<a class="hover:underline" href="#">Privacidade</a>
<a class="hover:underline" href="#">Termos</a>
</div>
</div>
</div>
<div class="pt-2">
<button class="relative flex w-full items-center justify-center rounded-lg bg-primary py-3 px-4 text-sm font-bold text-white shadow-md transition-all hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary/50 active:scale-[0.98] gap-2" id="submitBtn" type="submit">
<span id="btnText">Entrar</span>

</form>
<div class="mt-8 text-center">
<div class="pt-6 border-t border-slate-100 dark:border-slate-800">
<div class="flex flex-col items-center">

                            Informe seu e-mail cadastrado e enviaremos as instruções para você criar uma nova senha.

<form action="#" class="w-full space-y-4">
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">

</div>
<input class="block w-full pl-11 pr-4 py-3 border border-slate-300 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-50 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-sm" id="recovery-email" name="email" placeholder="seu@email.com" required="" type="email"/>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">

<input class="block w-full pl-11 pr-4 py-3 border border-slate-300 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-50 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-sm" id="recovery-phone" name="phone" placeholder="(00) 00000-0000" required="" type="tel"/>

<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3 px-6 rounded-lg flex items-center justify-center gap-2 transition-all active:scale-[0.98] shadow-md shadow-primary/10 text-sm" id="btn-recovery-send" type="submit">
<span class="material-symbols-outlined text-lg">send</span>

                            </button>
</form>
</div>
</div>
</div>
</div>
</div>
