<span class="hidden" id="btn_salvar_loader"><span class="material-symbols-outlined loading-spinner">progress_activity</span></span>

<script src="supabase_config.js"></script>
<script src="navbar.js"></script>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const avatarContainer = document.getElementById('avatar_container');
            const inputFoto = document.getElementById('input_foto');
            const imagePreview = document.getElementById('image_preview');
            const avatarIcon = document.getElementById('avatar_icon');
            const avatarText = document.getElementById('avatar_text');
            const inputCep = document.getElementById('input_cep');
            const btnSalvar = document.getElementById('btn_salvar');
            const btnSalvarText = document.getElementById('btn_salvar_text');
            const btnSalvarLoader = document.getElementById('btn_salvar_loader');
            const btnCancelar = document.getElementById('btn_cancelar');

            // Image Preview Functionality
            avatarContainer.addEventListener('click', () => inputFoto.click());
            inputFoto.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        imagePreview.src = event.target.result;
                        imagePreview.classList.remove('hidden');
                        avatarIcon.classList.add('hidden');
                        avatarText.innerText = 'Alterar Foto';
                    };
                    reader.readAsDataURL(file);
                }
            });

            // CEP Auto-fill
            inputCep.addEventListener('blur', async (e) => {
                const cep = e.target.value.replace(/\D/g, '');
                if (cep.length === 8) {
                    try {
                        const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                        const data = await response.json();
                        if (!data.erro) {
                            document.getElementById('input_logradouro').value = data.logradouro || '';
                            document.getElementById('input_bairro').value = data.bairro || '';
                            document.getElementById('input_cidade').value = data.localidade || '';
                            document.getElementById('input_uf').value = data.uf || '';
                            document.getElementById('input_numero').focus();
                        }
                    } catch (err) {
                        console.error('Erro ao buscar CEP:', err);
                    }
                }
            });

            // registration Function
            async function cadastrarEntidade() {
                // UI Loading State
                btnSalvar.disabled = true;
                btnSalvarText.classList.add('hidden');
                btnSalvarLoader.classList.remove('hidden');

                try {
                    const formData = {
                        tipo: document.querySelector('input[name="tipo_entidade"]:checked').value,
                        nome: document.getElementById('input_nome').value,
                        cpf: document.getElementById('input_cpf').value,
                        nascimento: document.getElementById('input_nascimento').value,
                        email: document.getElementById('input_email').value,
                        telefone: document.getElementById('input_telefone').value,
                        cep: document.getElementById('input_cep').value,
                        logradouro: document.getElementById('input_logradouro').value,
                        numero: document.getElementById('input_numero').value,
                        bairro: document.getElementById('input_bairro').value,
                        cidade: document.getElementById('input_cidade').value,
                        uf: document.getElementById('input_uf').value,
                        permissao_ler: document.getElementById('check_permissao_ler').checked,
                        permissao_editar: document.getElementById('check_permissao_editar').checked,
                        permissao_cadastrar: document.getElementById('check_permissao_cadastrar').checked,
                        permissao_deletar: document.getElementById('check_permissao_deletar').checked,
                        urls_acesso: document.getElementById('textarea_urls_acesso').value
                    };

                    // Execute RPC call to Supabase
                    const { data, error } = await supabase.rpc('cadastrar_entidade', formData);

                    if (error) throw error;

                    alert('Entidade cadastrada com sucesso!');
                    window.location.href = 'listar_entidades.html';

                } catch (error) {
                    console.error('Erro ao cadastrar:', error);
                    alert('Ocorreu um erro ao realizar o cadastro. Verifique os dados e tente novamente.');
                } finally {
                    btnSalvar.disabled = false;
                    btnSalvarText.classList.remove('hidden');
                    btnSalvarLoader.classList.add('hidden');
                }
            }

            // Event Listeners
            btnSalvar.addEventListener('click', (e) => {
                e.preventDefault();
                cadastrarEntidade();
            });

            btnCancelar.addEventListener('click', () => {
                window.location.href = 'listar_entidades.html';
            });

            // Toggle menu logic
            const btnMenu = document.getElementById('btn_menu');
            const dropdownMenu = document.getElementById('dropdown_menu');
            btnMenu?.addEventListener('click', (e) => {
                e.stopPropagation();
                dropdownMenu?.classList.toggle('hidden');
            });
            document.addEventListener('click', () => dropdownMenu?.classList.add('hidden'));
        });
    </script>
</body></html>
