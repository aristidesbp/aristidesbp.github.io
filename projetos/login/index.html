<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Fontes Comportamentais - Login</title>
    <link href="link_rel_stylesheet_href/login.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary": "#822800",
                        "on-tertiary-fixed-variant": "#812800",
                        "on-background": "#191c1e",
                        "background": "#f7f9fb",
                        "on-secondary-fixed-variant": "#344765",
                        "surface-variant": "#e0e3e5",
                        "surface-bright": "#f7f9fb",
                        "on-surface-variant": "#424654",
                        "secondary": "#4c5f7d",
                        "tertiary-container": "#a93802",
                        "on-tertiary-fixed": "#380d00",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                        "inverse-on-surface": "#eff1f3",
                        "surface": "#f7f9fb",
                        "surface-dim": "#d8dadc",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#d5e3ff",
                        "tertiary-fixed": "#ffdbcf",
                        "on-secondary-fixed": "#051c37",
                        "on-primary-fixed": "#001847",
                        "surface-container-highest": "#e0e3e5",
                        "secondary-fixed-dim": "#b4c7ea",
                        "on-primary-container": "#ccd8ff",
                        "secondary-container": "#c7dbff",
                        "primary-fixed": "#dae2ff",
                        "primary-container": "#0056d2",
                        "inverse-primary": "#b2c5ff",
                        "outline-variant": "#c3c6d6",
                        "surface-container": "#eceef0",
                        "tertiary-fixed-dim": "#ffb59b",
                        "inverse-surface": "#2d3133",
                        "on-tertiary-container": "#ffcebd",
                        "on-error": "#ffffff",
                        "outline": "#737785",
                        "on-surface": "#191c1e",
                        "error": "#ba1a1a",
                        "primary-fixed-dim": "#b2c5ff",
                        "on-primary-fixed-variant": "#0040a1",
                        "surface-container-low": "#f2f4f6",
                        "on-secondary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#0056d2",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#0040a1",
                        "on-secondary-container": "#4d607e",
                        "surface-container-high": "#e6e8ea"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
  
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-4 font-body">
    
    <main class="w-full max-w-[440px] bg-surface-container-lowest rounded-xl p-8 transition-all">
        <header class="mb-10">
            <h1 class="text-display-sm font-headline font-extrabold tracking-tight">Entrar</h1>
            <p class="text-on-surface-variant mt-2">Bem-vindo ao seu cofre digital.</p>
        </header>

        <div id="auth-error" class="hidden mb-6 p-4 rounded-lg bg-error-container text-on-error-container text-sm flex items-center gap-3">
            <span class="material-symbols-outlined text-sm">error</span>
            <p id="error-message"></p>
        </div>

        <form id="login-form" class="space-y-6">
            <div class="space-y-2">
                <label for="email" class="text-sm font-medium ml-1">E-mail</label>
                <input type="email" id="email" required 
                       class="w-full bg-surface-container-low border-none rounded-lg p-4 focus:ring-2 focus:ring-primary transition-all"
                       placeholder="nome@exemplo.com">
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center px-1">
                    <label for="password" class="text-sm font-medium">Senha</label>
                    <a href="recuperar_senha.html" class="text-xs text-tertiary font-bold hover:underline">Esqueceu?</a>
                </div>
                <div class="relative">
                    <input type="password" id="password" required 
                           class="w-full bg-surface-container-low border-none rounded-lg p-4 pr-12 focus:ring-2 focus:ring-primary transition-all"
                           placeholder="••••••••">
                    <button type="button" id="password-toggle" class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant">
                        <span class="material-symbols-outlined">visibility</span>
                    </button>
                </div>
            </div>

            <div class="cf-turnstile" data-sitekey="SUA_SITE_KEY_AQUI" data-theme="dark"></div>

            <button type="submit" id="submit-btn" 
                    class="w-full bg-primary text-on-primary font-bold py-4 rounded-lg hover:opacity-90 active:scale-[0.98] transition-all flex justify-center items-center gap-2">
                <span>Acessar Sistema</span>
                <span class="material-symbols-outlined text-sm">arrow_forward</span>
            </button>
        </form>

        <footer class="mt-8 pt-8 border-t border-surface-container-high text-center">
            <button id="google-login" class="flex items-center justify-center gap-3 w-full p-3 rounded-lg border border-surface-container-high hover:bg-surface-container-low transition-colors">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pjax/google.svg" width="18" alt="Google">
                <span class="text-sm font-medium">Continuar com Google</span>
            </button>
        </footer>
    </main>

    <script src="supabase_config.js"></script>
    <script src="login.js"></script>
</body>
</html>
