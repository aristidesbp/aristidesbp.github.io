<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Painel do Supervisor - ERP-PSC</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Lexend"],
                        "sans": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar for a cleaner mobile look */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Main Container (Mobile Viewport Optimized) -->
<div class="flex-1 w-full max-w-[430px] mx-auto bg-white dark:bg-slate-900 shadow-xl flex flex-col min-h-screen relative overflow-hidden">
<!-- Header Section -->
<header class="p-5 flex items-center justify-between bg-white dark:bg-slate-900 z-10">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-blue-50 dark:bg-primary/10 flex items-center justify-center text-primary shadow-sm" id="header-supervisor-icon">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">shield</span>
</div>
<h1 class="text-xl font-bold tracking-tight text-slate-800 dark:text-white" id="titulo-supervisor">Painel do Supervisor</h1>
</div>
</header>
<!-- Scrollable Content -->
<main class="flex-1 overflow-y-auto px-5 pb-8">
<!-- Summary Cards Section -->
<section class="grid grid-cols-2 gap-4 mb-8">
<!-- Pacientes Ativos (Full Width) -->
<div class="col-span-2 p-5 rounded-2xl bg-[#f0f7ff] dark:bg-primary/5 border border-blue-100 dark:border-primary/10 flex flex-col gap-2 relative shadow-sm" id="stat-total-pacientes">
<span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Pacientes Ativos</span>
<div class="flex items-center justify-between">
<span class="text-4xl font-bold text-primary">128</span>
<a aria-label="Ver Pacientes" class="flex items-center justify-center w-12 h-12 rounded-full bg-primary text-white shadow-md active:scale-95 transition-transform" href="entidades.html">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">groups</span>
</a>
</div>
</div>
<!-- Média Adesão -->
<div class="p-5 rounded-2xl bg-slate-50 dark:bg-slate-800/50 border border-slate-100 dark:border-slate-800 flex flex-col gap-2 shadow-sm" id="stat-media-adesao">
<span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-tight">Média Adesão Semanal</span>
<div class="flex items-center gap-2">
<span class="text-2xl font-bold text-slate-800 dark:text-white">84%</span>
<div class="flex items-center text-emerald-500 text-xs font-bold">
<span class="material-symbols-outlined text-sm font-bold">arrow_upward</span>
<span>5%</span>
</div>
</div>
</div>
<!-- Tarefas em Atraso -->
<div class="p-5 rounded-2xl bg-slate-50 dark:bg-slate-800/50 border border-slate-100 dark:border-slate-800 flex flex-col gap-2 shadow-sm" id="stat-atraso">
<span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-tight">Tarefas em Atraso</span>
<div class="flex items-center gap-2">
<span class="text-2xl font-bold text-rose-500">12</span>
<div class="w-6 h-6 rounded-full bg-rose-100 dark:bg-rose-900/30 flex items-center justify-center">
<span class="material-symbols-outlined text-rose-500 text-sm" style="font-variation-settings: 'FILL' 1;">schedule</span>
</div>
</div>
</div>
</section>
<!-- Section Title -->
<div class="mb-5">
<h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Módulos do Sistema</h2>
</div>
<!-- Quick Actions Grid -->
<section class="grid grid-cols-2 gap-4">
<!-- Entidades -->
<a class="aspect-square p-4 rounded-2xl bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 flex flex-col items-center justify-center gap-3 text-center shadow-sm active:bg-slate-50 dark:active:bg-slate-700 transition-all border-b-2" href="listar_entidades.html" id="link-modulo-entidades">
<div class="w-12 h-12 rounded-full bg-blue-50 dark:bg-blue-900/30 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">groups</span>
</div>
<span class="text-sm font-bold text-slate-700 dark:text-slate-200">Entidades</span>
</a>
<!-- Financeiro -->
<a class="aspect-square p-4 rounded-2xl bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 flex flex-col items-center justify-center gap-3 text-center shadow-sm active:bg-slate-50 dark:active:bg-slate-700 transition-all border-b-2" href="listar_financeiro.html" id="link-modulo-financeiro">
<div class="w-12 h-12 rounded-full bg-emerald-50 dark:bg-emerald-900/30 flex items-center justify-center text-emerald-600">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">payments</span>
</div>
<span class="text-sm font-bold text-slate-700 dark:text-slate-200">Financeiro</span>
</a>
<!-- Planos 6M -->
<a class="aspect-square p-4 rounded-2xl bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 flex flex-col items-center justify-center gap-3 text-center shadow-sm active:bg-slate-50 dark:active:bg-slate-700 transition-all border-b-2" href="plano_lista.html" id="link-modulo-planos">
<div class="w-12 h-12 rounded-full bg-amber-50 dark:bg-amber-900/30 flex items-center justify-center text-amber-600">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">description</span>
</div>
<span class="text-sm font-bold text-slate-700 dark:text-slate-200">Planos 6M</span>
</a>
<!-- Agenda -->
<a class="aspect-square p-4 rounded-2xl bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 flex flex-col items-center justify-center gap-3 text-center shadow-sm active:bg-slate-50 dark:active:bg-slate-700 transition-all border-b-2" href="https://calendar.google.com" id="link-modulo-agenda" target="_blank">
<div class="w-12 h-12 rounded-full bg-indigo-50 dark:bg-indigo-900/30 flex items-center justify-center text-indigo-600">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">calendar_month</span>
</div>
<span class="text-sm font-bold text-slate-700 dark:text-slate-200">Agenda</span>
</a>
<!-- Criar Tarefas -->
<a class="aspect-square p-4 rounded-2xl bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 flex flex-col items-center justify-center gap-3 text-center shadow-sm active:bg-slate-50 dark:active:bg-slate-700 transition-all border-b-2" href="tarefas.html" id="link-modulo-tarefas">
<div class="w-12 h-12 rounded-full bg-rose-50 dark:bg-rose-900/30 flex items-center justify-center text-rose-600">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">checklist</span>
</div>
<span class="text-sm font-bold text-slate-700 dark:text-slate-200">Criar Tarefas</span>
</a>
<!-- Solicitações -->
<a class="aspect-square p-4 rounded-2xl bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 flex flex-col items-center justify-center gap-3 text-center shadow-sm active:bg-slate-50 dark:active:bg-slate-700 transition-all border-b-2" href="solicitacoes.html" id="modulo-solicitacoes">
<div class="w-12 h-12 rounded-full bg-pink-50 dark:bg-pink-900/30 flex items-center justify-center text-pink-600">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">description</span>
</div>
<span class="text-sm font-bold text-slate-700 dark:text-slate-200">Solicitações</span>
</a>
</section>
</main>
<!-- Bottom Navigation Spacer (if needed) -->
<div class="h-4 w-full"></div>
</div>
</body></html>
