<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano de Metas - ERP ABP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="../model/supabase_config.js"></script>
    <script src="../model/verificar_login.js"></script>
    <script src="../controller/navbar.js"></script>
</head>
<body class="bg-slate-50 pt-20">
    <div id="navbar"></div>

    <div class="max-w-4xl mx-auto p-4">
        <div class="bg-white p-6 rounded-xl shadow-sm mb-6">
            <h2 class="text-2xl font-bold text-slate-800 mb-4">Plano de Intervenção (6 Meses)</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-sm font-medium text-slate-600">Selecionar Paciente *</label>
                    <select id="select-paciente" class="w-full border rounded-lg p-2 mt-1" onchange="loadMetas()">
                        <option value="">Carregando pacientes...</option>
                    </select>
                </div>
            </div>

            <div class="border-t pt-4">
                <h4 class="font-bold text-slate-700 mb-3 text-sm uppercase">Nova Habilidade</h4>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <input type="text" id="habilidade" placeholder="Ex: Leitura Fluente" class="border rounded-lg p-2 text-sm">
                    <input type="text" id="criterio" placeholder="Critério de Alta" class="border rounded-lg p-2 text-sm">
                    <button onclick="salvarMeta()" class="bg-emerald-500 text-white rounded-lg px-4 py-2 hover:bg-emerald-600 transition">
                        <i class="fas fa-plus mr-2"></i>Adicionar Meta
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-100 border-b">
                        <th class="p-4 text-xs font-bold text-slate-500 uppercase">Habilidade</th>
                        <th class="p-4 text-xs font-bold text-slate-500 uppercase">Critério de Alta</th>
                        <th class="p-4 text-xs font-bold text-slate-500 uppercase text-center">Status</th>
                        <th class="p-4 text-xs font-bold text-slate-500 uppercase text-right">Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-metas">
                    <tr><td colspan="4" class="p-8 text-center text-slate-400">Selecione um paciente para ver as metas.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="../model/model_clinica_metas.js"></script>
</body>
</html>
