<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Livro</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>Editar Livro</h1>
    <form method="POST">
        <label>Título:</label>
        <input type="text" name="titulo" value="{{ livro[1] }}" required><br>

        <label>Autor:</label>
        <input type="text" name="autor" value="{{ livro[2] }}" required><br>

        <label>Preço:</label>
        <input type="number" name="preco" step="0.01" value="{{ livro[3] }}" required><br>

        <button type="submit">Salvar Alterações</button>
    </form>
</body>
</html>
