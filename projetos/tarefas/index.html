<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP ABP - Gestão de Tarefas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="tela-login" class="flex justify-center items-center h-screen bg-slate-900" style="display: none;">
        <div class="bg-white p-10 rounded-xl w-full max-w-sm text-center border-t-4 border-emerald-500 shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 text-slate-800">ERP ABP</h2>
            <input type="email" id="login-email" placeholder="E-mail" class="input-field mb-4">
            <input type="password" id="login-senha" placeholder="Senha" class="input-field mb-6">
            <button class="bg-emerald-500 hover:bg-emerald-600 text-white w-full p-3 rounded font-bold transition" onclick="fazerLogin()">Entrar</button>
        </div>
    </div>

    <div id="tela-sistema" style="display: none;">
        <nav class="navbar">
            <div class="font-bold text-slate-800 text-xl"><i class="fas fa-tasks text-emerald-500"></i> Gestão de Exercícios</div>
            <button class="text-red-500 font-bold hover:underline" onclick="fazerLogout()">Sair</button>
        </nav>

        <div class="container">
            <div class="card">
                <h3 id="form-title" class="text-xl font-bold mb-4 text-slate-800">Nova Atividade</h3>
                <input type="hidden" id="edit-id">

                <div class="section-title">Informações Básicas</div>
                <div class="form-grid">
                    <div class="col-span-full md:col-span-2"><label>Título do Exercício *</label><input type="text" id="titulo"></div>
                    <div><label>Categoria</label><input type="text" id="categoria"></div>
                    <div>
                        <label>Código de Barras</label>
                        <div class="barcode-group">
                            <input type="text" id="codigo_de_barras">
                            <button class="btn-scan" onclick="startScanner()"><i class="fas fa-barcode"></i></button>
                        </div>
                    </div>
                </div>

                <div id="reader-container">
                    <div id="reader"></div>
                    <button id="btn-stop-scanner" class="bg-red-500 text-white p-2 rounded w-full my-2 font-bold hidden" onclick="stopScanner()">Fechar Câmera</button>
                </div>

                <div class="section-title">Conteúdo e Mídia</div>
                <textarea id="descricao" rows="3" placeholder="Enunciado..."></textarea>

                <div class="form-grid mt-4">
                    <div>
                        <label>Foto da Resolução</label>
                        <input type="file" id="foto_resolucao" accept="image/*" capture="environment">
                    </div>
                    <div>
                        <label>Gravar Áudio</label>
                        <button class="btn-audio-action" id="btn-audio" onclick="toggleGravacao()"><i class="fas fa-microphone"></i> Gravar Leitura</button>
                        <audio id="audio-preview" controls class="hidden w-full mt-2 h-8"></audio>
                    </div>
                </div>

                <button class="btn-add mt-6" id="btn-save" onclick="handleSave()">Salvar Registro</button>
                <button class="btn-cancel hidden" id="btn-cancel" onclick="resetForm()">Cancelar Edição</button>
            </div>

            <div class="card">
                <div class="flex items-center gap-2 mb-4">
                    <i class="fas fa-search text-slate-400"></i>
                    <input type="text" id="inputBusca" placeholder="Pesquisar..." onkeyup="filtrarTabela()" class="w-full">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-50 text-slate-500 text-xs uppercase">
                                <th class="p-4">Atividade</th>
                                <th class="p-4">Status</th>
                                <th class="p-4 text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="exercises-list"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="supabase_config.js"></script>
    <script src="app.js"></script>
</body>
</html>
