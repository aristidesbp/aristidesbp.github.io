<!-- index.html -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player de Mídia - AristidesBP</title>
  <link rel="stylesheet" href="style.css"> <!-- Link para o CSS externo -->
</head>
<body>
  <header>
    <h1>Player de Mídia</h1> <!-- Título principal da página -->
  </header>

  <main>
    <!-- Seção de reprodução de música -->
    <section id="musicPlayer">
      <h2>Reprodução de Música</h2>
      <audio id="audioElement" controls>
        <source src="musica.mp3" type="audio/mpeg"> <!-- Caminho do áudio -->
        Seu navegador não suporta o elemento de áudio.
      </audio>
    </section>

    <!-- Seção de reprodução de vídeo -->
    <section id="videoPlayer">
      <h2>Reprodução de Vídeo</h2>
      <video id="videoElement" controls width="560" height="315">
        <source src="video.mp4" type="video/mp4"> <!-- Caminho do vídeo -->
        Seu navegador não suporta o elemento de vídeo.
      </video>
    </section>
  </main>

  <script src="player.js"></script> <!-- Importa o script JS -->
</body>
</html>
