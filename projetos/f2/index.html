<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro ERP ABP</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Supabase JS Client -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <!-- QR Code Reader -->
    <script src="https://unpkg.com/html5-qrcode@2.3.5/dist/html5-qrcode.min.js"></script>
    
    <!-- Estilos Customizados -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 font-sans">

    <!-- ====================================================================
         TELA DE LOGIN
         ==================================================================== -->
    <div id="telaLogin" class="hidden min-h-screen flex items-center justify-center bg-gradient-to-br from-emerald-50 to-slate-100 p-4">
        <div class="bg-white p-8 rounded-xl shadow-xl max-w-sm w-full border-t-4 border-emerald-500">
            <div class="text-center mb-8">
                <i class="fas fa-wallet text-5xl text-emerald-500 mb-4 block"></i>
                <h1 class="text-3xl font-bold text-slate-800">Financeiro ERP</h1>
                <p class="text-slate-500 text-sm mt-2">Gerenciador de contas financeiras</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">E-mail</label>
                    <input 
                        type="email" 
                        id="loginEmail" 
                        placeholder="seu@email.com"
                        class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 transition"
                        onkeyup="if(event.key === 'Enter') Auth.login()">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Senha</label>
                    <input 
                        type="password" 
                        id="loginSenha" 
                        placeholder="••••••••"
                        class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 transition"
                        onkeyup="if(event.key === 'Enter') Auth.login()">
                </div>
                
                <button 
                    id="btnLogin"
                    onclick="Auth.login()" 
                    class="w-full bg-emerald-500 text-white font-semibold py-2.5 rounded-lg hover:bg-emerald-600 transition shadow-md">
                    <i class="fas fa-sign-in-alt mr-2"></i> Entrar
                </button>
            </div>
            
            <p class="text-center text-xs text-slate-500 mt-6">
                🔒 Dados protegidos por Supabase (PostgreSQL + RLS)
            </p>
        </div>
    </div>

    <!-- ====================================================================
         TELA PRINCIPAL DO SISTEMA
         ==================================================================== -->
    <div id="telaSistema" class="hidden">
        
        <!-- Navbar Fixa -->
        <nav class="fixed top-0 left-0 w-full bg-white border-b border-slate-200 z-40 shadow-sm">
            <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <button onclick="UI.toggleSidebar()" class="lg:hidden text-slate-600 hover:text-emerald-500">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                    <div>
                        <h1 class="hidden sm:block text-xl font-bold text-slate-800">
                            <i class="fas fa-wallet text-emerald-500 mr-2"></i> Financeiro ERP ABP
                        </h1>
                        <h1 class="sm:hidden text-lg font-bold text-slate-800">Financeiro</h1>
                    </div>
                </div>
                
                <div class="flex items-center gap-4">
                    <span id="userEmail" class="hidden sm:inline text-sm text-slate-600"></span>
                    <button 
                        onclick="Auth.logout()" 
                        class="text-slate-500 hover:text-red-500 transition font-semibold text-sm">
                        <i class="fas fa-sign-out-alt"></i> <span class="hidden sm:inline ml-2">Sair</span>
                    </button>
                </div>
            </div>
        </nav>

        <!-- Sidebar Menu (Mobile) -->
        <div id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-slate-800 text-white transform -translate-x-full transition-transform duration-300 z-50 shadow-2xl pt-20 lg:hidden">
            <div class="p-4 space-y-2">
                <button 
                    onclick="UI.changePage('listagem'); UI.toggleSidebar()" 
                    class="w-full text-left px-4 py-2.5 rounded-lg hover:bg-slate-700 transition">
                    <i class="fas fa-list mr-3 w-5"></i> Lançamentos
                </button>
                <button 
                    onclick="UI.changePage('formulario'); UI.toggleSidebar()" 
                    class="w-full text-left px-4 py-2.5 rounded-lg hover:bg-slate-700 transition">
                    <i class="fas fa-plus-circle mr-3 w-5"></i> Novo Lançamento
                </button>
            </div>
        </div>

        <!-- Overlay Sidebar -->
        <div id="sidebarOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden lg:hidden" onclick="UI.toggleSidebar()"></div>

        <!-- Container Principal -->
        <div class="pt-20 pb-10">
            <div class="max-w-6xl mx-auto px-4 space-y-6">

                <!-- ========== ABA: FORMULÁRIO ========== -->
                <section id="pagFormulario" class="hidden">
                    <div class="bg-white rounded-xl shadow-md p-6">
                        <div class="mb-6 border-b pb-4">
                            <h2 class="text-2xl font-bold text-slate-800">
                                <i class="fas fa-plus-circle text-emerald-500 mr-2"></i>
                                <span id="formTitulo">Novo Lançamento</span>
                            </h2>
                        </div>

                        <form id="formLancamento" onsubmit="Lancamentos.salvar(event)">
                            
                            <!-- Campos Básicos -->
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                                
                                <div class="md:col-span-2">
                                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                                        Descrição *
                                    </label>
                                    <input 
                                        type="text" 
                                        id="formDesc" 
                                        placeholder="Ex: Aluguel, Internet, Venda"
                                        class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 transition"
                                        required>
                                </div>

                                <div>
                                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                                        Tipo de Operação *
                                    </label>
                                    <select 
                                        id="formTipo" 
                                        class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 transition"
                                        required>
                                        <option value="despesa">Despesa (Saída)</option>
                                        <option value="receita">Receita (Entrada)</option>
                                    </select>
                                </div>

                                <div>
                                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                                        Valor Total (R$) *
                                    </label>
                                    <input 
                                        type="number" 
                                        id="formValor" 
                                        step="0.01" 
                                        placeholder="0.00"
                                        class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 transition"
                                        required>
                                </div>

                            </div>

                            <!-- Categoria e Status -->
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                                
                                <div>
                                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                                        Categoria
                                    </label>
                                    <input 
                                        type="text" 
                                        id="formCategoria" 
                                        list="listaCategorias"
                                        placeholder="Digite ou escolha..."
                                        value="Geral"
                                        class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 transition">
                                    <datalist id="listaCategorias"></datalist>
                                </div>

                                <div>
                                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                                        Status
                                    </label>
                                    <select 
                                        id="formStatus" 
                                        class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 transition">
                                        <option value="aberto">Aberto</option>
                                        <option value="finalizado">Finalizado</option>
                                        <option value="cancelado">Cancelado</option>
                                    </select>
                                </div>

                                <div>
                                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                                        N° de Parcelas *
                                    </label>
                                    <input 
                                        type="number" 
                                        id="formParcelas" 
                                        value="1" 
                                        min="1"
                                        class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 transition font-semibold text-blue-600"
                                        required>
                                </div>

                                <div>
                                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                                        Data Vencimento *
                                    </label>
                                    <input 
                                        type="date" 
                                        id="formVencimento"
                                        class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 transition"
                                        required>
                                </div>

                            </div>

                            <!-- Contato -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                                
                                <div>
                                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                                        Telefone
                                    </label>
                                    <input 
                                        type="tel" 
                                        id="formTelefone" 
                                        placeholder="(11) 98765-4321"
                                        class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 transition">
                                </div>

                                <div>
                                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                                        E-mail
                                    </label>
                                    <input 
                                        type="email" 
                                        id="formEmail" 
                                        placeholder="contato@empresa.com"
                                        class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 transition">
                                </div>

                            </div>

                            <!-- Código de Barras -->
                            <div class="mb-6">
                                <label class="block text-sm font-semibold text-slate-700 mb-2">
                                    <i class="fas fa-barcode mr-2 text-emerald-500"></i> Código de Barras
                                </label>
                                <div class="flex gap-2">
                                    <input 
                                        type="text" 
                                        id="formBarras" 
                                        placeholder="Cole ou leia o código de barras"
                                        class="flex-1 px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 transition">
                                    <button 
                                        type="button"
                                        onclick="Camera.iniciar()" 
                                        class="bg-slate-700 text-white px-6 py-2.5 rounded-lg hover:bg-slate-800 transition font-semibold">
                                        <i class="fas fa-camera mr-2"></i> Ler
                                    </button>
                                </div>
                                <div id="cameraContainer" class="hidden mt-3 relative border-2 border-dashed border-slate-300 p-3 rounded bg-slate-50">
                                    <div id="cameraPreview" class="w-full max-w-sm mx-auto rounded overflow-hidden"></div>
                                    <button 
                                        type="button"
                                        onclick="Camera.parar()" 
                                        class="absolute top-3 right-3 bg-red-500 text-white w-8 h-8 rounded-full flex items-center justify-center hover:bg-red-600 shadow-lg">
                                        <i class="fas fa-times"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Uploads (Boleto, Comprovante) -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                                
                                <div>
                                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                                        <i class="fas fa-file-invoice text-emerald-500 mr-2"></i> Anexar Boleto
                                    </label>
                                    <div 
                                        class="dropZone border-2 border-dashed border-slate-300 rounded-lg p-6 text-center bg-slate-50 hover:bg-slate-100 transition cursor-pointer"
                                        ondrop="Uploads.drop(event, 'fileBoleto')"
                                        ondragover="event.preventDefault(); event.currentTarget.classList.add('dragover')"
                                        ondragleave="event.currentTarget.classList.remove('dragover')"
                                        onclick="document.getElementById('fileBoleto').click()">
                                        <i class="fas fa-cloud-upload-alt text-2xl text-slate-400 mb-2 block"></i>
                                        <p class="text-xs text-slate-600">Clique ou arraste aqui</p>
                                        <p id="nomeBoleto" class="text-xs font-semibold text-emerald-600 mt-2"></p>
                                    </div>
                                    <input 
                                        type="file" 
                                        id="fileBoleto" 
                                        accept="image/*,.pdf"
                                        class="hidden"
                                        onchange="Uploads.mostrarNome(this, 'nomeBoleto')">
                                </div>

                                <div>
                                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                                        <i class="fas fa-receipt text-emerald-500 mr-2"></i> Anexar Comprovante
                                    </label>
                                    <div 
                                        class="dropZone border-2 border-dashed border-slate-300 rounded-lg p-6 text-center bg-slate-50 hover:bg-slate-100 transition cursor-pointer"
                                        ondrop="Uploads.drop(event, 'fileComprovante')"
                                        ondragover="event.preventDefault(); event.currentTarget.classList.add('dragover')"
                                        ondragleave="event.currentTarget.classList.remove('dragover')"
                                        onclick="document.getElementById('fileComprovante').click()">
                                        <i class="fas fa-cloud-upload-alt text-2xl text-slate-400 mb-2 block"></i>
                                        <p class="text-xs text-slate-600">Clique ou arraste aqui</p>
                                        <p id="nomeComprovante" class="text-xs font-semibold text-emerald-600 mt-2"></p>
                                    </div>
                                    <input 
                                        type="file" 
                                        id="fileComprovante" 
                                        accept="image/*,.pdf"
                                        class="hidden"
                                        onchange="Uploads.mostrarNome(this, 'nomeComprovante')">
                                </div>

                            </div>

                            <!-- Áudio -->
                            <div class="mb-6">
                                <label class="block text-sm font-semibold text-slate-700 mb-2">
                                    <i class="fas fa-microphone text-emerald-500 mr-2"></i> Gravação de Áudio (Observações)
                                </label>
                                <button 
                                    type="button"
                                    id="btnAudio"
                                    onclick="Audio.toggle()" 
                                    class="w-full border-2 border-dashed border-slate-300 rounded-lg p-4 text-slate-600 font-semibold hover:bg-slate-50 transition">
                                    <i class="fas fa-microphone mr-2"></i> Gravar Áudio
                                </button>
                                <audio 
                                    id="audioPreview" 
                                    controls 
                                    class="hidden w-full mt-3 h-10 rounded-lg">
                                </audio>
                            </div>

                            <!-- Botões de Ação -->
                            <div class="flex gap-3 pt-4 border-t">
                                <button 
                                    type="submit" 
                                    id="btnSalvar"
                                    class="flex-1 bg-emerald-500 text-white font-semibold py-3 rounded-lg hover:bg-emerald-600 transition shadow-md">
                                    <i class="fas fa-save mr-2"></i> Gravar Lançamento
                                </button>
                                <button 
                                    type="button" 
                                    id="btnCancelar"
                                    onclick="Lancamentos.cancelarEdicao()"
                                    class="hidden px-6 bg-slate-500 text-white font-semibold py-3 rounded-lg hover:bg-slate-600 transition">
                                    Cancelar
                                </button>
                            </div>
                        </form>
                    </div>
                </section>

                <!-- ========== ABA: LISTAGEM ========== -->
                <section id="pagListagem" class="hidden">
                    
                    <!-- Dashboard Resumido -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                        <div class="bg-white rounded-lg p-4 shadow-sm border-l-4 border-emerald-500">
                            <p class="text-xs text-slate-600 font-semibold uppercase">Total Receitas</p>
                            <p id="dashReceita" class="text-2xl font-bold text-emerald-600 mt-1">R$ 0,00</p>
                        </div>
                        <div class="bg-white rounded-lg p-4 shadow-sm border-l-4 border-red-500">
                            <p class="text-xs text-slate-600 font-semibold uppercase">Total Despesas</p>
                            <p id="dashDespesa" class="text-2xl font-bold text-red-600 mt-1">R$ 0,00</p>
                        </div>
                        <div class="bg-white rounded-lg p-4 shadow-sm border-l-4 border-amber-500">
                            <p class="text-xs text-slate-600 font-semibold uppercase">Pendente</p>
                            <p id="dashPendente" class="text-2xl font-bold text-amber-600 mt-1">R$ 0,00</p>
                        </div>
                    </div>

                    <!-- Card Filtros -->
                    <div class="bg-white rounded-xl shadow-md p-6 mb-6">
                        <h3 class="text-lg font-bold text-slate-800 mb-4">
                            <i class="fas fa-filter text-emerald-500 mr-2"></i> Filtros
                        </h3>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
                            <div>
                                <label class="block text-xs font-semibold text-slate-700 mb-1.5">Descrição</label>
                                <input 
                                    type="text" 
                                    id="filtroDesc" 
                                    placeholder="Buscar..."
                                    onkeyup="Filtros.aplicar()"
                                    class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                            </div>

                            <div>
                                <label class="block text-xs font-semibold text-slate-700 mb-1.5">Categoria</label>
                                <select 
                                    id="filtroCategoria" 
                                    onchange="Filtros.aplicar()"
                                    class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                                    <option value="">Todas</option>
                                </select>
                            </div>

                            <div>
                                <label class="block text-xs font-semibold text-slate-700 mb-1.5">Data Início</label>
                                <input 
                                    type="date" 
                                    id="filtroInicio" 
                                    onchange="Filtros.aplicar()"
                                    class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                            </div>

                            <div>
                                <label class="block text-xs font-semibold text-slate-700 mb-1.5">Data Fim</label>
                                <input 
                                    type="date" 
                                    id="filtroFim" 
                                    onchange="Filtros.aplicar()"
                                    class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                            </div>

                            <div class="flex gap-2 items-end">
                                <button 
                                    onclick="Filtros.limpar()" 
                                    class="flex-1 bg-slate-300 text-slate-700 px-3 py-2 rounded-lg text-sm font-semibold hover:bg-slate-400 transition">
                                    <i class="fas fa-redo mr-1"></i> Limpar
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Grid de Lançamentos -->
                    <div id="listaLancamentos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        <!-- Cards preenchidos pelo JavaScript -->
                    </div>

                    <!-- Paginação -->
                    <div id="paginacao" class="flex justify-center gap-2 mt-8"></div>

                </section>

            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>
</html>
