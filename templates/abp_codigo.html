                        <a class="nav-link" href="#contact">Contato</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Cabeçalho animado -->
    <header id="home" class="container text-center py-5 animate__animated animate__fadeInDown">
        <h1>Bem-vindo à Página Inicial</h1>
    </header>

    <!-- Seção Sobre -->
    <section id="about" class="container" data-aos="fade-up">
        <div class="row">
            <div class="col-lg-6">
                <div class="card p-4">
                    <h3 class="card-title">Sobre Nós</h3>
                    <p class="card-text">Este é um exemplo de uma página construída com Bootstrap, animações CSS e JavaScript.</p>
                    <button id="confettiButton">Clique para Confete 🎉</button>
                    <audio id="confettiSound" src="https://www.fesliyanstudios.com/play-mp3/387" preload="auto"></audio>
                </div>
            </div>
            <div class="col-lg-6">
                <img src="https://via.placeholder.com/500x300" alt="Imagem Exemplo" class="img-fluid rounded">
            </div>
        </div>
    </section>

    <!-- Seção de código com botão copiar -->
    <section class="container my-5" data-aos="fade-right">
        <div class="card p-4">
            <h2>Código Exemplo</h2>
            <pre id="codeBlock">
const greet = () => {
    console.log("Hello, World!");
};
greet();
            </pre>
            <button class="copy-btn" onclick="copyToClipboard(document.getElementById('codeBlock').innerText)">Copiar Código</button>
        </div>
    </section>

    <!-- Contato (exemplo) -->
    <section id="contact" class="container my-5 text-center" data-aos="fade-up">
        <h2>Contato</h2>
        <p>Entre em contato conosco por email: <strong>contato@empresa.com</strong></p>
    </section>

    <!-- JS: Confete, Bootstrap e AOS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>
        // Inicializa a biblioteca AOS (animação ao rolar)
        AOS.init();

        // Animação de confete ao clicar no botão
        document.getElementById('confettiButton').addEventListener('click', function() {
            // Desabilita o botão temporariamente
            this.disabled = true;

            // Animação de confete
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 }
            });

            // Reproduz o som de confete
            var audio = document.getElementById('confettiSound');
            audio.currentTime = 0;
            audio.play();

            // Reabilita o botão após 3 segundos
            setTimeout(() => {
                this.disabled = false;
            }, 3000);
        });

        // Função copiar código
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(function () {
                alert('Código copiado com sucesso!');
            }, function (err) {
                console.error('Erro ao copiar o código: ', err);
            });
        }
    </script>
</body>
</html>
