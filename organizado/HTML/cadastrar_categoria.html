<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Categoria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
    <header class="bg-primary text-white p-4 text-center">
        <h1 class="text-2xl font-bold">Cadastrar Categoria</h1>
    </header>

    <main class="flex-1 p-6">
        <div class="max-w-md mx-auto bg-white rounded shadow p-6">
            <form id="form-categoria" class="space-y-4">
                <div>
                    <label for="nome" class="block text-gray-700">Nome da Categoria</label>
                    <input type="text" id="nome" name="nome" class="w-full border border-gray-300 rounded p-2 mt-1" required>
                </div>
                <div>
                    <label for="descricao" class="block text-gray-700">Descrição</label>
                    <textarea id="descricao" name="descricao" class="w-full border border-gray-300 rounded p-2 mt-1" rows="4"></textarea>
                </div>
                <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded">
                    Cadastrar
                </button>
            </form>
        </div>
    </main>

    <footer class="bg-gray-200 text-center p-4">
        <p class="text-sm text-gray-600">Sistema ERP-PSC © 2026</p>
    </footer>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="../model/supabase_config.js"></script>
    <script src="../model/model_categorias.js"></script>
    
    <script>
        const form = document.getElementById('form-categoria');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('nome').value;
            const descricao = document.getElementById('descricao').value;

            // Chame a função do model para inserir no Supabase
            try {
                await inserirCategoria(nome, descricao);
                alert('Categoria cadastrada com sucesso!');
                window.location.href = 'listar_categorias.html'; // Volta à lista após cadastro
            } catch (error) {
                console.error('Erro ao cadastrar:', error.message);
                alert('Ocorreu um erro. Tente novamente.');
            }
        });
    </script>
</body>
</html>
