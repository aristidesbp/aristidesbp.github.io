<!DOCTYPE html>
<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cadastro de Entidades ERP-PSC</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            min-height: max(884px, 100dvh);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<header class="sticky top-0 z-50 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
<div class="flex items-center justify-between px-4 h-16">
<a class="flex items-center gap-1 text-primary font-medium hover:opacity-80 transition-opacity" href="entidades.html">
<span class="material-symbols-outlined text-[20px]">arrow_back_ios</span>
<span>Voltar</span>
</a>
<h1 class="text-lg font-bold tracking-tight">Novo Cadastro</h1>
<div class="w-16"></div>
</div>
</header>
<main class="flex-1 overflow-y-auto pb-32">
<form class="max-w-md mx-auto p-4 space-y-8">
<div class="flex flex-col items-center justify-center pt-4">
<div class="relative group">
<div class="w-28 h-28 rounded-full bg-slate-200 dark:bg-slate-800 border-4 border-white dark:border-slate-900 shadow-sm flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-slate-400 text-5xl">person</span>
<div class="absolute inset-0 bg-black/5 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-white">photo_camera</span>
</div>
</div>
<label class="absolute bottom-0 right-0 w-8 h-8 bg-primary text-white rounded-full border-2 border-white dark:border-slate-900 flex items-center justify-center cursor-pointer shadow-md active:scale-95 transition-transform" for="avatar-upload">
<span class="material-symbols-outlined text-[18px]">add_a_photo</span>
</label>
<input accept="image/*" class="hidden" id="avatar-upload" type="file"/>
</div>
<label class="mt-3 text-sm font-semibold text-primary hover:text-primary/80 transition-colors px-4 py-1 rounded-full border border-primary/20 bg-primary/5 cursor-pointer inline-block" for="avatar-upload">
                    Adicionar Foto
                </label>
</div>
<div class="space-y-3">
<label class="text-sm font-semibold text-slate-500 uppercase tracking-wider px-1">Tipo de Entidade</label>
<div class="flex h-12 w-full items-center justify-center rounded-xl bg-slate-200/50 dark:bg-slate-800 p-1">
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm has-[:checked]:text-primary text-slate-500 text-sm font-semibold transition-all">
<span class="truncate">Paciente</span>
<input checked="" class="hidden" name="entity_type" type="radio" value="Paciente"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm has-[:checked]:text-primary text-slate-500 text-sm font-semibold transition-all">
<span class="truncate">Responsável</span>
<input class="hidden" name="entity_type" type="radio" value="Responsável"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm has-[:checked]:text-primary text-slate-500 text-sm font-semibold transition-all">
<span class="truncate">Colaborador</span>
<input class="hidden" name="entity_type" type="radio" value="Colaborador"/>
</label>
</div>
</div>
<section class="space-y-4">
<div class="flex items-center gap-2 border-b border-slate-200 dark:border-slate-800 pb-2">
<span class="material-symbols-outlined text-primary">person</span>
<h2 class="text-lg font-bold">Dados Básicos</h2>
</div>
<div class="space-y-4">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium px-1">Nome Completo</label>
<div class="relative group">
<input class="w-full h-12 pl-11 pr-4 rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="Ex: Maria Oliveira" type="text"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">badge</span>
</div>
</div>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium px-1">CPF</label>
<div class="relative group">
<input class="w-full h-12 pl-11 pr-4 rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="000.000.000-00" type="text"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">fingerprint</span>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium px-1">Data de Nascimento</label>
<div class="relative group">
<input class="w-full h-12 pl-11 pr-4 rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" type="date"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">calendar_month</span>
</div>
</div>
</div>
</div>
</section>
<section class="space-y-4">
<div class="flex items-center gap-2 border-b border-slate-200 dark:border-slate-800 pb-2">
<span class="material-symbols-outlined text-primary">contact_support</span>
<h2 class="text-lg font-bold">Contato</h2>
</div>
<div class="space-y-4">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium px-1">E-mail</label>
<div class="relative group">
<input class="w-full h-12 pl-11 pr-4 rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="email@exemplo.com" type="email"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">mail</span>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium px-1">Telefone / WhatsApp</label>
<div class="relative group">
<input class="w-full h-12 pl-11 pr-4 rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="(00) 00000-0000" type="tel"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">call</span>
</div>
</div>
</div>
</section>
<section class="space-y-4">
<div class="flex items-center gap-2 border-b border-slate-200 dark:border-slate-800 pb-2">
<span class="material-symbols-outlined text-primary">location_on</span>
<h2 class="text-lg font-bold">Endereço</h2>
</div>
<div class="grid grid-cols-1 gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium px-1">CEP</label>
<div class="relative group">
<input class="w-full h-12 pl-11 pr-4 rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="00000-000" type="text"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">map</span>
</div>
</div>
<div class="grid grid-cols-4 gap-4">
<div class="col-span-3 flex flex-col gap-1.5">
<label class="text-sm font-medium px-1">Logradouro</label>
<input class="w-full h-12 px-4 rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="Rua, Av..." type="text"/>
</div>
<div class="col-span-1 flex flex-col gap-1.5">
<label class="text-sm font-medium px-1">Nº</label>
<input class="w-full h-12 px-4 rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="123" type="text"/>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium px-1">Bairro</label>
<input class="w-full h-12 px-4 rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="Nome do Bairro" type="text"/>
</div>
<div class="grid grid-cols-4 gap-4">
<div class="col-span-3 flex flex-col gap-1.5">
<label class="text-sm font-medium px-1">Cidade</label>
<input class="w-full h-12 px-4 rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="Cidade" type="text"/>
</div>
<div class="col-span-1 flex flex-col gap-1.5">
<label class="text-sm font-medium px-1">UF</label>
<input class="w-full h-12 px-4 rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all uppercase" maxlength="2" placeholder="UF" type="text"/>
</div>
</div>
</div>
</section>
<div class="pt-6 space-y-3 pb-8">
<button class="w-full h-14 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/30 hover:shadow-primary/40 active:scale-[0.98] transition-all" type="submit">
                    Salvar Registro
                </button>
<a class="flex items-center justify-center w-full h-14 bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-400 font-semibold rounded-xl hover:opacity-90 transition-all" href="entidades.html">
                    Cancelar
                </a>
</div>
</form>
</main>
<nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-background-dark border-t border-slate-200 dark:border-slate-800 px-4 pb-6 pt-2 z-50">
<div class="max-w-md mx-auto flex justify-between items-center">
<a class="flex flex-1 flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">home</span>
<p class="text-[10px] font-medium uppercase tracking-wider">Início</p>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-primary" href="entidades.html">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">group</span>
<p class="text-[10px] font-medium uppercase tracking-wider">Entidades</p>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">calendar_today</span>
<p class="text-[10px] font-medium uppercase tracking-wider">Agenda</p>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">person</span>
<p class="text-[10px] font-medium uppercase tracking-wider">Perfil</p>
</a>
</div>
</nav>

</body></html>
