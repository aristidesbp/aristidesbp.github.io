<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Gerenciar Entidades - ClinicaPro</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
<style>
    :root { --primary: #137fec; }
body { font-family: 'Inter', sans-serif; }
.bg-primary { background-color: var(--primary); }
.text-primary { color: var(--primary); }
.border-primary { border-color: var(--primary); }

/* Custom Inputs */
input, select { 
    @apply transition-all duration-200;
}

input:focus {
    border-color: var(--primary) !important;
    box-shadow: 0 0 0 3px rgba(19, 127, 236, 0.15) !important;
}

.hidden { display: none; }

/* Animação de entrada */
#form_section {
    animation: slideDown 0.3s ease-out;
}

@keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}

    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans">
    <div class="max-w-4xl mx-auto p-4 lg:p-8">
        
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <span class="material-symbols-outlined text-primary">group</span> ClinicaPro Entidades
            </h1>
            <button id="btn_novo" class="bg-primary text-white px-4 py-2 rounded-lg font-bold hover:bg-primary/90 transition-all flex items-center gap-2">
                <span class="material-symbols-outlined">add</span> Novo Cadastro
            </button>
        </header>

        <section id="form_section" class="hidden bg-white dark:bg-slate-900 rounded-xl shadow-lg border border-slate-200 dark:border-slate-800 p-6 mb-8">
            <input type="hidden" id="entidade_id">
            <div class="flex flex-col items-center mb-6">
                <div id="avatar_container" class="relative group cursor-pointer w-32 h-32 rounded-full border-2 border-dashed border-primary/40 flex items-center justify-center bg-primary/5 overflow-hidden">
                    <img id="preview_foto" src="" class="hidden w-full h-full object-cover">
                    <span id="placeholder_icon" class="material-symbols-outlined text-4xl text-primary">add_a_photo</span>
                    <input type="file" id="input_foto" class="hidden" accept="image/*">
                </div>
                <p class="text-xs text-slate-500 mt-2">Clique para alterar a foto</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2">
                    <label class="text-sm font-semibold">Tipo de Entidade</label>
                    <div class="flex gap-2 mt-1">
                        <label class="flex-1 border p-2 rounded text-center cursor-pointer has-[:checked]:bg-primary has-[:checked]:text-white"><input type="radio" name="tipo" value="Paciente" class="hidden" checked> Paciente</label>
                        <label class="flex-1 border p-2 rounded text-center cursor-pointer has-[:checked]:bg-primary has-[:checked]:text-white"><input type="radio" name="tipo" value="Responsável" class="hidden"> Responsável</label>
                        <label class="flex-1 border p-2 rounded text-center cursor-pointer has-[:checked]:bg-primary has-[:checked]:text-white"><input type="radio" name="tipo" value="Colaborador" class="hidden"> Colaborador</label>
                    </div>
                </div>
                <input type="text" id="nome" placeholder="Nome Completo" class="rounded-lg border-slate-300 dark:bg-slate-800 dark:border-slate-700" required>
                <input type="text" id="cpf" placeholder="CPF" class="rounded-lg border-slate-300 dark:bg-slate-800 dark:border-slate-700">
                <input type="date" id="nascimento" class="rounded-lg border-slate-300 dark:bg-slate-800 dark:border-slate-700">
                <input type="email" id="email" placeholder="E-mail" class="rounded-lg border-slate-300 dark:bg-slate-800 dark:border-slate-700">
                <input type="text" id="telefone" placeholder="Telefone" class="rounded-lg border-slate-300 dark:bg-slate-800 dark:border-slate-700">
                <input type="text" id="cep" placeholder="CEP" class="rounded-lg border-slate-300 dark:bg-slate-800 dark:border-slate-700">
                <input type="text" id="logradouro" placeholder="Logradouro" class="md:col-span-2 rounded-lg border-slate-300 dark:bg-slate-800 dark:border-slate-700">
                <input type="text" id="numero" placeholder="Nº" class="rounded-lg border-slate-300 dark:bg-slate-800 dark:border-slate-700">
                <input type="text" id="bairro" placeholder="Bairro" class="rounded-lg border-slate-300 dark:bg-slate-800 dark:border-slate-700">
                <input type="text" id="cidade" placeholder="Cidade" class="rounded-lg border-slate-300 dark:bg-slate-800 dark:border-slate-700">
                <input type="text" id="uf" placeholder="UF" class="rounded-lg border-slate-300 dark:bg-slate-800 dark:border-slate-700">
                
                <div class="md:col-span-2 space-y-2">
                    <label class="text-sm font-semibold">Permissões</label>
                    <div class="flex gap-4">
                        <label class="flex items-center gap-1"><input type="checkbox" id="p_ler"> Ler</label>
                        <label class="flex items-center gap-1"><input type="checkbox" id="p_editar"> Editar</label>
                        <label class="flex items-center gap-1"><input type="checkbox" id="p_cadastrar"> Cadastrar</label>
                    </div>
                </div>
            </div>

            <div class="flex gap-3 mt-8">
                <button id="btn_salvar" class="flex-1 bg-primary text-white py-3 rounded-xl font-bold">Salvar Registro</button>
                <button id="btn_cancelar" class="px-6 bg-slate-200 dark:bg-slate-800 rounded-xl font-bold">Cancelar</button>
            </div>
        </section>

        <section id="list_section" class="space-y-4">
            <h2 class="text-lg font-bold mb-4">Cadastros Recentes</h2>
            <div id="entidades_lista" class="grid gap-3">
                </div>
        </section>
    </div>

    <script>
        const SUPABASE_URL = "https://flbcktmujsjxukmtqriq.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."; // Use sua chave aqui
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const formSection = document.getElementById('form_section');
const entidadesLista = document.getElementById('entidades_lista');
let currentFotoFile = null;

// --- FUNÇÕES DE AUXÍLIO ---

const toggleForm = (show) => {
    formSection.classList.toggle('hidden', !show);
    if (!show) resetForm();
};

const resetForm = () => {
    document.getElementById('entidade_id').value = '';
    document.querySelectorAll('input:not([type="radio"]):not([type="checkbox"])').forEach(i => i.value = '');
    document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
    document.getElementById('preview_foto').classList.add('hidden');
    document.getElementById('placeholder_icon').classList.remove('hidden');
    currentFotoFile = null;
};

// --- CRUD: CREATE / UPDATE ---

const uploadFoto = async (file) => {
    const fileName = `${Date.now()}_${file.name}`;
    const { data, error } = await _supabase.storage.from('avatars').upload(fileName, file);
    if (error) throw error;
    const { data: { publicUrl } } = _supabase.storage.from('avatars').getPublicUrl(fileName);
    return publicUrl;
};

const salvarEntidade = async () => {
    const id = document.getElementById('entidade_id').value;
    const dados = {
        nome: document.getElementById('nome').value,
        documento: document.getElementById('cpf').value,
        data_nascimento: document.getElementById('nascimento').value,
        email: document.getElementById('email').value,
        tipo: document.querySelector('input[name="tipo"]:checked').value,
        permissoes: {
            ler: document.getElementById('p_ler').checked,
            editar: document.getElementById('p_editar').checked,
            cadastrar: document.getElementById('p_cadastrar').checked
        }
    };

    try {
        if (currentFotoFile) {
            dados.foto_url = await uploadFoto(currentFotoFile);
        }

        let result;
        if (id) {
            result = await _supabase.from('entidades').update(dados).eq('id', id);
        } else {
            result = await _supabase.from('entidades').insert([dados]);
        }

        if (result.error) throw result.error;
        alert('Sucesso!');
        toggleForm(false);
        carregarEntidades();
    } catch (err) {
        alert('Erro: ' + err.message);
    }
};

// --- CRUD: READ ---

const carregarEntidades = async () => {
    const { data, error } = await _supabase.from('entidades').select('*').order('created_at', { ascending: false });
    if (error) return console.error(error);

    entidadesLista.innerHTML = data.map(ent => `
        <div class="bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 flex items-center gap-4">
            <img src="${ent.foto_url || 'https://via.placeholder.com/150'}" class="w-12 h-12 rounded-full object-cover border">
            <div class="flex-grow">
                <h3 class="text-sm font-bold">${ent.nome}</h3>
                <p class="text-xs text-slate-500">${ent.tipo} • ${ent.documento || 'Sem CPF'}</p>
            </div>
            <div class="flex gap-2">
                <button onclick="editarEntidade('${ent.id}')" class="p-2 text-primary hover:bg-primary/10 rounded-full"><span class="material-symbols-outlined">edit</span></button>
                <button onclick="excluirEntidade('${ent.id}')" class="p-2 text-red-500 hover:bg-red-50 rounded-full"><span class="material-symbols-outlined">delete</span></button>
            </div>
        </div>
    `).join('');
};

// --- CRUD: EDIT / DELETE ---

window.editarEntidade = async (id) => {
    const { data } = await _supabase.from('entidades').select('*').eq('id', id).single();
    if (!data) return;

    toggleForm(true);
    document.getElementById('entidade_id').value = data.id;
    document.getElementById('nome').value = data.nome;
    document.getElementById('cpf').value = data.documento;
    document.getElementById('nascimento').value = data.data_nascimento;
    document.getElementById('email').value = data.email;
    // ... preencher outros campos e checkboxes
    if (data.foto_url) {
        const img = document.getElementById('preview_foto');
        img.src = data.foto_url;
        img.classList.remove('hidden');
        document.getElementById('placeholder_icon').classList.add('hidden');
    }
};

window.excluirEntidade = async (id) => {
    if (!confirm('Tem certeza?')) return;
    const { error } = await _supabase.from('entidades').delete().eq('id', id);
    if (error) alert(error.message);
    else carregarEntidades();
};

// --- EVENTOS ---

document.getElementById('btn_novo').onclick = () => toggleForm(true);
document.getElementById('btn_cancelar').onclick = () => toggleForm(false);
document.getElementById('btn_salvar').onclick = salvarEntidade;

document.getElementById('avatar_container').onclick = () => document.getElementById('input_foto').click();
document.getElementById('input_foto').onchange = (e) => {
    const file = e.target.files[0];
    if (file) {
        currentFotoFile = file;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = document.getElementById('preview_foto');
            img.src = ev.target.result;
            img.classList.remove('hidden');
            document.getElementById('placeholder_icon').classList.add('hidden');
        };
        reader.readAsDataURL(file);
    }
};

// Inicializar
carregarEntidades();
        
    </script>
</body>
</html>
