    <style>
        /* Estilo para o corpo da página */
        body {
            margin: 0;
            padding: 0;
            background-color: white;

        /* Barra de navegação fixa no topo */
        .navbar {
            background-color: #004D40;
            color: white;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        /* Contêiner para o botão e título na navbar */
        .navbar-left {
            display: flex;
            align-items: center;
        }

        /* Botão de menu lateral */
        .menu-btn {
            font-size: 30px;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            margin-right: 10px;
        }

        /* Menu lateral (sidebar) */
        .sidebar {
            height: 100%;
            width: 250px;
            position: fixed;
            top: 0;
            left: -250px;
            background-color: #004D40;
            padding-top: 60px;
            transition: left 0.3s ease;
            z-index: 999;
        }

        /* Torna o menu visível */
        .sidebar.active {
            left: 0;
        }

        /* Links no menu lateral */
        .sidebar a {
            padding: 10px 20px;
            text-decoration: none;
            font-size: 20px;
            color: white;
            display: block;
        }

        /* Estilo do hover nos links */
        .sidebar a:hover {
            background-color: #575757;
        }

        /* Botão para fechar o menu lateral */
        .sidebar .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 36px;
            color: white;
            cursor: pointer;
        }

        /* Responsividade para telas menores */
        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }
        }
    </style>

    <!-- Navbar -->
    <div class="navbar">
        <div class="navbar-left">
            <!-- Botão de menu lateral -->
            <button class="menu-btn" aria-label="Abrir Menu Lateral" onclick="toggleMenu()">☰</button>
            <!-- Título da página -->
            <div class="navbar-title"><b>ABP MARKETING DIGITAL</b></div>
        </div>
    </div>

    <!-- Menu lateral -->
    <div id="menu" class="sidebar" role="navigation" aria-hidden="true">
        <!-- Botão para fechar o menu -->
        <span class="close-btn" aria-label="Fechar Menu" onclick="closeMenu()">×</span>
        <!-- Links do menu -->
        <a href="index.html"><b>INÍCIO</b></a>
        <a href="#servicos"><b>SERVIÇOS</b></a>
        <a href="#contato"><b>CONTATO</b></a>

        <a href="07.html"><b>07</b></a>
        <a href="08.html"><b>08</b></a>
    </div>

    <script>
        // Navbar.js

        const menu = document.getElementById('menu');

        // Alterna o estado do menu lateral
        function toggleMenu() {
            const isOpen = menu.classList.contains('active');
            isOpen ? closeMenu() : openMenu();
        }

        // Abre o menu lateral
        function openMenu() {
            menu.classList.add('active');
            menu.setAttribute('aria-hidden', 'false');
        }

        // Fecha o menu lateral
        function closeMenu() {
            menu.classList.remove('active');
            menu.setAttribute('aria-hidden', 'true');
        }

        // Fecha o menu ao clicar fora dele (exceto no botão de menu)
        window.addEventListener('click', (event) => {
            if (!menu.contains(event.target) && !event.target.closest('.menu-btn')) {
                closeMenu();
            }
        });

        // Fecha o menu ao pressionar ESC
        window.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                closeMenu();
            }
        });
    </script>
