<!-- Lista suspensa para trocar os conteúdos -->
<select id="seletorConteudo" onchange="trocarConteudo()">
<option value="assets/home.html">Áreas de Atuação</option>
<option value="assets/contratos.html">Contrato e Obrigações</option> 
<option value="assets/direito-aereo.html">Direito Aereo</option>  
<option value="assets/direito_bancario.html">Direito Bancario</option>  
<option value="assets/direito_consumidor.html">Direito Consumidor</option>

</select>
</div>

<!-- Div onde o conteúdo será carregado -->
<div id="conteudo">Carregando conteúdo...</div>

<script>
   
        // Função para carregar dinamicamente o conteúdo das páginas
        async function trocarConteudo() {
            const seletor = document.getElementById("seletorConteudo");
            const pagina = seletor.value; // Obtém o valor da opção selecionada

            try {
                const response = await fetch(pagina);
                if (!response.ok) throw new Error("Erro ao carregar o conteúdo.");

                const html = await response.text();
                document.getElementById("conteudo").innerHTML = html;
            } catch (error) {
                document.getElementById("conteudo").innerHTML = "Erro ao carregar conteúdo.";
                console.error(error);
            }
        }

        // Chamar a função ao carregar a página para exibir o conteúdo inicial
        trocarConteudo();
    </script>
