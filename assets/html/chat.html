<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP ABP - Chat</title>
<script src="https://cdn.tailwindcss.com"></script>
    
<style>
.chat-bg { background-color: #e5ddd5; }
</style>
</head>

<body class="flex flex-col h-screen chat-bg">

<header class="bg-teal-700 text-white p-3 flex items-center shadow-md">
<div class="w-10 h-10 bg-gray-300 rounded-full mr-3"></div>
<div>
            <h1 class="font-bold">ERP ABP</h1>
            <span class="text-xs text-green-200">Online</span>
        </div>
    </header>


<main id="chat-container" class="flex-1 p-4 overflow-y-auto space-y-4">
<div class="max-w-[80%] bg-white p-3 rounded-lg shadow-sm text-sm">
      
<p>Olá! Escolha uma opção do menu:</p>
<ul class="mt-2 space-y-1 font-bold">
<li>1. ENTIDADES</li>
<li>2. FINANCEIRO</li>
</ul>
</div>
</main>


<!-- footer deve ficar fixa no fundo , sempre aparente-->
<footer class="p-2 bg-gray-100 flex items-center gap-2">
<input id="chat-input" type="text" class="flex-1 p-3 rounded-full outline-none shadow-sm" placeholder="Digite uma opção...">

<button onclick="enviarAnexo()" class="bg-teal-600 text-white px-6 py-3 rounded-full font-bold hover:bg-teal-700 transition">anexar</button></footer>

<button onclick="enviarMensagem()" class="bg-teal-600 text-white px-6 py-3 rounded-full font-bold hover:bg-teal-700 transition">Enviar</button></footer>




<script>
        function enviarMensagem() {
            const input = document.getElementById('chat-input');
            const container = document.getElementById('chat-container');
            const msg = input.value.trim();

            if (!msg) return;

            // Adiciona mensagem do usuário
            adicionarMensagem(msg, 'user');
            input.value = '';

           
/**********************************************************/

 // Lógica de resposta simples
 setTimeout(() => {
 
if (msg === '1') {
adicionarMensagem(' Menu de Entidades...', 'bot');
//buscar, editar , cadastrar exclui (crud)

} else if (msg === '2') {
adicionarMensagem('este sera Financeiro...', 'bot');
//buscar, editar , cadastrar exclui (crud)


} else if (msg === '2') {
adicionarMensagem('redirecionando para o site...', 'bot');
//window.location.href = 'https://aristidesbp.github.io';


                } else {
                    adicionarMensagem('Opção inválida. Digite 1 para Entidades ou 2 para Financeiro.', 'bot');
                }
            }, 500);
        }

/**********************************************************/

        function adicionarMensagem(texto, remetente) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `p-3 rounded-lg max-w-[80%] shadow-sm text-sm ${remetente === 'user' ? 'bg-green-100 ml-auto' : 'bg-white'}`;
            div.innerText = texto;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
