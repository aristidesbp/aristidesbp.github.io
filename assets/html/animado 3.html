<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efeitos GSAP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #1e1e1e, #3b3b3b);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        .container {
            text-align: center;
        }
        h1 {
            font-size: 3em;
            opacity: 0;
        }
        p {
            font-size: 1.5em;
            margin-top: 20px;
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Design Inovador</h1>
        <p>Criação de experiências visuais únicas.</p>
    </div>
    <script>
        gsap.fromTo("h1", { scale: 0.5, opacity: 0 }, { scale: 1, opacity: 1, duration: 2 });
        gsap.fromTo("p", { y: 50, opacity: 0 }, { y: 0, opacity: 1, duration: 2, delay: 1 });
    </script>
</body>
</html>
