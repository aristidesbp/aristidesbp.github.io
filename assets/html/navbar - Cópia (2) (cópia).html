<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARISTIDES B. PONTES</title>
    
    <style>
    :root {
        --bg-light: #f0f8ff; /* Azul claro */
        --text-light: #1d3557; /* Azul escuro */
        --bg-dark: #121212;
        --text-dark: #f0f8ff;
        --navbar-light: #1d3557; /* Azul escuro no tema claro */
        --navbar-dark: #333; /* Navbar escura */
        --sidebar-bg: #457b9d; /* Azul médio */
        --sidebar-hover: #1d3557; /* Azul escuro */
        --button-bg: #ffcc00; /* Amarelo */
        --button-hover: #d4a500;
    }

    /* Estilos globais */
    body {
        margin: 0;
        font-family: 'Roboto', sans-serif;
        line-height: 1.6;
        margin-top: 80px;
        background-color: var(--bg-light);
        color: var(--text-light);
        transition: background-color 0.3s, color 0.3s;
    }

    body.dark-theme {
        background-color: var(--bg-dark);
        color: var(--text-dark);
    }

    /* Navbar */
    .navbar {
        background-color: var(--navbar-light);
        color: white;
        padding: 10px 20px;
        display: flex;
        align-items: center;
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 1000;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    .navbar.dark-theme {
        background-color: #222; /* Navbar escura no modo escuro */
    }

    .menu-btn, .theme-toggle-btn {
        font-size: 30px;
        background: none;
        border: none;
        color: inherit;
        cursor: pointer;
        margin-right: 10px;
        transition: transform 0.2s;
    }

    .menu-btn:hover, .theme-toggle-btn:hover {
        transform: scale(1.1);
    }

    .navbar-title {
        font-weight: bold;
    }

    /* Sidebar */
    .sidebar {
        position: fixed;
        top: 0;
        left: -250px;
        height: 100%;
        width: 250px;
        background-color: var(--sidebar-bg);
        color: var(--text-dark);
        padding-top: 60px;
        transition: left 0.3s ease;
        z-index: 1100;
    }

    .sidebar.dark-theme {
        background-color: #333; /* Sidebar escura no modo escuro */
    }

    .sidebar.active {
        left: 0;
    }

    .sidebar a {
        padding: 10px 20px;
        text-decoration: none;
        font-size: 20px;
        color: white;
        display: block;
        transition: background-color 0.3s;
    }

    .sidebar a:hover {
        background-color: var(--sidebar-hover);
    }

    .close-btn {
        position: absolute;
        top: 15px;
        right: 20px;
        font-size: 36px;
        color: white;
        cursor: pointer;
    }
    </style>
</head>
<body class="light-theme">
    <div class="navbar">
        <button class="menu-btn" aria-label="Abrir Menu" onclick="toggleMenu()">☰</button>
        <button class="theme-toggle-btn" aria-label="Alternar Tema" onclick="toggleTheme()">🌙</button>
        <div class="navbar-title">ARISTIDES B. PONTES</div>
    </div>

    <nav id="menu" class="sidebar" aria-hidden="true">
        <span class="close-btn" aria-label="Fechar Menu" onclick="closeMenu()">×</span>
        <a href="index.html">INÍCIO</a>
        <a href="#servicos">SERVIÇOS</a>
        <a href="#contato">CONTATO</a>
        <a href="01.html">01</a>
        <a href="02.html">02</a>
    </nav>

    <script>
        function toggleMenu() {
            document.getElementById('menu').classList.toggle('active');
        }

        function closeMenu() {
            document.getElementById('menu').classList.remove('active');
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            document.querySelector('.navbar').classList.toggle('dark-theme');
            document.querySelector('.sidebar').classList.toggle('dark-theme');
        }
    </script>
</body>
</html>
