<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Navbar Tema Claro e Escuro</title>
    <style>
        /* Tema Claro */
        body.light-theme {
            background-color: #f4f4f4;
            color: #333;
        }

        .navbar.light-theme {
            background-color: #f1f1f1;
            color: #333;
        }

        .navbar-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
        }

        .nav-links {
            list-style-type: none;
            display: flex;
            gap: 1rem;
        }

        .nav-links a {
            text-decoration: none;
            color: inherit;
            font-weight: bold;
        }

        .theme-toggle-btn {
            background-color: transparent;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: inherit;
            transition: color 0.3s;
        }

        /* Tema Escuro */
        body.dark-theme {
            background-color: #121212;
            color: #f4f4f4;
        }

        .navbar.dark-theme {
            background-color: #333;
            color: #f4f4f4;
        }

        .navbar-container {
            padding: 1rem 2rem;
        }

        .nav-links a {
            color: #f4f4f4;
        }

        /* Estilo do botão de alternância */
        .theme-toggle-btn {
            color: #f4f4f4;
            transition: color 0.3s;
        }

        .theme-toggle-btn:hover {
            color: #ffcc00; /* Cor ao passar o mouse */
        }
    </style>
</head>
<body class="light-theme">
    <!-- Navbar -->
    <nav class="navbar light-theme">
        <div class="navbar-container">
            <div class="logo">
                <img src="logo.png" alt="Logo">
            </div>
            <ul class="nav-links">
                <li><a href="#">Início</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
            <button class="theme-toggle-btn" aria-label="Alternar Tema" onclick="toggleTheme()">🌙</button>
        </div>
    </nav>

    <script>
        // Alterna entre tema claro e escuro
        function toggleTheme() {
            const body = document.body;
            const navbar = document.querySelector('.navbar');
            const themeToggleBtn = document.querySelector('.theme-toggle-btn');

            // Verifica se o tema claro está ativo e alterna
            if (body.classList.contains('light-theme')) {
                body.classList.remove('light-theme');
                navbar.classList.remove('light-theme');
                themeToggleBtn.innerHTML = '🌞'; // Muda o ícone para sol (tema claro)
                
                body.classList.add('dark-theme');
                navbar.classList.add('dark-theme');
                themeToggleBtn.innerHTML = '🌙'; // Muda o ícone para lua (tema escuro)
            } else {
                body.classList.remove('dark-theme');
                navbar.classList.remove('dark-theme');
                themeToggleBtn.innerHTML = '🌙'; // Muda o ícone para lua (tema escuro)
                
                body.classList.add('light-theme');
                navbar.classList.add('light-theme');
                themeToggleBtn.innerHTML = '🌞'; // Muda o ícone para sol (tema claro)
            }
        }
    </script>
</body>
</html>
