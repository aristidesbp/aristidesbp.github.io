<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Boas-Vindas</title>

    <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Corpo da página */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #2c3e50, #34495e); /* Fundo azul escuro */
            font-family: 'Arial', sans-serif;
            color: white;
            text-align: center;
        }

        /* Fundo das partículas */
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }

        /* Conteúdo principal */
        .container {
            text-align: center;
            padding: 40px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.6); /* Fundo semi-transparente */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1.5s ease-in-out;
        }

        /* Título */
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            color: #f1c40f; /* Amarelo ouro */
            animation: fadeInText 2s ease;
        }

        /* Texto adicional */
        p {
            font-size: 1.2em;
            color: #ecf0f1; /* Cinza claro */
            margin-top: 20px;
            line-height: 1.5;
        }

        /* Animação de fade-in */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeInText {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Botão de ação */
        .button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1.2em;
            background-color: #f1c40f;
            color: #2c3e50;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        .button:hover {
            background-color: #d4ac0d; /* Amarelo mais escuro */
            transform: scale(1.05);
        }

        /* Responsividade */
        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }
            p {
                font-size: 1em;
            }
            .button {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>

    <!-- Fundo de partículas -->
    <div id="particles-js"></div>
    
    <!-- Conteúdo principal -->
    <div class="container">
        <h1>Bem-vindo!</h1>
        <p>Descubra soluções digitais criativas para transformar sua presença online. Criação de sites modernos e campanhas personalizadas para impulsionar seu sucesso.</p>
        <button class="button" onclick="navigateToHome()">Conheça Mais</button>
    </div>

    <script>
        // Configuração das partículas de fundo
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80 },
                "size": { "value": 3 },
                "color": { "value": "#ffffff" },
                "line_linked": { "enable": true, "color": "#ffffff" },
                "move": { "speed": 2 }
            },
            "interactivity": {
                "events": { "onhover": { "enable": true, "mode": "repulse" } }
            }
        });

        // Função para redirecionamento
        function navigateToHome() {
            window.location.href = "assets/navbar.html";
        }
    </script>
</body>
</html>
