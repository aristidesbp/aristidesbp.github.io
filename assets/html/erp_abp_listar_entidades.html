<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel ERP - Listagem de Entidades</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .loading-shimmer {
            background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <div class="min-h-screen flex flex-col">
        <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="bg-indigo-600 text-white p-2 rounded-lg">
                        <i data-lucide="layers" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-gray-900 leading-tight">ERP Sistema</h1>
                        <p class="text-xs text-gray-500">Módulo de Cadastro Geral</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="user-badge" class="text-sm bg-gray-100 text-gray-700 px-3 py-1 rounded-full font-medium hidden">Conectado</span>
                </div>
            </div>
        </header>

        <main class="flex-1 max-w-7xl w-full mx-auto p-4 sm:p-6 lg:p-8">
            
            <div class="sm:flex sm:items-center sm:justify-between mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-gray-900 tracking-tight">Entidades</h2>
                    <p class="mt-1 text-sm text-gray-600">Gerenciamento centralizado de clientes, fornecedores, funcionários e administradores.</p>
                </div>
                <div class="mt-4 sm:mt-0">
                    <button class="inline-flex items-center justify-center px-4 py-2 border border-transparent text-sm font-medium rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 shadow-sm transition">
                        <i data-lucide="plus" class="w-4 h-4 mr-2"></i> Nova Entidade
                    </button>
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm mb-6 grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="relative md:col-span-2">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        <i data-lucide="search" class="w-5 h-5"></i>
                    </div>
                    <input type="text" id="search-input" placeholder="Buscar por nome, e-mail ou documento..." class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg text-sm placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <select id="filter-tipo" class="block w-full py-2 px-3 border border-gray-300 bg-white rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="">Todos os perfis</option>
                        <option value="cliente">Cliente</option>
                        <option value="fornecedor">Fornecedor</option>
                        <option value="funcionario">Funcionário</option>
                        <option value="usuario_master">Usuário Master</option>
                    </select>
                </div>
                <div>
                    <select id="filter-status" class="block w-full py-2 px-3 border border-gray-300 bg-white rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="">Todos os status</option>
                        <option value="true">Ativos</option>
                        <option value="false">Inativos</option>
                    </select>
                </div>
            </div>

            <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200 text-left text-sm">
                        <thead class="bg-gray-50 text-xs font-semibold text-gray-500 uppercase tracking-wider">
                            <tr>
                                <th class="px-6 py-3">Nome / Razão Social</th>
                                <th class="px-6 py-3">Documento</th>
                                <th class="px-6 py-3">Contato</th>
                                <th class="px-6 py-3">Perfil</th>
                                <th class="px-6 py-3">Status</th>
                                <th class="px-6 py-3 text-right">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-gray-200">
                            </tbody>
                    </table>
                </div>
                
                <div id="empty-state" class="hidden p-12 text-center">
                    <i data-lucide="folder-open" class="w-12 h-12 text-gray-300 mx-auto mb-3"></i>
                    <h3 class="text-sm font-medium text-gray-900">Nenhuma entidade encontrada</h3>
                    <p class="mt-1 text-xs text-gray-500">Tente ajustar os parâmetros de busca ou filtros aplicados.</p>
                </div>
            </div>

        </main>
    </div>

    <script>
        // CONFIGURAÇÃO DO CLIENTE SUPABASE
        // Substitua com as credenciais reais do seu painel Supabase
        const SUPABASE_URL = "https://SEU_PROJETO.supabase.co";
        const SUPABASE_ANON_KEY = "SUA_CHAVE_ANON_AQUI";
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Elementos DOM de controle
        const tableBody = document.getElementById('table-body');
        const emptyState = document.getElementById('empty-state');
        const searchInput = document.getElementById('search-input');
        const filterTipo = document.getElementById('filter-tipo');
        const filterStatus = document.getElementById('filter-status');

        // Mapeador visual estrito para badges de Perfil
        const perfilBadges = {
            'cliente': 'bg-blue-50 text-blue-700 border-blue-200',
            'fornecedor': 'bg-amber-50 text-amber-700 border-amber-200',
            'funcionario': 'bg-purple-50 text-purple-700 border-purple-200',
            'usuario_master': 'bg-rose-50 text-rose-700 border-rose-200'
        };

        // Inicialização do fluxo de dados
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            fetchEntidades();
            
            // Listeners para filtros em tempo real (Debounce simplificado para input)
            let debounceTimer;
            searchInput.addEventListener('input', () => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(fetchEntidades, 300);
            });
            filterTipo.addEventListener('change', fetchEntidades);
            filterStatus.addEventListener('change', fetchEntidades);
        });

        // Renderiza esqueletos de carregamento (Shimmer Effect) para UX profissional
        function renderShimmer() {
            tableBody.innerHTML = '';
            emptyState.classList.add('hidden');
            for (let i = 0; i < 3; i++) {
                tableBody.innerHTML += `
                    <tr class="animate-pulse">
                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div><div class="h-3 bg-gray-100 rounded w-1/2"></div></td>
                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-1/2"></div></td>
                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-2/3"></div></td>
                        <td class="px-6 py-4"><div class="h-6 bg-gray-200 rounded w-20"></div></td>
                        <td class="px-6 py-4"><div class="h-6 bg-gray-200 rounded w-12"></div></td>
                        <td class="px-6 py-4 text-right"><div class="h-4 bg-gray-200 rounded w-8 ml-auto"></div></td>
                    </tr>
                `;
            }
        }

        // Função Principal de Busca e Query no Supabase
        async function fetchEntidades() {
            renderShimmer();
            
            try {
                // Iniciar query na tabela 'entidades' definida no schema público
                let query = supabase
                    .from('entidades')
                    .select('*')
                    .order('nome_razao_social', { ascending: true });

                // Aplicar Filtros Condicionais
                if (filterTipo.value) {
                    query = query.eq('tipo', filterTipo.value);
                }
                
                if (filterStatus.value) {
                    query = query.eq('ativo', filterStatus.value === 'true');
                }

                if (searchInput.value.trim() !== '') {
                    const searchStr = `%${searchInput.value.trim()}%`;
                    query = query.or(`nome_razao_social.ilike.${searchStr},email.ilike.${searchStr},documento_cpf_cnpj.ilike.${searchStr}`);
                }

                const { data, error } = await query;

                if (error) throw error;

                renderTable(data);

            } catch (error) {
                console.error('Erro na requisição das entidades:', error.message);
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="6" class="px-6 py-8 text-center text-sm font-medium text-red-600 bg-red-50">
                            Falha crítica ao carregar dados. Verifique a configuração das chaves do Supabase e as Políticas RLS.
                        </td>
                    </tr>
                `;
            }
        }

        // Renderização dos dados na tabela
        function renderTable(entidades) {
            tableBody.innerHTML = '';
            
            if (!entidades || entidades.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');

            entidades.forEach(item => {
                const badgeClass = perfilBadges[item.tipo] || 'bg-gray-100 text-gray-800';
                const labelTipo = item.tipo.replace('_', ' ').toUpperCase();
                
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-50 transition border-b border-gray-100';
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="font-semibold text-gray-900">${item.nome_razao_social}</div>
                        <div class="text-xs text-gray-500">${item.nome_fantasia || '---'}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-600 font-mono text-xs">
                        ${item.documento_cpf_cnpj || '<span class="text-gray-400 italic">Não informado</span>'}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-gray-900 text-xs">${item.email || '---'}</div>
                        <div class="text-gray-500 text-xs">${item.celular || item.telefone || '---'}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold border ${badgeClass}">
                            ${labelTipo}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="inline-flex items-center px-2 py-1 rounded-md text-xs font-medium ${item.ativo ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}">
                            <span class="h-1.5 w-1.5 rounded-full ${item.ativo ? 'bg-green-600' : 'bg-red-600'} mr-1.5"></span>
                            ${item.ativo ? 'Ativo' : 'Inativo'}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <button onclick="alert('Editar ID: ${item.id}')" class="text-indigo-600 hover:text-indigo-900 p-1 inline-block" title="Editar">
                            <i data-lucide="edit" class="w-4 h-4"></i>
                        </button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });

            // Recarregar os ícones renderizados dinamicamente pelo JS
            lucide.createIcons();
        }
    </script>
</body>
</html>
