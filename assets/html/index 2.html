<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo Combinado</title>
    <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1d3557, #457b9d); /* Fundo azul igual ao modelo 2 */
            color: white;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .content {
            position: relative;
            z-index: 1;
            animation: fadeIn 1s ease-out;
        }

        .typing {
            font-size: 1.5em; /* Fonte ajustada para caber melhor na tela */
            border-right: 2px solid white;
            white-space: nowrap;
            overflow: hidden;
            width: 20ch;
            animation: typing 3s steps(20), blink 0.5s step-end infinite alternate;
            color: #ffcc00; /* Fonte amarela */
        }

        h1 {
            font-size: 2.5em; /* Fonte ajustada */
            opacity: 0;
        }

        p {
            font-size: 1.2em;
            opacity: 0;
            margin-top: 20px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 20ch; }
        }

        @keyframes blink {
            from { border-color: transparent; }
            to { border-color: white; }
        }

        /* Ajustes para telas menores */
        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }
            .typing {
                font-size: 1.2em;
            }
            p {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>


    <div id="particles-js"></div>
    <div class="content">


<h1>Aumente sua presença no mundo digital!</h1>
<p>Criação de sites e campanhas para aumentar seu faturamento de forma inteligente e inovadora !!</p>

<div class="typing">
"A propaganda é a alma 
</div>

<div class="typing">
do negócio!"
</div>

        
    </div>




    <script>
        // Partículas de fundo com particles.js
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80 },
                "size": { "value": 3 },
                "color": { "value": "#ffffff" },
                "line_linked": { "enable": true, "color": "#ffffff" },
                "move": { "speed": 2 }
            },
            "interactivity": {
                "events": { "onhover": { "enable": true, "mode": "repulse" } }
            }
        });

        // Animações com GSAP
        gsap.fromTo("h1", { scale: 0.5, opacity: 0 }, { scale: 1, opacity: 1, duration: 2 });
        gsap.fromTo("p", { y: 50, opacity: 0 }, { y: 0, opacity: 1, duration: 2, delay: 1 });

        // Efeito de escrita no texto
        setTimeout(function() {
            document.querySelector('.typing').style.opacity = 1;
        }, 2500); // Atraso para o efeito de digitação
    </script>
</body>
</html>
