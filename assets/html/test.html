<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Definindo o conjunto de caracteres e as configurações da página -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARISTIDES B. PONTES</title>
    
    <style>
        /* Estilos do Header */
        .header {
            background: linear-gradient(45deg, #1e90ff, #00bcd4); /* Fundo com gradiente de azul */
            color: #fff; /* Texto branco */
            padding: 2rem 1rem; /* Espaçamento interno */
            text-align: center; /* Centralizar texto */
        }

        .header h1 {
            font-size: 2.5rem; /* Tamanho da fonte do título */
            margin-bottom: 0.5rem; /* Espaço abaixo do título */
        }

        .header p {
            font-size: 1.2rem; /* Tamanho da fonte do parágrafo */
        }

        /* Estilos para a sessão escura */
        .dark-section {
            background-color: #333; /* Fundo cinza escuro */
            color: #fff; /* Texto branco */
            padding: 2rem; /* Espaçamento interno */
            text-align: center; /* Centralizar conteúdo */
        }

        .dark-section h2 {
            font-size: 2rem; /* Tamanho da fonte do título da seção escura */
            margin-bottom: 1rem; /* Espaço abaixo do título */
        }

        .dark-section p {
            font-size: 1rem; /* Tamanho da fonte do parágrafo */
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <h1>Transforme Sua Presença Online</h1>
            <p>Oferecemos serviços de publicidade digital sob medida para impulsionar seu negócio.</p>
        </div>
    </header>

    <!-- Seção Escura -->
    <section class="dark-section">
        <h2>Como Podemos Ajudar?</h2>
        <p>Oferecemos estratégias personalizadas para aumentar sua visibilidade e gerar resultados para seu negócio.</p>
    </section>
</body>
</html>
