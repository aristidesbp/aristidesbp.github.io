<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boas-Vindas</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #4c4c4c, #2d2d2d);
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        .welcome-container {
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #ffcc00;
        }

        p {
            font-size: 1.2em;
            color: #cccccc;
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <h1>Bem-vindo ao Nosso Site!</h1>
        <p>Você será redirecionado em breve...</p>
    </div>
    <script>
        // Redirecionar para a página "home.html" após 3 segundos
        setTimeout(() => {
            window.location.href = "home.html";
        }, 3000);
    </script>
</body>
</html>
