<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="description" content="Especialistas em marketing digital e tráfego pago.">
  <meta name="keywords" content="marketing digital, tráfego pago, estratégias de venda">
  <meta name="author" content="Aristides Barbosa Pontes">
  <title>ABP MARKETING DIGITAL</title>

  <!-- Importação do Bootstrap CSS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.1/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Importação do Font Awesome para ícones -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

  <!-- Importação da fonte Roboto -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- Arquivos de estilo da aplicação -->
  <link rel="stylesheet" href="view/css/navbar.css">
  <link rel="stylesheet" href="view/css/index.css">
</head>
<body>

<!-- Contêiner onde será carregada a navbar -->
<div id="navbar-container"></div>

<!-- JavaScript para carregar a navbar dinamicamente -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Carrega o conteúdo da navbar de um arquivo externo
    fetch('navbar.html')
    .then(response => {
        if (!response.ok) {
            throw new Error('Erro ao carregar o arquivo navbar.html');
        }
        return response.text();
    })
    .then(data => {
        // Insere o conteúdo da navbar no contêiner
        document.getElementById('navbar-container').innerHTML = data;

        // Adiciona o script da navbar após o carregamento do conteúdo
        const navbarScript = document.createElement('script');
        navbarScript.src = 'view/js/navbar.js';
        document.body.appendChild(navbarScript);
    })
    .catch(error => {
        // Exibe um erro no console caso o arquivo não seja encontrado
        console.error('Erro:', error);
    });
});
</script>

<!-- Importação do Bootstrap JavaScript -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.1/js/bootstrap.bundle.min.js"></script>
</body>
</html>
