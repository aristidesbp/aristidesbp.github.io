<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="description" content="Especialistas em marketing digital e tráfego pago.">
  <meta name="keywords" content="marketing digital, tráfego pago, estratégias de venda">
  <meta name="author" content="Aristides Barbosa Pontes">
  <title>ABP MARKETING DIGITAL</title>
</head>
<body class="light-theme">

    <style>
    /* Definindo variáveis de cores para o tema claro e escuro */
    :root {
        --bg-light: #f0f8ff;
        --text-light: #1d3557;
        --bg-dark: #121212;
        --text-dark: #f0f8ff;
        --navbar-light: #1d3557;
        --navbar-dark: #333;
        --sidebar-bg: #457b9d;
        --sidebar-hover: #1d3557;
        --button-bg: #ffcc00;
        --button-hover: #d4a500;
    }

    body {
        margin: 0;
        font-family: 'Roboto', sans-serif;
        line-height: 1.6;
        margin-top: 80px;
        background-color: var(--bg-light);
        color: var(--text-light);
        transition: background-color 0.3s, color 0.3s;
    }

    body.dark-theme {
        background-color: var(--bg-dark);
        color: var(--text-dark);
    }

    .navbar {
        background-color: var(--navbar-light);
        color: white;
        padding: 10px 20px;
        display: flex;
        align-items: center;
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 1000;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    .navbar.dark-theme {
        background-color: #222;
    }

    .menu-btn, .theme-toggle-btn {
        font-size: 30px;
        background: none;
        border: none;
        color: inherit;
        cursor: pointer;
        margin-right: 10px;
        transition: transform 0.2s;
    }

    .menu-btn:hover, .theme-toggle-btn:hover {
        transform: scale(1.1);
    }

    .navbar-title {
        font-weight: bold;
    }

    .sidebar {
        position: fixed;
        top: 0;
        left: -250px;
        height: 100%;
        width: 250px;
        background-color: var(--sidebar-bg);
        color: var(--text-dark);
        padding-top: 60px;
        transition: left 0.3s ease;
        z-index: 1100;
    }

    .sidebar.dark-theme {
        background-color: #333;
    }

    .sidebar.active {
        left: 0;
    }

    .sidebar a {
        padding: 10px 20px;
        text-decoration: none;
        font-size: 20px;
        color: white;
        display: block;
        transition: background-color 0.3s;
    }

    .sidebar a:hover {
        background-color: var(--sidebar-hover);
    }

    .close-btn {
        position: absolute;
        top: 15px;
        right: 20px;
        font-size: 36px;
        color: white;
        cursor: pointer;
    }
    </style>

    <div class="navbar">
        <button class="menu-btn" aria-label="Abrir Menu" onclick="toggleMenu()">☰</button>
        <button class="theme-toggle-btn" aria-label="Alternar Tema" onclick="toggleTheme()">🌙</button>
        <div class="navbar-title">ARISTIDES B. PONTES</div>
    </div>

    <nav id="menu" class="sidebar" aria-hidden="true">
        <span class="close-btn" aria-label="Fechar Menu" onclick="closeMenu()">×</span>
        <a href="index.html">INÍCIO</a>
        <a href="#servicos">SERVIÇOS</a>
        <a href="#contato">CONTATO</a>
        <a href="01.html">01</a>
        <a href="02.html">02</a>
    </nav>



    <script>
        // Função para abrir ou fechar a sidebar
        function toggleMenu() {
            document.getElementById('menu').classList.toggle('active');
        }

        // Função para fechar a sidebar
        function closeMenu() {
            document.getElementById('menu').classList.remove('active');
        }

        // Função para alternar entre o tema claro e escuro
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            document.querySelector('.navbar').classList.toggle('dark-theme');
            document.querySelector('.sidebar').classList.toggle('dark-theme');
        }

        // Função para fechar o menu ao clicar fora dele
        document.addEventListener('click', function(event) {
            var menu = document.getElementById('menu');
            var menuBtn = document.querySelector('.menu-btn');
            
            if (!menu.contains(event.target) && !menuBtn.contains(event.target)) {
                closeMenu();
            }
        });
    </script>
<!-- footer -->
<style>
/* Estilo do footer */
.footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    text-align: center;
    padding: 20px;
    background-color: var(--navbar-light);
    color: white;
    transition: background-color 0.3s, color 0.3s;
    z-index: 1000;
}

.footer p {
    margin: 5px 0;
    font-size: 14px;
}

/* Botão verde */
.footer .scroll-top-btn {
    position: absolute;
    right: 20px;
    bottom: 20px;
    background-color: #28a745;
    color: white;
    border: none;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    font-size: 24px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
    transition: background-color 0.3s, transform 0.2s;
}

.footer .scroll-top-btn:hover {
    background-color: #218838;
    transform: scale(1.1);
}

/* Tema escuro */
body.dark-theme .footer {
    background-color: #222;
    color: var(--text-dark);
}
</style>

<footer class="footer">
    <div class="footer-content">
        <p>&copy; 2025 ABP Marketing Digital. Todos os direitos reservados.</p>
        <p>Desenvolvido por Aristides B. Pontes</p>
        <button class="scroll-top-btn" aria-label="Voltar ao topo" onclick="scrollToTop()">▲</button>
    </div>
</footer>

<script>
    // Função para rolar até o topo da página
    function scrollToTop() {
        window.scrollTo({
            top: 0,
            behavior: 'smooth'
        });
    }
</script>


</body>
</html>
