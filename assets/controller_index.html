<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="description" content="Especialistas em marketing digital e tráfego pago.">
  <meta name="keywords" content="marketing digital, tráfego pago, estratégias de venda">
  <meta name="author" content="Aristides Barbosa Pontes">
  <title>ABP MARKETING DIGITAL</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.1/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.1/css/bootstrap.min.css"> 
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/index.css">

 
</head>
<body>


<!-- Contêiner navbar -->
<div id="navbar-container"></div>

<!-- Contêiner conteúdo -->
<div id="conteudo-container"></div>

<!-- Contêiner footer -->
<div id="footer-container"></div>





<!-- comandos e arquivos JavaScript -->
<script>

// Função para carregar a navbar, conteúdo e o footer no arquivo index.html
document.addEventListener('DOMContentLoaded', function() {


    
fetch('navbar.html') 
/*Faz o carregamento navbar.html*/
.then(response => {
            if (!response.ok) {
                throw new Error('Erro ao carregar o arquivo navbar.html');
            }
            return response.text(); // Retorna o conteúdo do arquivo como texto
        })
        .then(data => {
            // Insere o conteúdo da navbar no contêiner #navbar-container
            document.getElementById('navbar-container').innerHTML = data;
        })
        .catch(error => {
            console.error('Erro:', error); // Exibe erros, caso haja algum
        });






fetch('footer.html')  
// Faz o carregamento do arquivo footer.html
        .then(response => {
            if (!response.ok) {
                throw new Error('Erro ao carregar o arquivo footer.html');
            }
            return response.text(); // Retorna o conteúdo do arquivo como texto
        })
        .then(data => {
            // Insere o conteúdo do footer no contêiner #footer-container
            document.getElementById('footer-container').innerHTML = data;
        })
        .catch(error => {
            console.error('Erro:', error); // Exibe erros, caso haja algum
        });
});

fetch('view/index.html') 
// Faz o carregamento do arquivo conteudo.html
        .then(response => {
            if (!response.ok) {
                throw new Error('Erro ao carregar o arquivo conteudo.html');
            }
            return response.text(); // Retorna o conteúdo do arquivo como texto
        })
        .then(data => {
            // Insere o conteúdo da página no contêiner #conteudo-container
            document.getElementById('conteudo-container').innerHTML = data;
        })
        .catch(error => {
            console.error('Erro:', error); // Exibe erros, caso haja algum
        });



</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>

</body>
</html>
