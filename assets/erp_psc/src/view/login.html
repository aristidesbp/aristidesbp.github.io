// src/view/login.html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP-PSC — Login</title>

    <!-- Tailwind CSS via CDN: framework de classes utilitárias -->
    <!-- Ele gera o CSS automaticamente baseado nas classes que usamos -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Material Symbols: biblioteca de ícones do Google -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- NÃO incluímos auth_check.js aqui! -->
    <!-- A tela de login é pública — não deve ter proteção de rota -->
</head>

<!-- bg-slate-100: fundo cinza claro | min-h-screen: altura mínima da tela -->
<!-- flex items-center justify-center: centraliza o conteúdo -->
<body class="bg-slate-100 font-[Inter] min-h-screen flex items-center justify-center p-4">

    <!-- Card principal: largura máxima 400px, fundo branco, sombra, borda arredondada -->
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

        <!-- Cabeçalho com ícone e título -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 rounded-2xl mb-4">
                <!-- Ícone de psicologia da biblioteca Material Symbols -->
                <span class="material-symbols-outlined text-blue-600 text-4xl">psychology</span>
            </div>
            <h1 class="text-2xl font-bold text-slate-900">ERP-PSC</h1>
            <p class="text-slate-500 text-sm mt-1">Acesse sua conta</p>
        </div>

        <!-- Área de feedback (sucesso/erro) — inicialmente oculta -->
        <!-- O controller vai mostrar/ocultar este elemento -->
        <div id="feedback-area" class="hidden mb-4 p-3 rounded-lg text-sm font-medium"></div>

        <!-- FORMULÁRIO: id="form-login" é o que o controller escuta -->
        <!-- action="javascript:void(0)" previne recarregamento sem JS -->
        <form id="form-login" class="space-y-5">

            <!-- Campo de E-mail -->
            <div>
                <label for="email" class="block text-sm font-semibold text-slate-700 mb-1.5">
                    E-mail
                </label>
                <div class="relative">
                    <!-- Ícone decorativo dentro do campo -->
                    <span class="material-symbols-outlined absolute left-3 top-3.5 text-slate-400 text-xl">mail</span>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="nome@exemplo.com"
                        autocomplete="email"
                        required
                        class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl
                               bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500
                               focus:border-transparent transition-all outline-none"
                    >
                </div>
            </div>

            <!-- Campo de Senha -->
            <div>
                <div class="flex justify-between items-center mb-1.5">
                    <label for="password" class="text-sm font-semibold text-slate-700">Senha</label>
                    <!-- Link de recuperação: id="link-recuperar-senha" -->
                    <a href="#" id="link-recuperar-senha"
                       class="text-xs text-blue-600 hover:underline">
                        Esqueci minha senha
                    </a>
                </div>
                <div class="relative">
 <span class="material-symbols-outlined absolute left-3 top-3.5 text-slate-400 text-xl">lock</span>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Sua senha"
                        autocomplete="current-password"
                        required
                        class="w-full pl-10 pr-12 py-3 border border-slate-200 rounded-xl
                               bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500
                               focus:border-transparent transition-all outline-none"
                    >
                    <!-- Botão de mostrar/ocultar senha -->
                    <button type="button" id="btn-toggle-senha"
                            class="absolute right-3 top-3.5 text-slate-400 hover:text-slate-600">
                        <span class="material-symbols-outlined text-xl">visibility</span>
                    </button>
                </div>
            </div>

            <!-- Botão de Submit: id="btn-login" é usado pelo controller -->
            <button
                type="submit"
                id="btn-login"
                class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold
                       rounded-xl transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
            >
                Entrar
            </button>

        </form>
    </div>

    <!-- Script do controller: type="module" permite usar import/export -->
    <script type="module" src="../controller/controller_login.js"></script>
</body>
</html>
