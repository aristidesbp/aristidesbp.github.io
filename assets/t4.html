<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARISTIDES B. PONTES</title>
    <style>
        :root {
            --bg-light: #f0f8ff; /* Azul claro */
            --text-light: #1d3557; /* Azul escuro */
            --bg-dark: #121212;
            --text-dark: #f0f8ff;
            --navbar-light: #1d3557; /* Azul escuro da navbar no tema claro */
            --navbar-dark: #333;
            --sidebar-bg: #457b9d; /* Azul médio */
            --sidebar-hover: #1d3557; /* Azul escuro */
            --button-bg: #ffcc00; /* Amarelo */
            --button-hover: #d4a500;
        }

        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            line-height: 1.6;
            background-color: var(--bg-light);
            color: var(--text-light);
            margin-top: 80px;
            transition: background-color 0.3s, color 0.3s;
        }

        body.dark-theme {
            background-color: var(--bg-dark);
            color: var(--text-dark);
        }

        .navbar {
            background-color: var(--navbar-light);
            color: white;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        body.dark-theme .navbar {
            background-color: var(--navbar-dark);
        }

        .menu-btn, .theme-toggle-btn {
            font-size: 30px;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            margin-right: 10px;
            transition: transform 0.2s;
        }

        .menu-btn:hover, .theme-toggle-btn:hover {
            transform: scale(1.1);
        }

        .navbar-title {
            font-weight: bold;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -250px;
            height: 100%;
            width: 250px;
            background-color: var(--sidebar-bg);
            padding-top: 60px;
            transition: left 0.3s ease;
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar a {
            padding: 10px 20px;
            text-decoration: none;
            font-size: 20px;
            color: white;
            display: block;
            transition: background-color 0.3s;
        }

        .sidebar a:hover {
            background-color: var(--sidebar-hover);
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 36px;
            color: white;
            cursor: pointer;
        }

        .hero {
            text-align: center;
            padding: 100px 20px;
            background: linear-gradient(135deg, var(--navbar-light), var(--sidebar-bg));
            color: white;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
        }

        .hero h1 {
            font-size: 3em;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        .btn {
            background-color: var(--button-bg);
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            font-size: 1em;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: var(--button-hover);
        }

        .contact {
            padding: 50px 20px;
            text-align: center;
            background: var(--bg-light);
            color: var(--text-light);
        }

        body.dark-theme .contact {
            background: var(--bg-dark);
            color: var(--text-dark);
        }

        .contact h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .contact p {
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        .contact form {
            max-width: 600px;
            margin: 0 auto;
        }

        .contact input, .contact textarea, .contact button {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid var(--text-light);
            border-radius: 5px;
        }

        body.dark-theme .contact input, 
        body.dark-theme .contact textarea, 
        body.dark-theme .contact button {
            border: 1px solid var(--text-dark);
        }

        .contact button {
            background-color: var(--button-bg);
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .contact button:hover {
            background-color: var(--button-hover);
        }
    </style>
</head>

<body class="light-theme">
    <div class="navbar">
        <button class="menu-btn" aria-label="Abrir Menu" onclick="toggleMenu()">☰</button>
        <button class="theme-toggle-btn" aria-label="Alternar Tema" onclick="toggleTheme()">🌙</button>
        <div class="navbar-title">ARISTIDES B. PONTES</div>
    </div>

    <nav id="menu" class="sidebar" aria-hidden="true">
        <span class="close-btn" aria-label="Fechar Menu" onclick="closeMenu()">×</span>
        <a href="index.html">INÍCIO</a>
        <a href="#servicos">SERVIÇOS</a>
        <a href="#contato">CONTATO</a>
        <a href="01.html">01</a>
        <a href="02.html">02</a>
    </nav>

    <div class="hero">
        <h1>Bem-vindo ao meu mundo digital!</h1>
        <p>Transformando ideias em resultados por meio de tecnologia e estratégias inteligentes.</p>
        <a href="#contato" class="btn">Entre em Contato</a>
    </div>

    <div class="contact" id="contato">
        <h2>Fale Comigo</h2>
        <p>Preencha o formulário abaixo para entrar em contato comigo:</p>
        <form>
            <input type="text" name="nome" placeholder="Seu Nome" required>
            <input type="email" name="email" placeholder="Seu Email" required>
            <textarea name="mensagem" rows="5" placeholder="Sua Mensagem" required></textarea>
            <button type="submit">Enviar</button>
        </form>
    </div>

    <script>
        const menu = document.getElementById('menu');
        const body = document.body;
        const themeToggleBtn = document.querySelector('.theme-toggle-btn');

        function toggleMenu() {
            menu.classList.toggle('active');
            menu.setAttribute('aria-hidden', !menu.classList.contains('active'));
        }

        function closeMenu() {
            menu.classList.remove('active');
            menu.setAttribute('aria-hidden', 'true');
        }

        function toggleTheme() {
            const isLight = body.classList.contains('light-theme');
            body.classList.toggle('light-theme', !isLight);
            body.classList.toggle('dark-theme', isLight);
            themeToggleBtn.innerHTML = isLight ? '🌞' : '🌙';
        }
    </script>
</body>
</html>
