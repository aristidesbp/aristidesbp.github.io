<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo com Partículas</title>
    <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            text-align: center;
            color: white;
        }
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1d1d1d, #4c4c4c);
        }
        .content {
            position: relative;
            z-index: 1;
            top: 50%;
            transform: translateY(-50%);
        }
        h1 {
            font-size: 3em;
            color: #ffcc00;
            animation: fadeInDown 2s ease-out;
        }
        p {
            font-size: 1.5em;
            color: #cccccc;
            animation: fadeInUp 2s ease-out;
        }
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="content">
        <h1>Bem-vindo ao Futuro!</h1>
        <p>Criação de sites impactantes e memoráveis.</p>
    </div>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80 },
                "size": { "value": 3 },
                "color": { "value": "#ffffff" },
                "line_linked": { "enable": true, "color": "#ffffff" },
                "move": { "speed": 2 }
            },
            "interactivity": {
                "events": { "onhover": { "enable": true, "mode": "repulse" } }
            }
        });
    </script>
</body>
</html>
