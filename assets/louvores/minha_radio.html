<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Define a codificação de caracteres para o documento -->
    <meta charset="UTF-8">
    <!-- Define a viewport para tornar a página responsiva -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Define o título da página -->
    <title>Reprodutor de Músicas e Vídeos</title>
    <!-- Inclui o CSS do Bootstrap para estilização e design responsivo -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <!-- Estilos personalizados para a página -->
    <style>
        body {
            background-color: #f8f9fa; /* Define a cor de fundo da página */
        }
        .container {
            margin-top: 50px; /* Adiciona margem superior à container */
        }
        .card {
            margin-bottom: 20px; /* Adiciona margem inferior às cards */
        }
        .navbar {
            margin-bottom: 20px; /* Adiciona margem inferior à navbar */
        }
    </style>
</head>
<body>
    <!-- Navbar para navegação -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="#">Meu Reprodutor</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#">Home</a>
                </li>
            </ul>
        </div>
    </nav>
    <!-- Container principal para o conteúdo -->
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <!-- Card para o reprodutor de áudio -->
                <div class="card">
                    <div class="card-header">
                        <h4 class="card-title">Reprodutor de Músicas</h4>
                    </div>
                    <div class="card-body">
                        <audio id="audioPlayer" controls>
                            <source src="path/to/your/music.mp3" type="audio/mpeg">
                            <!-- Mensagem caso o navegador não suporte o elemento de áudio -->
                            Seu navegador não suporta o elemento de áudio.
                        </audio>
                    </div>
                </div>
                <!-- Card para o reprodutor de vídeo -->
                <div class="card">
                    <div class="card-header">
                        <h4 class="card-title">Reprodutor de Vídeos</h4>
                    </div>
                    <div class="card-body">
                        <video id="videoPlayer" width="100%" controls>
                            <source src="path/to/your/video.mp4" type="video/mp4">
                            <!-- Mensagem caso o navegador não suporte o elemento de vídeo -->
                            Seu navegador não suporta o elemento de vídeo.
                        </video>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Scripts do Bootstrap e suas dependências -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
