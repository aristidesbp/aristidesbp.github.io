<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda de Livros</title>
    <link rel="stylesheet" href="css/livros.css">
</head>
<body>
    <!-- Cabeçalho -->
    <header>
        <h1>Loja de Livros</h1>
    </header>

    <!-- Navegação -->
    <nav>
        <ul>
            <li><a href="#inicio">Início</a></li>
            <li><a href="#livros">Livros</a></li>
            <li><a href="#contato">Contato</a></li>
        </ul>
    </nav>

    <!-- Seção principal -->
    <main>
        <!-- Slides -->
        <section id="slides">
            <h2>Destaques</h2>
            <div class="slide-container">
                <div class="slide fade">
                    <img src="livro1.jpg" alt="Livro 1">
                    <div class="text">Livro 1</div>
                </div>
                <div class="slide fade">
                    <img src="livro2.jpg" alt="Livro 2">
                    <div class="text">Livro 2</div>
                </div>
                <div class="slide fade">
                    <img src="livro3.jpg" alt="Livro 3">
                    <div class="text">Livro 3</div>
                </div>
            </div>
            <br>
            <div style="text-align:center">
                <span class="dot"></span> 
                <span class="dot"></span> 
                <span class="dot"></span> 
            </div>
        </section>

        <!-- Lista suspensa -->
        <section id="livros">
            <h2>Livros Disponíveis</h2>
            <select id="categoria" name="categoria">
                <option value="ficcao">Ficção</option>
                <option value="nao-ficcao">Não Ficção</option>
                <option value="fantasia">Fantasia</option>
                <option value="suspense">Suspense</option>
            </select>
            <div class="book-list">
                <div class="book-item">
                    <h3>Livro 1</h3>
                    <p>Autor: Autor 1</p>
                    <p>Preço: R$30,00</p>
                    <button>Comprar</button>
                </div>
                <div class="book-item">
                    <h3>Livro 2</h3>
                    <p>Autor: Autor 2</p>
                    <p>Preço: R$40,00</p>
                    <button>Comprar</button>
                </div>
                <div class="book-item">
                    <h3>Livro 3</h3>
                    <p>Autor: Autor 3</p>
                    <p>Preço: R$50,00</p>
                    <button>Comprar</button>
                </div>
            </div>
        </section>

        <!-- Contato -->
        <section id="contato">
            <h2>Contato</h2>
            <form>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email">
                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="mensagem"></textarea>
                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>

    <!-- Rodapé -->
    <footer>
        <p>&copy; 2025 Loja de Livros. Todos os direitos reservados.</p>
    </footer>

    <script src="js/livros.js"></script>
</body>
</html>
