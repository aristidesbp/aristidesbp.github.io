<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efeito de Escrita</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #000428, #004e92);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        .typing {
            font-size: 2.5em;
            border-right: 2px solid white;
            white-space: nowrap;
            overflow: hidden;
            width: 24ch;
            animation: typing 4s steps(24), blink 0.5s step-end infinite alternate;
        }
        @keyframes typing {
            from { width: 0; }
            to { width: 24ch; }
        }
        @keyframes blink {
            from { border-color: transparent; }
            to { border-color: white; }
        }
    </style>
</head>
<body>
    <div class="typing">Transforme sua presença online!</div>
</body>
</html>
