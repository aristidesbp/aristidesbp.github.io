<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reprodutor de Músicas e Vídeos</title>
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            margin-top: 50px;
        }
        .card {
            margin-bottom: 20px;
        }
        .navbar {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>



    
 <h1>Music Search</h1>
    <input type="text" id="searchInput" placeholder="Search for music...">
    <button onclick="searchMusic()">Search</button>
    <ul id="searchResults"></ul>

    <script>
        // Exemplo de lista de músicas (substitua isso com a sua lista real)
        const musicList = [
            { title: "A Benção - Gabriel Guedes e Júlia Vitória (Letra-Legendado).mp4", artist: "Gabriel Guedes e Júlia Vitória" },
            { title: "Song 2", artist: "Artist 2" },
            { title: "Song 3", artist: "Artist 3" },
            // Adicione mais músicas aqui
        ];

        function searchMusic() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const results = musicList.filter(music => 
                music.title.toLowerCase().includes(query) || 
                music.artist.toLowerCase().includes(query)
            );

            displayResults(results);
        }

        function displayResults(results) {
            const resultsContainer = document.getElementById('searchResults');
            resultsContainer.innerHTML = "";

            results.forEach(music => {
                const listItem = document.createElement('li');
                listItem.textContent = `${music.title} by ${music.artist}`;
                resultsContainer.appendChild(listItem);
            });
        }
    </script>







                    <div class="card-body">
                        <audio id="audioPlayer" controls>
                            <source src="A Benção - Gabriel Guedes e Júlia Vitória (Letra-Legendado).mp3" type="audio/mpeg">
                            Seu navegador não suporta o elemento de áudio.
                        </audio>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">
                        <h4 class="card-title">Reprodutor de Vídeos</h4>
                    </div>
                    <div class="card-body">
                        <video id="videoPlayer" width="100%" controls>
                            <source src="A Benção - Gabriel Guedes e Júlia Vitória (Letra-Legendado).mp4" type="video/mp4">
                            Seu navegador não suporta o elemento de vídeo.
                        </video>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap JS and dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
