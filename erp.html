<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Integrado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="erp.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col m-0 p-0">

    <div id="auth-screen" class="flex-1 flex items-center justify-center p-4">
        <div class="bg-gray-800 p-8 rounded-lg shadow-xl w-full max-w-md border border-gray-700">
            <h2 class="text-2xl font-bold text-center text-blue-500 mb-6"><i class="fa-solid fa-layer-group mr-2"></i>ERP SISTEMA</h2>
            <form id="auth-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">E-mail</label>
                    <input type="email" id="auth-email" required class="w-full p-2.5 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500 text-white">
                </div>
                
                <div class="relative">
                    <label class="block text-sm font-medium mb-1">Senha</label>
                    <input type="password" id="auth-password" required class="w-full p-2.5 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500 text-white">
                    <button type="button" id="btn-toggle-password" class="absolute right-3 top-9 text-gray-400 hover:text-white transition-colors">
                        <i class="fa-solid fa-eye" id="toggle-icon"></i>
                    </button>
                </div>

                <div class="flex gap-4 pt-2">
                    <button type="button" id="btn-login" class="flex-1 bg-blue-600 hover:bg-blue-700 font-medium py-2 px-4 rounded transition-colors text-white">Entrar</button>
                    <button type="button" id="btn-register" class="flex-1 bg-gray-600 hover:bg-gray-700 font-medium py-2 px-4 rounded transition-colors text-white">Registrar</button>
                </div>
            </form>
        </div>
    </div>

    <div id="app-screen" class="hidden flex-1 flex flex-col md:flex-row m-0 p-0">
        <aside class="w-full md:w-64 bg-gray-800 border-r border-gray-700 flex flex-col">
            <div class="p-4 border-b border-gray-700 flex justify-between items-center">
                <span class="font-bold text-lg text-blue-400"><i class="fa-solid fa-layer-group mr-2"></i>ERP PRO</span>
                <button id="btn-logout" class="text-gray-400 hover:text-red-400" title="Sair"><i class="fa-solid fa-sign-out-alt"></i></button>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <button data-target="m-financeiro" class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded transition-colors text-left bg-blue-600 text-white font-medium">
                    <i class="fa-solid fa-wallet w-5"></i> Financeiro
                </button>
                <button data-target="m-tarefas" class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded transition-colors text-left text-gray-400 hover:bg-gray-700 hover:text-white">
                    <i class="fa-solid fa-list-check w-5"></i> Tarefas
                </button>
                <button data-target="m-entidades" class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded transition-colors text-left text-gray-400 hover:bg-gray-700 hover:text-white">
                    <i class="fa-solid fa-users w-5"></i> Entidades
                </button>
            </nav>
            <div class="p-4 border-t border-gray-700 text-xs text-gray-500 truncate" id="user-display"></div>
        </aside>

        <main class="flex-1 p-6 overflow-y-auto">
            <section id="m-financeiro" class="tab-content space-y-6">
                <div class="flex justify-between items-center">
                    <h1 class="text-2xl font-bold"><i class="fa-solid fa-wallet text-blue-500 mr-2"></i>Gestão Financeira</h1>
                    <button class="open-modal-btn bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded font-medium transition-colors text-sm" data-modal="modal-financeiro">
                        <i class="fa-solid fa-plus mr-1"></i> Nova Transação
                    </button>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div class="bg-gray-800 p-4 rounded-lg border border-gray-700"><p class="text-gray-400 text-sm">Receitas</p><p id="fin-receitas" class="text-2xl font-bold text-green-400">R$ 0,00</p></div>
                    <div class="bg-gray-800 p-4 rounded-lg border border-gray-700"><p class="text-gray-400 text-sm">Despesas</p><p id="fin-despesas" class="text-2xl font-bold text-red-400">R$ 0,00</p></div>
                    <div class="bg-gray-800 p-4 rounded-lg border border-gray-700"><p class="text-gray-400 text-sm">Saldo Geral</p><p id="fin-saldo" class="text-2xl font-bold text-white">R$ 0,00</p></div>
                </div>
                <div class="bg-gray-800 rounded-lg border border-gray-700 overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-700/50 text-xs uppercase text-gray-400 border-b border-gray-700">
                                <th class="p-3">Descrição</th><th class="p-3">Entidade</th><th class="p-3">Tipo</th><th class="p-3">Valor</th><th class="p-3">Vencimento</th><th class="p-3">Status</th><th class="p-3 text-right">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="table-financeiro-body" class="divide-y divide-gray-700 text-sm"></tbody>
                    </table>
                </div>
            </section>

            <section id="m-tarefas" class="tab-content space-y-6 hidden">
                </section>

            <section id="m-entidades" class="tab-content space-y-6 hidden">
                </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="erp.js"></script>
</body>
</html>
