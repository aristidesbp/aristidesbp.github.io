<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ERP ABP</title>

    <!-- Estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <!-- Supabase e Configuração -->
    <script src="assets/js/supabase_config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Inicialização única e unificada para todo o sistema
        window.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>
</head>
<body class="bg-slate-950 text-white flex items-center justify-center min-h-screen p-4">

 <div class="glass p-8 rounded-2xl w-full max-w-md shadow-2xl border border-slate-800">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black tracking-tighter text-blue-500">ERP ABP</h1>
            <p class="text-slate-400 text-sm">Acesse sua conta para gerenciar seus PDFs</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold mb-1 text-slate-400 uppercase">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
            
            <div class="relative">
                <label class="block text-xs font-bold mb-1 text-slate-400 uppercase">Senha</label>
                <input type="password" id="password" placeholder="••••••••" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <button type="button" onclick="alternarSenha()" class="absolute right-3 top-8 text-slate-500 hover:text-white">🔒</button>
            </div>

            <div class="text-right">
                <button onclick="solicitarRecuperacao()" class="text-xs text-blue-400 hover:underline">Esqueceu a senha?</button>
            </div>
            
            <div class="flex gap-3 pt-2">
                <button onclick="realizarLogin()" class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-all shadow-lg shadow-blue-900/20">ENTRAR</button>
                <button onclick="confirmarCadastro()" class="flex-1 py-3 border border-slate-700 hover:bg-slate-800 text-white font-bold rounded-xl transition-all">CADASTRAR</button>
            </div>
        </div>
    </div>

    <script>
        function alternarSenha() {
            const campo = document.getElementById('password');
            if (campo) campo.type = campo.type === 'password' ? 'text' : 'password';
        }

        async function realizarLogin() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('password').value;

            if (!email || !senha) return alert("Preencha o e-mail e a senha.");

            try {
                const { data, error } = await window.supabase.auth.signInWithPassword({ email, password: senha });
                if (error) throw error;
                window.location.href = 'index.html';
            } catch (err) {
                alert("Erro ao entrar: " + err.message);
            }
        }

        async function realizarCadastro() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('password').value;
            const { error } = await window.supabase.auth.signUp({ email, password: senha });
            if (error) alert("Erro: " + error.message);
            else alert("Sucesso! Verifique seu e-mail.");
        }

        function confirmarCadastro() {
            const email = document.getElementById('email').value;
            if (confirm(`Criar conta para ${email}?`)) realizarCadastro();
        }

        async function solicitarRecuperacao() {
            const email = document.getElementById('email').value;
            const { error } = await window.supabase.auth.resetPasswordForEmail(email, { redirectTo: 'redefinir_senha.html' });
            if (error) alert(error.message);
            else alert("Link enviado!");
        }
    </script>
</body>
</html>
