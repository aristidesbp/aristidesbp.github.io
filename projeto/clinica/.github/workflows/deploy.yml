# ARQUIVO: .github/workflows/deploy.yml

# Executa a cada push na branch main

name: Deploy ERP-PSC

on:

push:

branches: [main]

permissions:

contents: read

pages: write

id-token: write

jobs:

deploy:

runs-on: ubuntu-latest

steps:

- uses: actions/checkout@v4

# Injeta as chaves do Supabase nos arquivos JS

# As variáveis __SUPABASE_URL__ viram os valores reais

- name: Injetar variáveis

run: |

find . -name "*.js" -exec sed -i

"s|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g" {} ;

find . -name "*.js" -exec sed -i
"s|__SUPABASE_KEY__|${{ secrets.SUPABASE_KEY }}|g" {} ;

- uses: actions/configure-pages@v4

- uses: actions/upload-pages-artifact@v3

with:

path: .

- uses: actions/deploy-pages@v4
