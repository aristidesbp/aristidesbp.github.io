<script>

        
document.getElementById('password-toggle').addEventListener('click', function() {
  const passwordInput = document.getElementById('input-password');
  const icon = this.querySelector('.material-symbols-outlined');
  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    icon.textContent = 'visibility_off';
  } else {
    passwordInput.type = 'password';
    icon.textContent = 'visibility';
  }
});

document.getElementById('captcha-checkbox-container').addEventListener('click', function() {
  const checkIcon = document.getElementById('captcha-check');
  checkIcon.classList.toggle('hidden');
  if (!checkIcon.classList.contains('hidden')) {
    this.classList.add('border-primary');
  } else {
    this.classList.remove('border-primary');
  }
});
</script>

<script>
    // Usamos DOMContentLoaded para garantir que o HTML carregou antes de buscar os IDs
    document.addEventListener('DOMContentLoaded', () => {
        // Toggle da Senha
        const btnTogglePassword = document.getElementById('password-toggle');
        const inputPassword = document.getElementById('input-password');
        
        if (btnTogglePassword && inputPassword) {
            btnTogglePassword.addEventListener('click', function() {
                const icon = this.querySelector('.material-symbols-outlined');
                if (inputPassword.type === 'password') {
                    inputPassword.type = 'text';
                    icon.textContent = 'visibility_off';
                } else {
                    inputPassword.type = 'password';
                    icon.textContent = 'visibility';
                }
            });
        }

        // Toggle do Checkbox "Não sou um robô"
        const captchaContainer = document.getElementById('captcha-checkbox-container');
        const captchaCheck = document.getElementById('captcha-check');

        if (captchaContainer && captchaCheck) {
            captchaContainer.addEventListener('click', function() {
                captchaCheck.classList.toggle('hidden');
                if (!captchaCheck.classList.contains('hidden')) {
                    this.classList.add('border-primary');
                } else {
                    this.classList.remove('border-primary');
                }
            });
        }
    });
</script>

<script>
    // ==========================================
    // ARQUIVO: model/login.js
    // OBJETIVO: Processar a entrada do usuário
    // ==========================================

    async function fazer_login(event) {
        // 1. Captura os dados da tela (ID CORRIGIDO PARA email-input)
        const emailInput = document.getElementById('email-input');
        const passwordInput = document.getElementById('input-password');

        if (!emailInput || !passwordInput) {
            console.error("Inputs não encontrados no HTML. Verifique os IDs.");
            return;
        }

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        // 2. Validação de campos vazios
        if (!email || !password) {
            alert("Por favor, preencha o e-mail e a senha.");
            return;
        }

        // 3. Efeito visual no botão (Capturando corretamente o botão clicado)
        let btn = null;
        let textoOriginal = "Entrar";

        if (event && event.currentTarget) {
            btn = event.currentTarget;
            textoOriginal = btn.innerHTML;
            
            // Ícone animado do Google Material Symbols
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" style="font-size: 20px;">sync</span> Autenticando...';
            btn.disabled = true;
            btn.classList.add('opacity-70', 'cursor-not-allowed');
        }

        try {
            // 4. Envia o pedido de login para o Supabase
            const { data, error } = await window.supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            // 5. Lida com erros (Senha errada, usuário não existe)
            if (error) {
                if (error.message.includes('Invalid login credentials')) {
                    alert("Acesso negado: E-mail ou senha incorretos.");
                } else {
                    alert("Erro ao tentar entrar: " + error.message);
                }
                
                // Restaura o botão
                if (btn) {
                    btn.innerHTML = textoOriginal;
                    btn.disabled = false;
                    btn.classList.remove('opacity-70', 'cursor-not-allowed');
                }
                return;
            }

            // 6. Sucesso
            console.log("✅ Login aprovado! Redirecionando...");
            
            // Limpa os campos por segurança
            emailInput.value = '';
            passwordInput.value = '';

            // 7. REDIRECIONAMENTO (Isso tira o usuário da tela de login)
            // IMPORTANTE: Altere "painel.html" para o nome real da página do seu sistema
            window.location.href = "painel.html"; 

        } catch (err) {
            console.error("Erro crítico:", err);
            alert("Falha de conexão com o servidor.");
            
            // Restaura o botão
            if (btn) {
                btn.innerHTML = textoOriginal;
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        }
    }

    console.log("✅ Conexão com: model/login.js estabelecida.");        
</script>
