<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="../controller/tailwind_config.js"></script>
<link rel="stylesheet" href="../../link_rel_styleseet/href_login.css">
        
</head>
<body class="bg-background font-sans antialiased">
<!-- Initial Loading State (Cloak) -->
<div id="app-loader">
<div class="flex flex-col items-center">
<div class="w-12 h-12 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
<p class="mt-4 text-slate-500 font-medium animate-pulse">Carregando...</p>
</div>
</div>
<div class="opacity-0 transition-opacity duration-500 min-h-screen flex items-center justify-center p-4" id="app-content">
<div class="w-full max-w-md bg-white shadow-xl rounded-2xl border border-slate-100 overflow-hidden">
<div class="p-8">
<!-- Header -->
<div class="flex flex-col items-center mb-8">
<div class="mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-primary/10 text-primary">
<span class="material-symbols-outlined !text-4xl">psychology</span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-slate-900">ERP-PSC</h1>
<p class="mt-2 text-sm text-slate-500">Plataforma Clínica Segura</p>
</div>
<!-- Login Form -->
<form class="space-y-5" id="loginForm">
<div class="hidden p-3 rounded-lg bg-red-50 border border-red-200 text-red-600 text-sm font-medium" id="errorMessage"></div>
<div>
<label class="block text-sm font-semibold text-slate-700 mb-1.5" for="email">E-mail</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined !text-xl">person</span>
</div>
<input class="block w-full rounded-lg border border-slate-300 bg-white py-3 pl-11 pr-4 text-slate-900 placeholder-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" id="email" placeholder="exemplo@clinica.com" required="" type="email"/>
</div>
</div>
<div>
<div class="flex items-center justify-between mb-1.5">
<label class="block text-sm font-semibold text-slate-700" for="password">Senha</label>
<a class="text-xs font-semibold text-primary hover:underline" href="#forgot-password">Esqueci minha senha</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined !text-xl">lock</span>
</div>
<input class="block w-full rounded-lg border border-slate-300 bg-white py-3 pl-11 pr-12 text-slate-900 placeholder-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center pr-3.5 text-slate-400 hover:text-slate-600 transition-colors" id="btn-toggle-senha" type="button">
<span class="material-symbols-outlined !text-xl" id="eyeIcon">visibility</span>
</button>
</div>
</div>
<div class="flex items-center">
<input class="w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary cursor-pointer" id="remember" type="checkbox"/>
<label class="ml-2 text-sm text-slate-600 cursor-pointer" for="remember">Lembrar de mim</label>
</div>
<!-- reCAPTCHA Mock -->
<div class="flex items-center justify-between p-3 bg-slate-50 border border-slate-200 rounded-lg shadow-sm transition-colors" id="recaptcha-box">
<div class="flex items-center gap-3">
<input class="w-6 h-6 rounded border-slate-300 text-primary focus:ring-primary cursor-pointer" id="recaptcha" type="checkbox"/>
<label class="text-sm font-medium text-slate-700 cursor-pointer" for="recaptcha">Não sou um robô</label>
</div>
<div class="flex flex-col items-center justify-center text-[10px] text-slate-400 opacity-80">
<img alt="reCAPTCHA" class="w-6 h-6 mb-0.5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCwBViAIKDiJFccF3AgViTf-5JJuClFraf5O_gcQqFL4kkDr_oERNIkk8KQ93SM2JmuQXTPIrvrcNOUbKT4uY5SMGU5Nj4BYYdq5VTPfd9Jgv-PqID4YCSV2LcvLUu80tHy5yS7sgeoOCJ3eYDEm8D7A20hmCO3iVpngCkIsnUwKA_2_IMrQXGreJGxTbQlYtZb_ZH1LBL80uKD31jWt9-tsv3mNMNhEqO9hL0UsbrT1fndORf5gnmW918VnU2Nlg8fQ8yp9Wq2yKQ_"/>
<span>reCAPTCHA</span>
</div>
</div>
<button class="relative flex w-full items-center justify-center rounded-lg bg-primary py-3.5 px-4 text-sm font-bold text-white shadow-lg shadow-primary/20 transition-all hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary/50 active:scale-[0.98] gap-2" id="submitBtn" type="submit">
<span>Entrar</span>
<span class="material-symbols-outlined text-xl">login</span>
</button>
</form>
<!-- Forgot Password Section -->
<div class="mt-10 pt-10 border-t border-slate-100" id="forgot-password">
<div class="flex flex-col items-center text-center">
<div class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-slate-500">lock_reset</span>
</div>
<h2 class="text-lg font-bold text-slate-900 mb-2">Recuperar Acesso</h2>
<p class="text-xs text-slate-500 mb-6 leading-relaxed px-4">
                            Informe seus dados para receber as instruções de redefinição.
                        </p>
<form class="w-full space-y-3" id="recoveryForm">
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-2.5 border border-slate-300 rounded-lg bg-white text-slate-900 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" id="recovery-email" name="email" placeholder="E-mail cadastrado" required="" type="email"/>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">call</span>
</div>
<input class="block w-full pl-11 pr-4 py-2.5 border border-slate-300 rounded-lg bg-white text-slate-900 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" id="recovery-phone" name="phone" placeholder="(00) 00000-0000" required="" type="tel"/>
</div>
<button class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-2.5 px-6 rounded-lg flex items-center justify-center gap-2 transition-all active:scale-[0.98] text-sm mt-2" id="btn-recovery-send" type="submit">
<span class="material-symbols-outlined text-lg">send</span>
                                Enviar Link
                            </button>
</form>
</div>
</div>
</div>
</div>
</div>
<!-- Scripts -->
<script src="supabase_config.js"></script>
<script src="auth.js"></script>
<script>
        function revealApp() {
            const loader = document.getElementById('app-loader');
            const content = document.getElementById('app-content');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 300);
            }
            if (content) {
                content.classList.remove('opacity-0');
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // Check session with Supabase
                const { data: { session } } = await window.supabaseClient.auth.getSession();
                if (session) {
                    window.location.href = 'pedagogo_dashboard.html';
                } else {
                    revealApp();
                }
            } catch (err) {
                console.error('Initialization error:', err);
                revealApp();
            }
        });

        // Form Handling
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const recaptcha = document.getElementById('recaptcha');
            const submitBtn = document.getElementById('submitBtn');
            const errorMessage = document.getElementById('errorMessage');

            if (!recaptcha.checked) {
                errorMessage.textContent = 'Por favor, confirme que você não é um robô.';
                errorMessage.classList.remove('hidden');
                document.getElementById('recaptcha-box').classList.add('border-red-500', 'bg-red-50');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70', 'cursor-not-allowed');
            errorMessage.classList.add('hidden');

            try {
                // Calling Auth.login from auth.js
                const success = await Auth.login(email, password);
                if (success) {
                    window.location.href = 'pedagogo_dashboard.html';
                } else {
                    errorMessage.textContent = 'Credenciais inválidas. Tente novamente.';
                    errorMessage.classList.remove('hidden');
                }
            } catch (err) {
                errorMessage.textContent = 'Erro ao realizar login. Verifique sua conexão.';
                errorMessage.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        });

        // Password Visibility Toggle
        const toggleBtn = document.getElementById('btn-toggle-senha');
        toggleBtn.addEventListener('click', () => {
            const input = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            eyeIcon.textContent = isPassword ? 'visibility_off' : 'visibility';
        });

        // Simple recovery form action
        const recoveryForm = document.getElementById('recoveryForm');
        recoveryForm.addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Um link de recuperação será enviado se os dados coincidirem com nossos registros.');
        });
    </script>
</body></html>
