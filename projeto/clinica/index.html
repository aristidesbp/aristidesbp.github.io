<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Psico - ERP ABP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #6366f1; --dark: #1e1b4b; } /* Azul Indigo para saúde/psicologia */
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .status-concluido { background: #d1fae5; color: #065f46; padding: 4px 8px; border-radius: 6px; font-weight: bold; }
        .status-pendente { background: #fee2e2; color: #991b1b; padding: 4px 8px; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="tela-login" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-xl shadow-lg max-w-sm w-full border-t-4 border-indigo-600">
            <div class="text-center mb-8">
                <i class="fas fa-brain text-5xl text-indigo-600 mb-3"></i>
                <h2 class="text-2xl font-bold">Portal Psico</h2>
            </div>
            <input type="email" id="login-email" placeholder="E-mail" class="w-full p-2 border rounded mb-4">
            <input type="password" id="login-senha" placeholder="Senha" class="w-full p-2 border rounded mb-4">
            <button onclick="fazerLogin()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded">Entrar</button>
        </div>
    </div>

    <div id="tela-sistema" class="hidden">
        <nav class="bg-white p-4 shadow-md flex justify-between items-center fixed top-0 w-full z-40">
            <h1 class="font-bold text-xl text-indigo-800"><i class="fas fa-brain"></i> Sistema Psicopedagógico</h1>
            <button onclick="sair()" class="text-gray-500 font-bold">Sair <i class="fas fa-sign-out-alt"></i></button>
        </nav>

        <div class="container mx-auto px-4 pt-24 pb-10">
            
            <div id="area-staff" class="hidden">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div class="card">
                        <h3 class="font-bold mb-4">Cadastrar Novo Exercício</h3>
                        <input type="text" id="ex-titulo" placeholder="Título do Exercício" class="w-full p-2 border rounded mb-2">
                        <textarea id="ex-desc" placeholder="Instruções para o paciente" class="w-full p-2 border rounded mb-2"></textarea>
                        <button onclick="salvarExercicio()" class="bg-indigo-600 text-white px-4 py-2 rounded w-full">Gravar Exercício</button>
                    </div>
                    
                    <div class="card">
                        <h3 class="font-bold mb-4">Atribuir a Paciente</h3>
                        <select id="select-paciente" class="w-full p-2 border rounded mb-2"></select>
                        <select id="select-exercicio" class="w-full p-2 border rounded mb-2"></select>
                        <button onclick="atribuirExercicio()" class="bg-emerald-500 text-white px-4 py-2 rounded w-full">Enviar para Paciente</button>
                    </div>
                </div>

                <div class="card">
                    <h3 class="font-bold mb-4">Relatório de Acompanhamento (Geral)</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="bg-gray-100 text-xs">
                                    <th class="p-3">Paciente</th>
                                    <th class="p-3">Exercício</th>
                                    <th class="p-3">Status</th>
                                    <th class="p-3">Feedback</th>
                                </tr>
                            </thead>
                            <tbody id="lista-atribuicoes-staff"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="area-paciente" class="hidden">
                <div class="card mb-6">
                    <h2 class="text-xl font-bold text-indigo-700">Olá! Seus Exercícios de Hoje:</h2>
                </div>
                <div id="lista-exercicios-paciente" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>

        </div>
    </div>

    <script>
      // Configuração do Supabase
        const supabaseUrl = 'https://wyusolfkxrnwijwjusnv.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5dXNvbGZreHJud2lqd2p1c252Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NzU0MTMsImV4cCI6MjA5MTA1MTQxM30.RJ0GOHHP4rB40CH0x8JZ1FWAzNcakSprgUwOBtOUVbA'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);


        let userRole = '';

        async function fazerLogin() {
            const email = document.getElementById('login-email').value;
            const senha = document.getElementById('login-senha').value;
            
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password: senha });
            if (error) return alert("Erro no login");

            verificarPerfil(data.user.id);
        }

        async function verificarPerfil(uid) {
            const { data } = await _supabase.from('perfis').select('role').eq('id', uid).single();
            userRole = data.role;
            
            document.getElementById('tela-login').classList.add('hidden');
            document.getElementById('tela-sistema').classList.remove('hidden');

            if (userRole === 'psicopedagoga' || userRole === 'supervisor') {
                document.getElementById('area-staff').classList.remove('hidden');
                carregarDadosStaff();
            } else {
                document.getElementById('area-paciente').classList.remove('hidden');
                carregarExerciciosPaciente();
            }
        }

        async function carregarExerciciosPaciente() {
            const { data: { user } } = await _supabase.auth.getUser();
            const { data } = await _supabase.from('atribuicoes')
                .select('*, exercicios(*)')
                .eq('paciente_id', user.id);

            const container = document.getElementById('lista-exercicios-paciente');
            container.innerHTML = data.map(item => `
                <div class="card border-l-4 ${item.status === 'concluido' ? 'border-emerald-500' : 'border-red-500'}">
                    <h4 class="font-bold text-lg">${item.exercicios.titulo}</h4>
                    <p class="text-sm text-gray-600 mb-4">${item.exercicios.descricao}</p>
                    ${item.status === 'pendente' 
                        ? `<button onclick="concluirTarefa('${item.id}')" class="bg-indigo-500 text-white px-4 py-1 rounded">Marcar como Feito</button>`
                        : `<span class="status-concluido">Concluído!</span>`
                    }
                </div>
            `).join('');
        }

        async function concluirTarefa(id) {
            const feedback = prompt("Como foi realizar esse exercício?");
            await _supabase.from('atribuicoes').update({ 
                status: 'concluido', 
                feedback_paciente: feedback,
                data_conclusao: new Date()
            }).eq('id', id);
            carregarExerciciosPaciente();
        }

        async function sair() {
            await _supabase.auth.signOut();
            location.reload();
        }
    </script>
</body>
<!--

DROP TABLE IF EXISTS public.perfis CASCADE;
DROP TABLE IF EXISTS public.exercicios CASCADE;

-- 1. Tabela de Perfis (Define quem é Psicopedagoga, Supervisor ou Paciente)
CREATE TABLE public.perfis (
    id UUID REFERENCES auth.users(id) ON DELETE CASCADE PRIMARY KEY,
    nome TEXT NOT NULL,
    role TEXT CHECK (role IN ('psicopedagoga', 'supervisor', 'paciente')) DEFAULT 'paciente',
    created_at TIMESTAMP WITH TIME ZONE DEFAULT now()
);

-- 2. Tabela de Exercícios
CREATE TABLE public.exercicios (
    id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
    titulo TEXT NOT NULL,
    descricao TEXT,
    video_url TEXT, -- Link para tutorial
    categoria TEXT, -- Ex: Memória, Concentração, Leitura
    criado_por UUID REFERENCES auth.users(id)
);

-- 3. Atribuição de Exercícios aos Pacientes (Relacionamento)
CREATE TABLE public.atribuicoes (
    id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
    paciente_id UUID REFERENCES auth.users(id) ON DELETE CASCADE,
    exercicio_id UUID REFERENCES public.exercicios(id) ON DELETE CASCADE,
    status TEXT DEFAULT 'pendente' CHECK (status IN ('pendente', 'concluido')),
    feedback_paciente TEXT,
    data_conclusao TIMESTAMP WITH TIME ZONE
);

-- Habilitar RLS
ALTER TABLE public.perfis ENABLE ROW LEVEL SECURITY;
ALTER TABLE public.exercicios ENABLE ROW LEVEL SECURITY;
ALTER TABLE public.atribuicoes ENABLE ROW LEVEL SECURITY;

-- Políticas Simples: Supervisor e Psicopedagoga veem tudo. Paciente vê só o dele.
CREATE POLICY "Acesso Total para Staff" ON public.atribuicoes 
FOR ALL USING (EXISTS (SELECT 1 FROM perfis WHERE id = auth.uid() AND role IN ('psicopedagoga', 'supervisor')));

CREATE POLICY "Acesso Paciente" ON public.atribuicoes 
FOR SELECT USING (paciente_id = auth.uid());


    -- Função que o Supabase vai executar
CREATE OR REPLACE FUNCTION public.handle_new_user()
RETURNS trigger AS $$
BEGIN
  INSERT INTO public.perfis (id, nome, role)
  VALUES (new.id, new.raw_user_meta_data->>'full_name', 'paciente');
  RETURN new;
END;
$$ LANGUAGE plpgsql security definer;

-- Gatilho que dispara a função após o cadastro
CREATE TRIGGER on_auth_user_created
  AFTER INSERT ON auth.users
  FOR EACH ROW EXECUTE PROCEDURE public.handle_new_user();
-->
