<option value="">Selecione</option>

                Salvar Registro
            </button>
<button class="flex h-12 w-full items-center justify-center rounded-xl bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-400 text-base font-bold tracking-wide hover:bg-slate-300 dark:hover:bg-slate-700 transition-all" id="btn_cancelar">
                Cancelar
            </button>

<!-- Recent Entities Section -->
</main>
</div>
<script>
        document.getElementById('btn_salvar').addEventListener('click', async () => {
            const nome = document.getElementById('input_nome').value;
            const cpf = document.getElementById('input_cpf').value;
            const nascimento = document.getElementById('input_nascimento').value;
            const email = document.getElementById('input_email').value;
            const telefone = document.getElementById('input_telefone').value;
            const cep = document.getElementById('input_cep').value;
            const logradouro = document.getElementById('input_logradouro').value;
            const numero = document.getElementById('input_numero').value;
            const bairro = document.getElementById('input_bairro').value;
            const cidade = document.getElementById('input_cidade').value;
            const uf = document.getElementById('input_uf').value;
            
            const tipo_entidade = document.querySelector('input[name="tipo_entidade"]:checked').value;
            
            const permissoes = {
                ler: document.getElementById('check_permissao_ler').checked,
                editar: document.getElementById('check_permissao_editar').checked,
                cadastrar: document.getElementById('check_permissao_cadastrar').checked,
                deletar: document.getElementById('check_permissao_deletar').checked
            };
            
            const urls_permitidas = document.getElementById('textarea_urls_acesso').value.split(/[\n,]+/).map(u => u.trim()).filter(u => u !== '');

            const payload = {
                p_nome: nome,
                p_cpf: cpf,
                p_nascimento: nascimento,
                p_email: email,
                p_telefone: telefone,
                p_cep: cep,
                p_logradouro: logradouro,
                p_numero: numero,
                p_bairro: bairro,
                p_cidade: cidade,
                p_uf: uf,
                p_tipo: tipo_entidade,
                p_permissoes: permissoes,
                p_urls: urls_permitidas
            };

            try {
                const { data, error } = await window.supabaseClient.rpc('cadastrar_entidade', payload);

                if (error) {
                    console.error('Erro ao cadastrar:', error);
                    alert('Erro ao realizar o cadastro: ' + error.message);
                } else {
                    alert('Cadastro realizado com sucesso!');
                    window.location.href = 'listar_entidades.html';
                }
            } catch (err) {
                console.error('Erro inesperado:', err);
                alert('Ocorreu um erro inesperado.');
            }
        });

        document.getElementById('btn_cancelar').addEventListener('click', () => {
            window.location.href = 'listar_entidades.html';
        });

        document.getElementById('avatar_container').addEventListener('click', () => {
            document.getElementById('input_foto').click();
        });
    </script><script>
    const btnMenu = document.getElementById('btn_menu');
    const dropdownMenu = document.getElementById('dropdown_menu');
    const linkForm = document.getElementById('menu_link_form');
    const linkList = document.getElementById('menu_link_list');

    btnMenu.addEventListener('click', (e) => {
        e.stopPropagation();
        dropdownMenu.classList.toggle('hidden');
    });

    document.addEventListener('click', (e) => {
        if (!dropdownMenu.contains(e.target) && !btnMenu.contains(e.target)) {
            dropdownMenu.classList.add('hidden');
        }
    });

    linkForm.addEventListener('click', () => {
        document.getElementById('form_section').scrollIntoView({ behavior: 'smooth' });
        dropdownMenu.classList.add('hidden');
    });

    linkList.addEventListener('click', () => {
        document.getElementById('list_section').scrollIntoView({ behavior: 'smooth' });
        dropdownMenu.classList.add('hidden');
    });
</script></body></html>
