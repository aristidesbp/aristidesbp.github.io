<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ERP ABP</title>
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="model_supabase_config.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="../link_rel_stylesheet/href_login.css">
</head>
<body>

    <div class="login-wrapper">
        <div class="login-box">
            
            <div class="logo-container">
                <i class="fas fa-chart-line"></i>
                <h2>ERP ABP</h2>
            </div>
            <p class="subtitle">Acesso restrito ao sistema</p>

            <div id="error-msg" class="error-message" style="display: none;"></div>

            <div class="input-group">
                <label for="login-email">E-mail de acesso</label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-envelope text-gray-400"></i>
                    <input type="email" id="login-email" placeholder="exemplo@empresa.com">
                </div>
            </div>

            <div class="input-group">
                <label for="login-senha">Senha</label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-lock text-gray-400"></i>
                    <input type="password" id="login-senha" placeholder="••••••••">
                </div>
            </div>

            <button id="btn-login" class="btn-login" onclick="fazerLogin()">
                Entrar no Sistema
            </button>
            
        </div>
    </div>

    <script src="model_login.js"></script>

</body>
</html>
