
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Financeiro - AristidesBP</title>
    
    <!-- Bibliotecas Externas -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- Seu CSS Separado -->
    <link rel="stylesheet" href="financeiro.css">
</head>
<body>

    <!-- Barra de Navegação -->
    <nav class="navbar">
        <div class="nav-brand">
            <strong>FINANCEIRO</strong>
        </div>
        <div class="nav-buttons">
            <a href="index.html" class="btn-nav-back">Voltar</a>
            <button class="btn-logout-nav" onclick="sairDaConta()">Sair</button>
        </div>
    </nav>

    <div class="container">
        <!-- Formulário de Cadastro -->
        <div class="card">
            <h2 id="form-title" class="section-title">Novo Lançamento</h2>
            <form id="financeiro-form" onsubmit="event.preventDefault(); handleSave();">
                <input type="hidden" id="edit-id">
                <div class="form-grid">
                    <div>
                        <label>Entidade / Cliente</label>
                        <select id="entidade_id" required>
                            <option value="">Carregando entidades...</option>
                        </select>
                    </div>
                    <div>
                        <label>Descrição</label>
                        <input type="text" id="descricao" required>
                    </div>
                    <div>
                        <label>Valor (R$)</label>
                        <input type="number" step="0.01" id="valor" required>
                    </div>
                    <div>
                        <label>Data de Vencimento</label>
                        <input type="date" id="data_vencimento" required>
                    </div>
                    <div>
                        <label>Parcelas</label>
                        <input type="number" id="parcelas" value="1" min="1">
                    </div>
                    <div>
                        <label>Tipo</label>
                        <select id="tipo">
                            <option value="pagar">Contas a Pagar</option>
                            <option value="receber">Contas a Receber</option>
                        </select>
                    </div>
                    <div>
                        <label>Status</label>
                        <select id="status">
                            <option value="pendente">Pendente</option>
                            <option value="pago">Pago / Recebido</option>
                        </select>
                    </div>
                </div>
                <button type="submit" id="btn-save" class="btn-add">Salvar Lançamento(s)</button>
                <button type="button" id="btn-cancel" class="btn-cancel" onclick="resetForm()">Cancelar Edição</button>
            </form>
        </div>

        <!-- Filtros e Busca -->
        <div class="card">
            <div class="form-grid">
                <div>
                    <label>Busca Geral</label>
                    <input type="text" id="inputBusca" placeholder="Pesquisar..." onkeyup="filtrarTabela()">
                </div>
                <div>
                    <label>Data Início</label>
                    <input type="date" id="dataInicio" onchange="filtrarTabela()">
                </div>
                <div>
                    <label>Data Fim</label>
                    <input type="date" id="dataFim" onchange="filtrarTabela()">
                </div>
            </div>
        </div>

        <!-- Ações em Massa -->
        <div id="bulk-area" class="card" style="display: none; background: #fff5f5; border-left: 5px solid #ef4444;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span id="selected-count" style="font-weight: bold; color: #ef4444;">0 selecionados</span>
                <button class="btn-logout-nav" onclick="deleteSelected()" style="background: #ef4444;">
                    <i class="fas fa-trash"></i> Excluir Selecionados
                </button>
            </div>
        </div>

        <!-- Tabela de Dados -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 40px;"><input type="checkbox" id="select-all" onclick="toggleSelectAll()"></th>
                        <th>Vencimento</th>
                        <th>Entidade</th>
                        <th>Descrição</th>
                        <th>Valor</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="financeiro-list">
                    <!-- Conteúdo preenchido pelo financeiro.js -->
                </tbody>
            </table>
        </div>

        <!-- Exportação -->
        <div class="export-area">
            <button class="btn-export btn-export-full" onclick="exportarPDF()">
                <i class="fas fa-file-pdf"></i> Exportar Relatório em PDF
            </button>
        </div>
    </div>

    <!-- Scripts de Lógica (Ordem Importante!) -->
    <script src="js/supabase_config.js"></script> <!-- Configura o window.supabaseClient -->
    <script src="js/financeiro.js"></script>      <!-- Contém handleSave, loadFinanceiro, etc -->

</body>
</html>
