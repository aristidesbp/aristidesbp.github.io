<script>
    // IndexedDB Logic
    const DB_NAME = 'ERP_ChatDB_Final';
    const DB_VERSION = 1;
    let db;

    const initDB = () => {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onerror = (event) => reject('Database error: ' + event.target.errorCode);
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains('messages')) {
                    db.createObjectStore('messages', { keyPath: 'id', autoIncrement: true });
                }
            };
            request.onsuccess = (event) => {
                db = event.target.result;
                resolve(db);
            };
        });
    };

    const saveMessage = (msg) => {
        return new Promise((resolve) => {
            const transaction = db.transaction(['messages'], 'readwrite');
            const store = transaction.objectStore('messages');
            const request = store.add(msg);
            request.onsuccess = (e) => {
                msg.id = e.target.result;
                resolve(msg);
            };
        });
    };

    const updateMessageInDB = (msg) => {
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(['messages'], 'readwrite');
            const store = transaction.objectStore('messages');
            const request = store.put(msg);
            request.onsuccess = () => resolve();
            request.onerror = () => reject('Error updating message');
        });
    };

    const deleteMessageFromDB = (id) => {
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(['messages'], 'readwrite');
            const store = transaction.objectStore('messages');
            const request = store.delete(id);
            request.onsuccess = () => resolve();
            request.onerror = () => reject('Error deleting message');
        });
    };

    const getMessageById = (id) => {
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(['messages'], 'readonly');
            const store = transaction.objectStore('messages');
            const request = store.get(id);
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject('Error fetching message');
        });
    };

    const getAllMessages = () => {
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(['messages'], 'readonly');
            const store = transaction.objectStore('messages');
            const request = store.getAll();
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject('Error fetching messages');
        });
    };

    const exportDB = async () => {
        const messages = await getAllMessages();
        const dataStr = JSON.stringify(messages, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `erp_abp_chat_backup_${new Date().toISOString().slice(0,10)}.json`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    };

    const importDB = async (file) => {
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const messages = JSON.parse(e.target.result);
                if (!Array.isArray(messages)) throw new Error('Formato inválido');
                
                const transaction = db.transaction(['messages'], 'readwrite');
                const store = transaction.objectStore('messages');
                
                // Clear current
                store.clear();
                
                // Add new
                for (const msg of messages) {
                    delete msg.id; // Let IDB regenerate IDs to avoid collisions if merging, or keep if overwriting
                    store.add(msg);
                }
                
                transaction.oncomplete = () => {
                    alert('Banco de dados importado com sucesso!');
                    location.reload();
                };
            } catch (err) {
                alert('Erro ao importar arquivo: ' + err.message);
            }
        };
        reader.readAsText(file);
    };

    // UI & Audio Logic
    const chatCanvas = document.getElementById('chat-canvas');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const sendIcon = document.getElementById('send-icon');
    const fileInput = document.getElementById('file-input');
    const attachBtn = document.getElementById('attach-btn');
    const recordingOverlay = document.getElementById('recording-overlay');
    const recordingTimer = document.getElementById('recording-timer');
    const confirmationOverlay = document.getElementById('confirmation-overlay');
    const deleteRecordingBtn = document.getElementById('delete-recording-btn');
    const audioPreview = document.getElementById('audio-preview');
    const moreVertBtn = document.getElementById('more-vert-btn');
    const moreMenu = document.getElementById('more-menu');
    const exportBtn = document.getElementById('export-db-btn');
    const importTrigger = document.getElementById('import-db-trigger');
    const dbImportInput = document.getElementById('db-import-input');

    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;
    let isConfirming = false;
    let timerInterval;
    let seconds = 0;
    let pendingAudioBase64 = null;

    const renderMessage = (msg) => {
        const isUser = msg.sender === 'user';
        let bubble = document.getElementById(`msg-${msg.id}`);
        const isUpdate = !!bubble;
        
        if (!bubble) {
            bubble = document.createElement('div');
            bubble.id = `msg-${msg.id}`;
        }
        
        bubble.className = `bubble group ${isUser ? 'bubble-right' : 'bubble-left'} font-message-text text-message-text`;
        
        let content = '';
        if (msg.type === 'image') {
            content = `<img src="${msg.data}" class="max-w-full rounded-md mb-2 shadow-sm" style="max-height: 300px;">`;
        } else if (msg.type === 'audio') {
            content = `
                <div class="flex items-center gap-2 min-w-[200px]">
                    <audio controls class="h-8 w-full">
                        <source src="${msg.data}" type="audio/webm">
                        Seu navegador não suporta áudio.
                    </audio>
                </div>
            `;
        }
        
        if (msg.text) {
            content += `<div class="message-body whitespace-pre-wrap">${msg.text}</div>`;
        }

        const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const editedLabel = msg.edited ? '<span class="italic opacity-60 text-[10px] mr-1">editada</span>' : '';
        
        const showEdit = msg.type === 'text' && isUser;
        const actionsHtml = `
            <div class="actions-btn-group">
                <button onclick="handleDeleteMessage(${msg.id})" class="action-btn text-on-surface-variant/40 hover:text-error transition-colors">
                    <span class="material-symbols-outlined !text-[18px]">delete</span>
                </button>
                ${showEdit ? `
                <button onclick="handleEditMessage(${msg.id})" class="action-btn text-on-surface-variant/40 hover:text-primary transition-colors">
                    <span class="material-symbols-outlined !text-[18px]">edit</span>
                </button>
                ` : ''}
            </div>
        `;

        bubble.innerHTML = `
            ${actionsHtml}
            <div class="content-wrapper">${content}</div>
            <span class="timestamp font-timestamp text-timestamp">${editedLabel}${time} ${isUser ? '<span class="material-symbols-outlined text-[14px] leading-none" style="font-variation-settings: \'FILL\' 1;">done_all</span>' : ''}</span>
        `;
        
        if (!isUpdate) {
            chatCanvas.appendChild(bubble);
        }
        chatCanvas.scrollTop = chatCanvas.scrollHeight;
    };

    window.handleDeleteMessage = async (id) => {
        if (!confirm("Excluir esta mensagem?")) return;
        try {
            await deleteMessageFromDB(id);
            const el = document.getElementById(`msg-${id}`);
            if (el) {
                el.classList.add('opacity-0', 'scale-95');
                el.style.transition = 'all 0.3s ease';
                setTimeout(() => el.remove(), 300);
            }
        } catch (err) {
            console.error(err);
        }
    };

    window.handleEditMessage = async (id) => {
        const msg = await getMessageById(id);
        if (!msg || msg.type !== 'text') return;

        const bubble = document.getElementById(`msg-${id}`);
        const contentWrapper = bubble.querySelector('.content-wrapper');
        const originalContentHtml = contentWrapper.innerHTML;

        const inputHtml = `
            <div class="flex flex-col gap-2 w-full min-w-[200px]">
                <textarea class="w-full text-sm p-2 rounded border border-outline focus:ring-1 focus:ring-primary outline-none bg-surface" rows="3">${msg.text}</textarea>
                <div class="flex justify-end gap-2">
                    <button class="px-2 py-1 text-xs font-semibold text-on-surface-variant hover:bg-surface-variant rounded transition-colors" onclick="cancelEdit(${id}, '${btoa(encodeURIComponent(originalContentHtml))}')">Cancelar</button>
                    <button class="px-2 py-1 text-xs font-semibold bg-primary text-on-primary rounded hover:opacity-90 transition-opacity" onclick="saveEditedMessage(${id})">Salvar</button>
                </div>
            </div>
        `;
        contentWrapper.innerHTML = inputHtml;
        contentWrapper.querySelector('textarea').focus();
    };

    window.cancelEdit = (id, oldContentBase64) => {
        const bubble = document.getElementById(`msg-${id}`);
        const contentWrapper = bubble.querySelector('.content-wrapper');
        contentWrapper.innerHTML = decodeURIComponent(atob(oldContentBase64));
    };

    window.saveEditedMessage = async (id) => {
        const bubble = document.getElementById(`msg-${id}`);
        const newText = bubble.querySelector('textarea').value.trim();
        if (!newText) return;

        const msg = await getMessageById(id);
        msg.text = newText;
        msg.edited = true;
        
        await updateMessageInDB(msg);
        renderMessage(msg);
    };

    const handleBotResponse = async (userText) => {
        const lowerText = userText.toLowerCase();
        let response = "Desculpe, não entendi. Tente as opções:\n1. ENTIDADES\n2. FINANCEIRO";
        
        if (lowerText.includes('1') || lowerText.includes('entidades')) {
            response = "Módulo de ENTIDADES selecionado. O que deseja consultar?\n- Clientes\n- Fornecedores\n- Parceiros";
        } else if (lowerText.includes('2') || lowerText.includes('financeiro')) {
            response = "Módulo FINANCEIRO acessado. Opções disponíveis:\n- Fluxo de Caixa\n- Contas a Pagar\n- Contas a Receber";
        } else if (userText === "[ÁUDIO]" || userText === "[IMAGEM]") {
            response = "Recebi sua mídia! Estou processando as informações solicitadas.";
        }

        const botMsg = {
            sender: 'bot',
            text: response,
            type: 'text',
            timestamp: Date.now()
        };

        setTimeout(async () => {
            const savedBotMsg = await saveMessage(botMsg);
            renderMessage(savedBotMsg);
        }, 1200);
    };

    const sendMessage = async () => {
        const text = messageInput.value.trim();
        if (!text) return;

        const msg = {
            sender: 'user',
            text: text,
            type: 'text',
            timestamp: Date.now()
        };

        const savedMsg = await saveMessage(msg);
        renderMessage(savedMsg);
        messageInput.value = '';
        updateSendIcon();
        handleBotResponse(text);
    };

    const confirmAndSendAudio = async () => {
        if (!pendingAudioBase64) return;

        const msg = {
            sender: 'user',
            type: 'audio',
            data: pendingAudioBase64,
            timestamp: Date.now()
        };
        const savedMsg = await saveMessage(msg);
        renderMessage(savedMsg);
        handleBotResponse("[ÁUDIO]");
        resetConfirmationUI();
    };

    const resetConfirmationUI = () => {
        pendingAudioBase64 = null;
        isConfirming = false;
        confirmationOverlay.classList.add('hidden');
        audioPreview.src = "";
        updateSendIcon();
    };

    const updateSendIcon = () => {
        if (isConfirming) {
            sendIcon.innerText = 'send';
            sendBtn.classList.replace('bg-primary-container', 'bg-secondary');
            sendBtn.classList.remove('bg-error');
        } else if (messageInput.value.trim().length > 0) {
            sendIcon.innerText = 'send';
            sendBtn.classList.replace('bg-primary-container', 'bg-secondary');
            sendBtn.classList.remove('bg-error');
        } else {
            sendIcon.innerText = 'mic';
            sendBtn.classList.replace('bg-secondary', 'bg-primary-container');
            sendBtn.classList.remove('bg-error');
        }
    };

    const startRecording = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = (event) => {
                audioChunks.push(event.data);
            };

            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onloadend = () => {
                    pendingAudioBase64 = reader.result;
                    audioPreview.src = pendingAudioBase64;
                    isConfirming = true;
                    confirmationOverlay.classList.remove('hidden');
                    updateSendIcon();
                };
                reader.readAsDataURL(audioBlob);
                stream.getTracks().forEach(track => track.stop());
            };

            mediaRecorder.start();
            isRecording = true;
            recordingOverlay.classList.remove('hidden');
            startTimer();
            sendIcon.innerText = 'stop';
            sendBtn.classList.replace('bg-primary-container', 'bg-error');
        } catch (err) {
            console.error("Microfone não autorizado", err);
            alert("Erro ao acessar o microfone.");
        }
    };

    const stopRecording = () => {
        if (mediaRecorder && isRecording) {
            mediaRecorder.stop();
            isRecording = false;
            recordingOverlay.classList.add('hidden');
            stopTimer();
        }
    };

    const startTimer = () => {
        seconds = 0;
        recordingTimer.innerText = "00:00";
        timerInterval = setInterval(() => {
            seconds++;
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            recordingTimer.innerText = `${mins}:${secs}`;
        }, 1000);
    };

    const stopTimer = () => {
        clearInterval(timerInterval);
    };

    // Event Listeners
    messageInput.addEventListener('input', updateSendIcon);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    sendBtn.addEventListener('click', () => {
        if (isConfirming) {
            confirmAndSendAudio();
        } else if (sendIcon.innerText === 'send') {
            sendMessage();
        } else if (sendIcon.innerText === 'mic') {
            startRecording();
        } else if (sendIcon.innerText === 'stop') {
            stopRecording();
        }
    });

    deleteRecordingBtn.addEventListener('click', resetConfirmationUI);
    attachBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (event) => {
            const base64 = event.target.result;
            const msg = {
                sender: 'user',
                type: 'image',
                data: base64,
                timestamp: Date.now()
            };
            const savedMsg = await saveMessage(msg);
            renderMessage(savedMsg);
            handleBotResponse("[IMAGEM]");
        };
        reader.readAsDataURL(file);
    });

    // More Menu Handlers
    moreVertBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        moreMenu.classList.toggle('hidden');
    });

    document.addEventListener('click', () => {
        moreMenu.classList.add('hidden');
    });

    exportBtn.addEventListener('click', async () => {
        await exportDB();
        moreMenu.classList.add('hidden');
    });

    importTrigger.addEventListener('click', () => {
        dbImportInput.click();
    });

    dbImportInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            importDB(e.target.files[0]);
        }
    });

    // Search Logic
    const searchTrigger = document.getElementById('search-trigger-btn');
    const searchBar = document.getElementById('search-bar');
    const closeSearch = document.getElementById('close-search-btn');
    const searchInput = document.getElementById('search-input');

    searchTrigger.addEventListener('click', () => {
        searchBar.classList.remove('hidden');
        searchInput.focus();
    });

    closeSearch.addEventListener('click', () => {
        searchBar.classList.add('hidden');
        searchInput.value = '';
        filterMessages('');
    });

    searchInput.addEventListener('input', (e) => {
        filterMessages(e.target.value.toLowerCase());
    });

    function filterMessages(query) {
        const bubbles = chatCanvas.querySelectorAll('.bubble');
        bubbles.forEach(bubble => {
            const body = bubble.querySelector('.message-body');
            if (!body) {
                bubble.classList.toggle('hidden', query !== '');
                return;
            }
            const text = body.innerText.toLowerCase();
            if (text.includes(query)) {
                bubble.classList.remove('hidden');
                const originalText = body.innerText;
                if (query !== '') {
                    const regex = new RegExp(`(${query})`, 'gi');
                    body.innerHTML = originalText.replace(regex, '<mark class="bg-yellow-200">$1</mark>');
                } else {
                    body.innerHTML = originalText;
                }
            } else {
                bubble.classList.add('hidden');
            }
        });
        
        const separators = chatCanvas.querySelectorAll('.my-4');
        separators.forEach(sep => {
            let next = sep.nextElementSibling;
            let hasVisible = false;
            while (next && !next.classList.contains('my-4')) {
                if (!next.classList.contains('hidden')) {
                    hasVisible = true;
                    break;
                }
                next = next.nextElementSibling;
            }
            sep.classList.toggle('hidden', !hasVisible && query !== '');
        });
    }

    // Initialize App
    window.addEventListener('DOMContentLoaded', async () => {
        await initDB();
        const history = await getAllMessages();
        
        if (history.length === 0) {
            const welcome = {
                sender: 'bot',
                text: "Bem-vindo ao canal oficial do ERP ABP - Versão Final.\n\nNovas funcionalidades no menu superior:\n- Exportar Banco de Dados\n- Importar Banco de Dados",
                type: 'text',
                timestamp: Date.now()
            };
            const savedWelcome = await saveMessage(welcome);
            renderMessage(savedWelcome);
        } else {
            history.forEach(renderMessage);
        }
    });
</script>
</body></html>
