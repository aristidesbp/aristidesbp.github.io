<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confetti Animation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
    /* Custom styles */
    body {
      background-color: #000;
      color: white;
    }

    .header h1 {
      font-size: 50px;
      color: white;
    }
  </style>
</head>
<body>

<!-- Header -->
<header class="header bg-dark p-5 text-center">
  <h1>Celebrate with Confetti!</h1>
  <p>Click the button to see the confetti animation.</p>
  <button id="confetti-btn" class="btn btn-primary">Show Confetti</button>
</header>

<!-- Footer -->
<footer class="footer py-4 mt-auto text-center text-white">
  <div class="container">
    <p class="mb-0">© 2024 My Website. All rights reserved.</p>
  </div>
</footer>

<!-- Confetti animation -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<script>
  document.getElementById('confetti-btn').addEventListener('click', function() {
    confetti({
      particleCount: 100,
      spread: 70,
      origin: { y: 0.6 }
    });
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
