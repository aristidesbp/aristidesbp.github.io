name: Generate Supabase Config
# Define o nome do workflow que aparecerá na interface do GitHub Actions.

on: [push]
# Define o gatilho de execução: este workflow roda toda vez que houver um 'git push' no repositório.

permissions:
# Inicia a declaração de permissões de segurança para o token gerado pelo GitHub Actions (GITHUB_TOKEN).

  contents: write
  # Concede permissão de escrita no repositório, necessária para fazer commits e pushes de arquivos.

jobs:
# Inicia a definição dos blocos de trabalho (jobs) que serão executados de forma isolada.

  build:
  # Define o identificador/nome do job atual, chamado "build".

    runs-on: ubuntu-latest
    # Determina o sistema operacional do ambiente virtual onde o job vai rodar (versão mais recente do Ubuntu Linux).

    steps:
    # Inicia a lista de passos (etapas sequenciais) que serão executados dentro deste job.

      - name: Checkout code
      # Nome descritivo da primeira etapa: baixar o código do repositório.

        uses: actions/checkout@v3
        # Utiliza uma ação oficial do GitHub para clonar o repositório dentro da máquina virtual.

        with:
        # Define parâmetros adicionais para a ação de checkout.

          persist-credentials: true
          # Configura o token SSH/HTTPS para persistir, permitindo que passos futuros enviem alterações de volta ao repositório.

      - name: Create supabase_config.js
      # Nome descritivo da segunda etapa: criar o arquivo de configuração do Supabase.

        run: |
        # Indica que as linhas seguintes contêm comandos shell (Bash) que serão executados em bloco.

          mkdir -p assets/js
          # Cria o diretório 'assets/js' se ele ainda não existir no ambiente virtual.

          echo "const SUPABASE_URL = '${{ secrets.VITE_SUPABASE_URL }}';" > assets/js/supabase_config.js
          # Cria (ou sobrescreve) o arquivo 'supabase_config.js' inserindo a URL obtida dos segredos protegidos do GitHub.

          echo "const SUPABASE_KEY = '${{ secrets.VITE_SUPABASE_ANON_KEY }}';" >> assets/js/supabase_config.js
          # Adiciona (append) na linha seguinte do arquivo a chave pública anonimizada dos segredos do GitHub.

          echo "console.log('✅ supabase_config.js carregado');" >> assets/js/supabase_config.js
          # Adiciona uma mensagem de log no final do arquivo para fins de depuração no console do navegador.

      - name: Commit and push changes
      # Nome descritivo da terceira etapa: salvar e enviar as alterações de volta ao GitHub.

        uses: stefanzweifel/git-auto-commit-action@v4
        # Utiliza uma ação de terceiros pré-configurada para automatizar o processo de commit e push.

        with:
        # Define os parâmetros exigidos por essa ação de commit.

          commit_message: "Auto-gerando supabase_config.js"
          # Define a mensagem que será gravada no histórico de commits do Git.

          file_pattern: 'assets/js/supabase_config.js'
          # Especifica estritamente qual arquivo deve ser rastreado e commitado, ignorando outras possíveis mudanças.
