<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle - Vizinho Indica</title>
    
    <script src="assets/js/supabase_config.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="assets/js/supabase_crud.js"></script>
</head>
<body>
    <h1>Painel de Debug</h1>
    <div id="log">Conectando...</div>

    <script>
        // Inicializa o cliente usando as variáveis globais do supabase_config.js
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        async function iniciar() {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML = "Tentando buscar dados...";
            
            // Exemplo de uso da função que está em supabase_crud.js
            const dados = await buscarDados('teste_conexao');
            
            if (dados) {
                logDiv.innerHTML = "Sucesso! Dados: " + JSON.stringify(dados);
            } else {
                logDiv.innerHTML = "Erro ao carregar dados.";
            }
        }
        
        iniciar();
    </script>
</body>
</html>
