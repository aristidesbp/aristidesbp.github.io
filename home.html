<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Moderno com Background Animado</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Estilo para o background animado */
        body {
            margin: 0;
            padding: 0;
            background: #0d0d0d;
            overflow: hidden;
            height: 100vh;
            color: white;
        }

        /* Estilos para o background animado com partículas */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1; /* Fica atrás do conteúdo */
            background: radial-gradient(circle, #343a40, #000);
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            animation: moveParticles 10s linear infinite;
        }

        /* Animação dos pontos se movendo */
        @keyframes moveParticles {
            from {
                transform: translateY(0);
            }
            to {
                transform: translateY(-2000px);
            }
        }

        /* Tamanho aleatório das partículas */
        .particle:nth-child(1) {
            width: 4px;
            height: 4px;
            left: 20%;
            animation-duration: 10s;
        }
        .particle:nth-child(2) {
            width: 6px;
            height: 6px;
            left: 40%;
            animation-duration: 12s;
        }
        .particle:nth-child(3) {
            width: 3px;
            height: 3px;
            left: 60%;
            animation-duration: 8s;
        }
        .particle:nth-child(4) {
            width: 5px;
            height: 5px;
            left: 80%;
            animation-duration: 15s;
        }

        /* Navbar personalizada */
        .navbar {
            background-color: #343a40; /* Cor escura */
        }

        .navbar-brand, .nav-link, .dropdown-item {
            color: #ffffff !important;
        }

        .navbar-brand:hover, .nav-link:hover, .dropdown-item:hover {
            color: #ffc107 !important;
        }

        .form-control {
            width: 300px;
        }
    </style>
</head>
<body>

    <!-- Navbar moderna com barra de pesquisa e dropdown -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Minha Empresa</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Início</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Sobre</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Mais
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="#">Opção 1</a></li>
                            <li><a class="dropdown-item" href="#">Opção 2</a></li>
                            <li><a class="dropdown-item" href="#">Opção 3</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#">Separador</a></li>
                        </ul>
                    </li>
                </ul>

                <!-- Barra de pesquisa -->
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Pesquisar" aria-label="Search">
                    <button class="btn btn-outline-warning" type="submit">Buscar</button>
                </form>
            </div>
        </div>
    </nav>

    <!-- Background animado com partículas -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Conteúdo da página -->
    <div class="container text-center" style="padding-top: 100px;">
        <h1 class="mt-5">Bem-vindo ao nosso site com animação de fundo!</h1>
        <p>Aqui temos um menu moderno com animação de partículas como plano de fundo.</p>
    </div>

    <!-- Bootstrap 5 JS e dependências Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
