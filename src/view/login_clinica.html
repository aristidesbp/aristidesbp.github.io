<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ERP-PSC - Login</title>
<script type="module" src="../controller/login_clinica_controller.js"></script>
  
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#137fec",
                "background-light": "#f8f6f6",
                "background-dark": "#221610",
              },
              fontFamily: {
                "display": ["Public Sans", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md flex flex-col items-center">
<!-- Login Card -->
<div class="w-full bg-white dark:bg-slate-900 rounded-xl shadow-xl overflow-hidden p-8 flex flex-col gap-8 border border-slate-200 dark:border-slate-800">

<!-- Header Section -->
<div class="flex flex-col items-center gap-4 text-center">
<div class="w-20 h-20 rounded-full bg-primary/10 dark:bg-primary/20 flex items-center justify-center text-primary" id="logo-icon">
<span class="material-symbols-outlined !text-5xl">psychology</span>
</div>
<div class="space-y-1">
<h1 class="text-3xl font-bold text-slate-900 dark:text-slate-100 tracking-tight" id="app-title">ERP-PSC</h1>
<p class="text-slate-500 dark:text-slate-400 font-medium" id="app-subtitle">Acesse sua Conta</p>
</div>
</div>
        
<!-- Form Section -->
<div class="flex flex-col gap-5">
        
<!-- E-mail Input -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="input-email">E-mail</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined">mail</span>
</div>
<input class="block w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all outline-none" id="input-email" placeholder="exemplo@email.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="input-senha">Senha</label>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="block w-full pl-10 pr-12 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all outline-none" id="input-senha" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-primary transition-colors" id="btn-toggle-senha" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col gap-4 mt-2">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 px-6 rounded-lg flex items-center justify-center gap-2 transition-all active:scale-95 shadow-lg shadow-primary/20" id="btn-entrar">
<span class="material-symbols-outlined">login</span>
<span>Entrar</span>
</button>
<div class="text-center">
<a class="text-sm font-medium text-primary hover:underline underline-offset-4" href="#" id="link-recuperar-senha">
                            Esqueci minha senha
                        </a>
</div>
</div>
</div>
</div>
<!-- Footer -->
<footer class="mt-8 text-center">
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">
                Desenvolvido para Psicopedagogos
            </p>
</footer>
</div>
</body></html>
