<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Painel do Supervisor - ERP-PSC</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="../model/supabase_config.js"></script>   
<script src="../controller/verificar_login.js"></script>
<script src="../controller/analizar_nivel_de_acesso.js"></script>        
        
<script type="module">
    import { accessControl } from '../model/access_control.js';    
    // Só permite entrar se a role for 'paciente'
    accessControl.checkAccess(['usuario']);
</script>
        
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
            min-height: 100dvh;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">

        
    <div id="navbar"></div>
<script src="../controller/navbar.js"></script>      
        
        
        <!-- Main Container (Mobile Optimized) -->
<div class="flex-1 w-full max-w-[430px] mx-auto bg-white dark:bg-slate-900 shadow-xl flex flex-col min-h-screen">
<!-- Header Section -->
<header class="p-4 flex items-center justify-between border-b border-slate-100 dark:border-slate-800">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary/10 dark:bg-primary/20 flex items-center justify-center text-primary" id="header-supervisor-icon">
<span class="material-symbols-outlined">shield</span>
</div>
<h1 class="text-lg font-bold tracking-tight" id="titulo-supervisor">Painel do Supervisor</h1>
</div>
</header>
<!-- Scrollable Content -->
<main class="flex-1 overflow-y-auto">
<!-- Summary Cards Section -->
<section class="p-4 grid grid-cols-2 gap-3">
<!-- Pacientes Ativos -->
<div class="col-span-2 p-4 rounded-xl bg-primary/5 dark:bg-primary/10 border border-primary/10 flex flex-col gap-1 relative" id="stat-total-pacientes">
<span class="text-xs font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wide">Pacientes Ativos</span>
<div class="flex items-end justify-between">
<span class="text-3xl font-bold text-primary">128</span>
<a aria-label="Ver Pacientes" class="flex items-center justify-center w-10 h-10 rounded-full bg-primary text-white shadow-sm active:scale-95 transition-transform" href="entidades.html">
<span class="material-symbols-outlined text-xl">groups</span>
</a>
</div>
</div>
<!-- Média Adesão -->
<div class="p-4 rounded-xl bg-slate-50 dark:bg-slate-800/50 border border-slate-100 dark:border-slate-800 flex flex-col gap-1" id="stat-media-adesao">
<span class="text-[10px] font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wide leading-tight">Média Adesão Semanal</span>
<div class="flex items-center gap-2">
<span class="text-xl font-bold">84%</span>
<div class="flex items-center text-emerald-500 text-xs font-bold">
<span class="material-symbols-outlined text-sm">arrow_upward</span>
<span>5%</span>
</div>
</div>
</div>
<!-- Tarefas em Atraso -->
<div class="p-4 rounded-xl bg-slate-50 dark:bg-slate-800/50 border border-slate-100 dark:border-slate-800 flex flex-col gap-1" id="stat-atraso">
<span class="text-[10px] font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wide leading-tight">Tarefas em Atraso</span>
<div class="flex items-center gap-2">
<span class="text-xl font-bold text-rose-500">12</span>
<span class="material-symbols-outlined text-rose-500/50 text-sm">schedule</span>
</div>
</div>
<!-- Quick Actions Grid -->
<div class="col-span-2 pt-2 pb-1">
<h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">Módulos do Sistema</h2>
</div>
<!-- Novo Cadastro -->
<a class="p-4 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 flex flex-col items-center justify-center gap-2 text-center shadow-sm active:bg-slate-50 dark:active:bg-slate-700 transition-colors" href="dados_pessoais.html" id="link-modulo-entidades">
<div class="w-10 h-10 rounded-full bg-blue-50 dark:bg-blue-900/30 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">groups</span>
</div>
<span class="text-xs font-semibold">Dados pessoais</span>
</a>
<!-- Financeiro -->
<a class="p-4 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 flex flex-col items-center justify-center gap-2 text-center shadow-sm active:bg-slate-50 dark:active:bg-slate-700 transition-colors" href="listar_financeiro.html" id="link-modulo-financeiro">
<div class="w-10 h-10 rounded-full bg-emerald-50 dark:bg-emerald-900/30 flex items-center justify-center text-emerald-600">
<span class="material-symbols-outlined">payments</span>
</div>
<span class="text-xs font-semibold">Financeiro</span>
</a>
<!-- Planos 6M (Relatórios) -->
<a class="p-4 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 flex flex-col items-center justify-center gap-2 text-center shadow-sm active:bg-slate-50 dark:active:bg-slate-700 transition-colors" href="plano_lista.html" id="link-modulo-planos">
<div class="w-10 h-10 rounded-full bg-amber-50 dark:bg-amber-900/30 flex items-center justify-center text-amber-600">
<span class="material-symbols-outlined">description</span>
</div>
<span class="text-xs font-semibold">Planos 6M</span>
</a>
<!-- Agenda -->
<a class="p-4 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 flex flex-col items-center justify-center gap-2 text-center shadow-sm active:bg-slate-50 dark:active:bg-slate-700 transition-colors" href="https://calendar.google.com" id="link-modulo-agenda" target="_blank">
<div class="w-10 h-10 rounded-full bg-indigo-50 dark:bg-indigo-900/30 flex items-center justify-center text-indigo-600">
<span class="material-symbols-outlined">calendar_month</span>
</div>
<span class="text-xs font-semibold">Agenda</span>
</a>
</section>
</main>
</div>
</body></html>
