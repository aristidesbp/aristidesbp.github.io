<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Usuários</title>
    <link rel="stylesheet" href="style.css">
</head>
    <style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f7f6;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.container {
    background: white;
    padding: 2rem;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 600px;
}

.form-group {
    margin-bottom: 15px;
}

label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}

input, textarea {
    width: 100%;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 10px;
}

#btnSave { background-color: #28a745; color: white; }
.btn-edit { background-color: #ffc107; margin-right: 5px; }
.btn-delete { background-color: #dc3545; color: white; }
.hidden { display: none; }

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td {
    border-bottom: 1px solid #ddd;
    padding: 12px;
    text-align: left;
}
        
        </style>
<body>
    <div class="container">
        <h2>Cadastro de Usuário</h2>
        <form id="userForm">
            <input type="hidden" id="userId">
            <div class="form-group">
                <label for="nome_completo">Nome Completo</label>
                <input type="text" id="nome_completo" required>
            </div>
            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea id="bio"></textarea>
            </div>
            <div class="form-group">
                <label for="avatar_url">URL do Avatar</label>
                <input type="url" id="avatar_url">
            </div>
            <button type="submit" id="btnSave">Salvar Usuário</button>
            <button type="button" id="btnCancel" class="hidden">Cancelar Edição</button>
        </form>

        <hr>

        <h2>Usuários Cadastrados</h2>
        <table id="userTable">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Bio</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="userList">
                </tbody>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://flbcktmujsjxukmtqriq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZsYmNrdG11anNqeHVrbXRxcmlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODA3NjIsImV4cCI6MjA5MDQ1Njc2Mn0.kigBNnujASjlkFcm5xGOqauz6zrgFGVu_rdQJuJkxnE';
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const userForm = document.getElementById('userForm');
const userList = document.getElementById('userList');
const btnCancel = document.getElementById('btnCancel');

// 1. READ: Listar usuários
async function fetchUsers() {
    const { data, error } = await supabase
        .from('usuarios')
        .select('*')
        .order('created_at', { ascending: false });

    if (error) console.error('Erro ao buscar:', error);
    else renderUsers(data);
}

function renderUsers(users) {
    userList.innerHTML = '';
    users.forEach(user => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${user.nome_completo}</td>
            <td>${user.bio || ''}</td>
            <td>
                <button class="btn-edit" onclick="editUser('${user.id}', '${user.nome_completo}', '${user.bio}', '${user.avatar_url}')">Editar</button>
                <button class="btn-delete" onclick="deleteUser('${user.id}')">Excluir</button>
            </td>
        `;
        userList.appendChild(tr);
    });
}

// 2. CREATE / UPDATE
userForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('userId').value;
    const nome_completo = document.getElementById('nome_completo').value;
    const bio = document.getElementById('bio').value;
    const avatar_url = document.getElementById('avatar_url').value;

    const userData = { nome_completo, bio, avatar_url };

    if (id) {
        // Update
        await supabase.from('usuarios').update(userData).eq('id', id);
    } else {
        // Create
        await supabase.from('usuarios').insert([userData]);
    }

    userForm.reset();
    document.getElementById('userId').value = '';
    btnCancel.classList.add('hidden');
    fetchUsers();
});

// 3. DELETE
async function deleteUser(id) {
    if (confirm('Tem certeza que deseja excluir este usuário?')) {
        await supabase.from('usuarios').delete().eq('id', id);
        fetchUsers();
    }
}

// Auxiliar: Preparar edição
function editUser(id, nome, bio, avatar) {
    document.getElementById('userId').value = id;
    document.getElementById('nome_completo').value = nome;
    document.getElementById('bio').value = bio === 'null' ? '' : bio;
    document.getElementById('avatar_url').value = avatar === 'null' ? '' : avatar;
    
    btnCancel.classList.remove('hidden');
    window.scrollTo(0, 0);
}

btnCancel.onclick = () => {
    userForm.reset();
    document.getElementById('userId').value = '';
    btnCancel.classList.add('hidden');
};

// Inicialização
fetchUsers();
        
    </script>
</body>
</html>
