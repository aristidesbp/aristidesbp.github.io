<!DOCTYPE html>

<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f8f9fc",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            min-height: max(884px, 100dvh);
        }

        #recaptcha-box.invalid {
            border-color: #ef4444;
            background-color: #fef2f2;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display antialiased transition-colors duration-300">
    <div class="relative flex min-h-screen w-full flex-col items-center justify-center overflow-x-hidden p-4">
        <div class="absolute inset-0 z-0 opacity-10 dark:opacity-20 pointer-events-none">
            <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary blur-[120px]"></div>
            <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-primary blur-[120px]"></div>
        </div>
        <div
            class="z-10 w-full max-w-md bg-white dark:bg-slate-900 shadow-xl rounded-xl border border-slate-200 dark:border-slate-800 p-8">
            <div class="flex flex-col items-center mb-8">
                <div class="mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-primary/10 text-primary">
                    <span class="material-symbols-outlined !text-4xl"
                        data-icon="health_and_safety">health_and_safety</span>
                </div>
                <h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-slate-100">ClinicaPro</h1>
                <p class="mt-2 text-base text-slate-500 dark:text-slate-400">Plataforma Clínica Segura</p>
            </div>
            <form class="space-y-5" id="loginForm">
                <!-- Error Message Container -->
                <div class="hidden p-3 rounded-lg bg-red-50 border border-red-200 text-red-600 text-sm font-medium"
                    id="errorMessage"></div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5"
                        for="email">E-mail</label>
                    <div class="relative group">
                        <div
                            class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
                            <span class="material-symbols-outlined !text-xl" data-icon="person">person</span>
                        </div>
                        <input
                            class="block w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 py-3 pl-11 pr-4 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all"
                            id="email" placeholder="exemplo@clinica.com" required="" type="email" />
                    </div>
                </div>
                <div>
                    <div class="flex items-center justify-between mb-1.5">
                        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300"
                            for="password">Senha</label>
                        <a class="text-xs font-semibold text-primary hover:underline" href="#">Esqueci minha senha</a>
                    </div>
                    <div class="relative group">
                        <div
                            class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
                            <span class="material-symbols-outlined !text-xl" data-icon="lock">lock</span>
                        </div>
                        <input
                            class="block w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 py-3 pl-11 pr-12 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all"
                            id="password" placeholder="••••••••" required="" type="password" />
                        <button
                            class="absolute inset-y-0 right-0 flex items-center pr-3.5 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors"
                            id="togglePassword" type="button">
                            <span class="material-symbols-outlined !text-xl" data-icon="visibility"
                                id="eyeIcon">visibility</span>
                        </button>
                    </div>
                </div>
                <div class="flex items-center">
                    <input class="w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary cursor-pointer"
                        id="remember" type="checkbox" />
                    <label class="ml-2 text-sm text-slate-600 dark:text-slate-400 cursor-pointer" for="remember">Lembrar
                        de mim</label>
                </div>
                <!-- reCAPTCHA Mock -->
                <div class="flex items-center justify-between p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg shadow-sm transition-colors"
                    id="recaptcha-box">
                    <div class="flex items-center gap-3">
                        <input class="w-6 h-6 rounded border-slate-300 text-primary focus:ring-primary cursor-pointer"
                            id="recaptcha" type="checkbox" />
                        <label class="text-sm font-medium text-slate-700 dark:text-slate-300 cursor-pointer"
                            for="recaptcha">Não sou um robô</label>
                    </div>
                    <div class="flex flex-col items-center justify-center text-[10px] text-slate-400 opacity-80">
                        <img alt="reCAPTCHA" class="w-6 h-6 mb-0.5"
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuCwBViAIKDiJFccF3AgViTf-5JJuClFraf5O_gcQqFL4kkDr_oERNIkk8KQ93SM2JmuQXTPIrvrcNOUbKT4uY5SMGU5Nj4BYYdq5VTPfd9Jgv-PqID4YCSV2LcvLUu80tHy5yS7sgeoOCJ3eYDEm8D7A20hmCO3iVpngCkIsnUwKA_2_IMrQXGreJGxTbQlYtZb_ZH1LBL80uKD31jWt9-tsv3mNMNhEqO9hL0UsbrT1fndORf5gnmW918VnU2Nlg8fQ8yp9Wq2yKQ_" />
                        <span>reCAPTCHA</span>
                        <div class="flex gap-1">
                            <a class="hover:underline" href="#">Privacidade</a>
                            <a class="hover:underline" href="#">Termos</a>
                        </div>
                    </div>
                </div>
                <div class="pt-2">
                    <button
                        class="relative flex w-full items-center justify-center rounded-lg bg-primary py-3 px-4 text-sm font-bold text-white shadow-md transition-all hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary/50 active:scale-[0.98] gap-2"
                        id="submitBtn" type="submit">
                        <span id="btnText">Entrar</span>
                        <span class="material-symbols-outlined text-xl" id="btnIcon">login</span>
                    </button>
                </div>
            </form>
            <div class="mt-8 text-center">
                <div class="pt-6 border-t border-slate-100 dark:border-slate-800">
                    <div class="flex flex-col items-center">
                        <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center mb-4">
                            <span class="material-symbols-outlined text-primary text-2xl">lock_reset</span>
                        </div>
                        <h2 class="text-3xl font-extrabold text-[#113160]">ClinicaPro</h2>
                        <h2 class="text-xl font-bold text-slate-900 dark:text-white mb-2">Esqueci minha senha?</h2>
                        <p class="text-xs text-slate-500 dark:text-slate-400 mb-6 leading-relaxed">
                            Informe seu e-mail cadastrado e enviaremos as instruções para você criar uma nova senha.
                        </p>
                        <form action="#" class="w-full space-y-4">
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                    <span
                                        class="material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors text-xl">mail</span>
                                </div>
                                <input
                                    class="block w-full pl-11 pr-4 py-3 border border-slate-300 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-50 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-sm"
                                    id="recovery-email" name="email" placeholder="seu@email.com" required=""
                                    type="email" />
                            </div>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                    <span
                                        class="material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors text-xl">call</span>
                                </div>
                                <input
                                    class="block w-full pl-11 pr-4 py-3 border border-slate-300 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-50 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-sm"
                                    id="recovery-phone" name="phone" placeholder="(00) 00000-0000" required=""
                                    type="tel" />
                            </div>
                            <button
                                class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3 px-6 rounded-lg flex items-center justify-center gap-2 transition-all active:scale-[0.98] shadow-md shadow-primary/10 text-sm"
                                id="btn-recovery-send" type="submit">
                                <span class="material-symbols-outlined text-lg">send</span>
                                Enviar Link de Recuperação
                            </button>
                        </form>
                        <div class="mt-6">
                            <a class="text-sm font-medium text-slate-500 hover:text-primary transition-colors inline-flex items-center gap-1 group"
                                href="#" onclick="window.location.reload(); return false;">
                                <span
                                    class="material-symbols-outlined text-lg transition-transform group-hover:-translate-x-1">arrow_back</span>
                                Voltar para o login
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../model/supabase_config.js"></script>
    <script src="../model/login_model.js"></script>
    <script src="../controller/login_controller.js"></script>

    <script>
        // Inicialização dos eventos vinculados ao Controller
        document.getElementById('togglePassword').addEventListener('click', () => {
            window.LoginController.togglePassword('password', 'eyeIcon');
        });

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            window.LoginController.handleLogin(e);
        });
    </script>
</body>

</html>
