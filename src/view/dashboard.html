<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP_ABP - Dashboard Financeiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">

    <nav class="sticky top-0 z-40 w-full border-b bg-white/95 backdrop-blur">
        <div class="container mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-1.5 rounded-lg text-white">
                    <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
                </div>
                <span class="text-xl font-bold tracking-tight text-slate-800">ERP_ABP</span>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="hidden md:flex items-center gap-2 text-sm font-medium text-slate-600">
                    <span id="user-name">Carregando...</span>
                    <img id="user-avatar" src="https://via.placeholder.com/32" class="w-8 h-8 rounded-full border">
                </div>
                <button onclick="sairDaConta()" class="p-2 text-slate-500 hover:text-red-600 transition-colors">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="flex-1 container mx-auto px-4 py-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-3xl font-bold text-slate-900">Visão Geral</h1>
                <p class="text-slate-500">Acompanhe seu fluxo de caixa em tempo real.</p>
            </div>
            <button id="btn-nova-transacao" class="inline-flex items-center justify-center rounded-md bg-blue-600 px-4 py-2.5 text-sm font-medium text-white shadow hover:bg-blue-700 transition-all">
                <i data-lucide="plus" class="w-4 h-4 mr-2"></i> Nova Transação
            </button>
        </div>

        <div class="grid gap-4 md:grid-cols-3 mb-8">
            <div class="rounded-xl border bg-white p-6 shadow-sm">
                <div class="flex items-center justify-between pb-2">
                    <span class="text-sm font-medium text-slate-500">Total Entradas</span>
                    <i data-lucide="arrow-up-circle" class="w-5 h-5 text-emerald-500"></i>
                </div>
                <div class="text-2xl font-bold text-emerald-600" id="total-entradas">R$ 0,00</div>
            </div>

            <div class="rounded-xl border bg-white p-6 shadow-sm">
                <div class="flex items-center justify-between pb-2">
                    <span class="text-sm font-medium text-slate-500">Total Saídas</span>
                    <i data-lucide="arrow-down-circle" class="w-5 h-5 text-rose-500"></i>
                </div>
                <div class="text-2xl font-bold text-rose-600" id="total-saidas">R$ 0,00</div>
            </div>

            <div class="rounded-xl border bg-white p-6 shadow-sm">
                <div class="flex items-center justify-between pb-2">
                    <span class="text-sm font-medium text-slate-500">Previsão de Caixa</span>
                    <i data-lucide="clock" class="w-5 h-5 text-blue-500"></i>
                </div>
                <div class="text-2xl font-bold text-blue-600" id="total-previsao">R$ 0,00</div>
            </div>
        </div>

        <div class="rounded-xl border bg-white shadow-sm overflow-hidden">
            <div class="p-4 border-b bg-slate-50/50">
                <h3 class="font-semibold text-slate-700">Últimas Transações</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="bg-slate-50 text-slate-500 uppercase text-xs font-semibold">
                        <tr>
                            <th class="px-6 py-4">Descrição</th>
                            <th class="px-6 py-4">Categoria</th>
                            <th class="px-6 py-4">Vencimento</th>
                            <th class="px-6 py-4 text-right">Valor</th>
                            <th class="px-6 py-4 text-center">Status</th>
                            <th class="px-6 py-4 text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-financeiro" class="divide-y">
                        <tr>
                            <td colspan="6" class="px-6 py-10 text-center text-slate-400">
                                Carregando movimentações...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../models/supabase_config.js"></script>
    <script src="../models/UsuarioModel.js"></script>
    <script src="../models/FinanceiroModel.js"></script>
    <script src="../controllers/FinanceiroController.js"></script>

    <script>
        // Inicializa os ícones do Lucide após o carregamento
        lucide.createIcons();
    </script>
</body>
</html>
