<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumanji Game</title>
    <link rel="stylesheet" href="index_jumanji.css">
</head>
<body>
    <!-- tarefa1:  Carregar o video jumanji.mp4-->
    <video id="jumanjiVideo" width="100%" height="auto" controls>
        <source src="jumanji.mp4" type="video/mp4">
        Seu navegador não suporta o elemento de vídeo.
    </video>

    <script>
        // tarefa2:  após o vídeo, vá para a página jumanji.html
        const video = document.getElementById('jumanjiVideo');

        video.addEventListener('ended', function() {
            window.location.href = 'jumanji.html';
        });
    </script>
</body>
</html>
