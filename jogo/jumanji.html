<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumanji Board Game</title>
    <link rel="stylesheet" href="styles2.css">
</head>
<body>
    <div class="container">
        <h1>Jumanji</h1>
        <p class="message" id="gameMessage">Prepare-se para o jogo!</p>


        <!-- Painel de Pontuação -->
        <div id="scoreboard" class="scoreboard"></div>

        
        <!-- Caixa de dados -->
        <div class="dice-box">
            <p>Jogador <span id="currentPlayer"></span>, é sua vez!</p>
            <div id="dice1" class="dice">0</div>
            <div id="dice2" class="dice">0</div>
            <button id="rollDiceBtn">Rolar Dados</button>
        </div>

        

        <!-- Alerta de resultado final -->
        <div id="winner" class="winner"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
