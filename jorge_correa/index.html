<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário com Mapa e Botão de Ligação</title>
    <!-- Link para o CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Formulário de Contato -->
        <div class="form-container">
            <h2>Entre em Contato</h2>
            <form action="#" method="post">
                <input type="text" name="name" placeholder="Nome" required>
                <input type="email" name="email" placeholder="E-mail" required>
                <input type="tel" name="phone" placeholder="Telefone">
                <textarea name="message" rows="4" placeholder="Sua Mensagem" required></textarea>
                <button type="submit">Enviar</button>
            </form>
            <!-- Botão para ligar -->
            <a href="tel:+5591982420404" class="call-button">Ligar Agora</a>
        </div>

        <!-- Mapa ao lado do formulário -->
        <div id="map" class="map-container"></div>
    </div>

    <!-- Link para o JavaScript -->
    <script src="script.js"></script>
    <!-- Google Maps API -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initMap" async defer></script>
</body>
</html>
