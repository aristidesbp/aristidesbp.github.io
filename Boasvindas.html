<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boas-Vindas</title>

    <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1d3557, #457b9d); /* Fundo azul */
            font-family: 'Arial', sans-serif;
            color: white;
            text-align: center;
            overflow: hidden;
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .welcome-container {
            animation: fadeIn 1s ease-in-out;
        }

        .content {
            position: relative;
            z-index: 1;
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #ffcc00;
            opacity: 0;
        }

        p {
            font-size: 1.2em;
            color: #cccccc;
            opacity: 0;
            margin-top: 20px;
        }

        .text-right {
            opacity: 0;
            transform: translateX(100%);
        }

        .text-left {
            opacity: 0;
            transform: translateX(-100%);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Ajustes para telas menores */
        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }
            .typing {
                font-size: 1.2em;
            }
            p {
                font-size: 1em;
            }
        }
    </style>

</head>
<body>

    <div id="particles-js"></div>
    
    <div class="welcome-container">
        <h1>Aumente sua presença no mundo digital!</h1>
        <p>Criação de sites e campanhas para aumentar seu faturamento de forma inteligente e inovadora !!</p>

        <div class="content">
            <div class="text-right">
                "A propaganda é a alma do negócio!"
            </div>

            <div class="text-left">
                "Transforme sua ideia em resultados!"
            </div>
        </div>
    </div>

    <script>
        // Partículas de fundo com particles.js
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80 },
                "size": { "value": 3 },
                "color": { "value": "#ffffff" },
                "line_linked": { "enable": true, "color": "#ffffff" },
                "move": { "speed": 2 }
            },
            "interactivity": {
                "events": { "onhover": { "enable": true, "mode": "repulse" } }
            }
        });

        // Animações com GSAP
        gsap.fromTo("h1", { scale: 0.5, opacity: 0 }, { scale: 1, opacity: 1, duration: 2 });
        gsap.fromTo("p", { y: 50, opacity: 0 }, { y: 0, opacity: 1, duration: 2, delay: 1 });

        // Animações alternadas para os textos
        gsap.fromTo(".text-right", { x: "100%", opacity: 0 }, { x: "0%", opacity: 1, duration: 2, delay: 3 });
        gsap.fromTo(".text-left", { x: "-100%", opacity: 0 }, { x: "0%", opacity: 1, duration: 2, delay: 5 });
    </script>

    <script>
        // Redirecionar para a página "home.html" após 9 segundos
        setTimeout(() => {
            window.location.href = "assets/index.html";
        }, 9900);
    </script>

</body>
</html>
